<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="css/mobile-adapt.css">
  <title>角色同步测试 - 灵月仙途</title>
  <style>
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      padding: 20px;
      color: #fff;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 30px;
    }
    h1 {
      color: #f4d03f;
      text-align: center;
      margin-bottom: 30px;
    }
    .section {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      border-left: 3px solid #f4d03f;
    }
    .section-title {
      color: #f4d03f;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .info-item {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 8px;
    }
    .info-label {
      color: #aaa;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    .info-value {
      color: #f4d03f;
      font-family: monospace;
      font-size: 1rem;
      word-break: break-all;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
    }
    .status-ok {
      background: #4CAF50;
      color: white;
    }
    .status-error {
      background: #f44336;
      color: white;
    }
    .status-warn {
      background: #ff9800;
      color: white;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #f4d03f, #f1c40f);
      border: none;
      border-radius: 8px;
      color: #333;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(244, 208, 63, 0.4);
    }
    .btn-danger {
      background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
    }
    .btn-success {
      background: linear-gradient(90deg, #4CAF50, #45a049);
    }
    .log-container {
      background: #000;
      border-radius: 8px;
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.85rem;
      color: #0f0;
      margin-top: 20px;
    }
    .log-entry { margin-bottom: 5px; }
    .log-info { color: #0f0; }
    .log-warn { color: #ff0; }
    .log-error { color: #f44; }
    .result-box {
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      font-weight: bold;
    }
    .result-pass {
      background: rgba(76, 175, 80, 0.3);
      border: 1px solid #4CAF50;
      color: #4CAF50;
    }
    .result-fail {
      background: rgba(244, 67, 54, 0.3);
      border: 1px solid #f44336;
      color: #f44336;
    }
  </style>

  </head>
<body>
  <div class="container">
    <h1>🔄 角色同步测试</h1>
    
    <div class="section">
      <div class="section-title">📊 当前角色 ID 状态</div>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">currentRoleId</div>
          <div class="info-value" id="currentRoleId">检查中...</div>
        </div>
        <div class="info-item">
          <div class="info-label">roleId</div>
          <div class="info-value" id="roleId">检查中...</div>
        </div>
        <div class="info-item">
          <div class="info-label">selectedCharacterId</div>
          <div class="info-value" id="selectedCharacterId">检查中...</div>
        </div>
        <div class="info-item">
          <div class="info-label">APP_CONFIG.currentRoleId</div>
          <div class="info-value" id="appConfigRoleId">检查中...</div>
        </div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">✅ 同步状态</div>
      <div id="syncStatus" style="text-align: center; padding: 20px;">
        <div class="info-label">检测中...</div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">🎮 测试操作</div>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">设置角色 ID 为：</div>
          <input type="text" id="testRoleId" value="45" 
                 style="width: 100%; padding: 10px; margin-top: 10px; 
                        background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); 
                        border-radius: 5px; color: #fff;">
          <button class="btn" onclick="setRoleId()">设置并同步</button>
        </div>
        <div class="info-item">
          <div class="info-label">操作</div>
          <button class="btn btn-success" onclick="syncNow()">立即同步</button>
          <button class="btn btn-danger" onclick="clearAll()">清除所有</button>
          <button class="btn" onclick="refreshPage()">刷新页面</button>
        </div>
      </div>
    </div>
    
    <div class="log-container" id="logContainer">
      <div class="log-entry log-info">角色同步测试工具已启动...</div>
    </div>
  </div>
  
  <script src="js/role-sync.js"></script>
  <script>
    const logContainer = document.getElementById('logContainer');
    
    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = 'log-entry log-' + type;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
      console.log(message);
    }
    
    function checkSyncStatus() {
      const currentRoleId = localStorage.getItem('currentRoleId');
      const roleId = localStorage.getItem('roleId');
      const selectedCharacterId = localStorage.getItem('selectedCharacterId');
      const appConfigRoleId = window.APP_CONFIG ? window.APP_CONFIG.currentRoleId : null;
      
      // 更新显示
      document.getElementById('currentRoleId').innerHTML = currentRoleId ? 
        `<span class="status-badge status-ok">${currentRoleId}</span>` : 
        '<span class="status-badge status-error">不存在</span>';
      
      document.getElementById('roleId').innerHTML = roleId ? 
        `<span class="status-badge status-ok">${roleId}</span>` : 
        '<span class="status-badge status-error">不存在</span>';
      
      document.getElementById('selectedCharacterId').innerHTML = selectedCharacterId ? 
        `<span class="status-badge status-ok">${selectedCharacterId}</span>` : 
        '<span class="status-badge status-error">不存在</span>';
      
      document.getElementById('appConfigRoleId').innerHTML = appConfigRoleId ? 
        `<span class="status-badge status-ok">${appConfigRoleId}</span>` : 
        '<span class="status-badge status-warn">不存在</span>';
      
      // 检查同步状态
      const statusDiv = document.getElementById('syncStatus');
      const values = [currentRoleId, roleId, selectedCharacterId].filter(v => v);
      
      if (values.length === 0) {
        statusDiv.innerHTML = `
          <div class="status-badge status-error">❌ 未设置角色 ID</div>
          <div style="margin-top: 10px; color: #aaa;">请先登录并选择角色</div>
        `;
        log('未检测到角色 ID', 'error');
      } else {
        const allSame = values.every(v => v === values[0]);
        
        if (allSame) {
          statusDiv.innerHTML = `
            <div class="status-badge status-ok">✅ 所有角色 ID 已同步</div>
            <div style="margin-top: 10px; color: #4CAF50;">统一值：${values[0]}</div>
          `;
          log('角色 ID 同步检查通过', 'info');
        } else {
          statusDiv.innerHTML = `
            <div class="status-badge status-error">❌ 角色 ID 不一致</div>
            <div style="margin-top: 10px; color: #ff9800;">
              currentRoleId: ${currentRoleId || 'null'}<br>
              roleId: ${roleId || 'null'}<br>
              selectedCharacterId: ${selectedCharacterId || 'null'}
            </div>
          `;
          log('角色 ID 不同步！', 'error');
        }
      }
    }
    
    function setRoleId() {
      const roleId = document.getElementById('testRoleId').value.trim();
      
      if (!roleId) {
        alert('请输入角色 ID！');
        return;
      }
      
      log(`设置角色 ID 为：${roleId}`, 'info');
      window.RoleSync.setCurrentRoleId(roleId);
      
      setTimeout(() => {
        checkSyncStatus();
        log('角色 ID 设置完成', 'info');
      }, 500);
    }
    
    function syncNow() {
      log('手动触发同步...', 'info');
      window.RoleSync.init();
      
      setTimeout(() => {
        checkSyncStatus();
        log('同步完成', 'info');
      }, 500);
    }
    
    function clearAll() {
      if (confirm('确定要清除所有角色相关数据吗？')) {
        localStorage.removeItem('currentRoleId');
        localStorage.removeItem('roleId');
        localStorage.removeItem('selectedCharacterId');
        log('已清除所有角色相关数据', 'info');
        checkSyncStatus();
      }
    }
    
    function refreshPage() {
      log('刷新页面...', 'info');
      window.location.reload();
    }
    
    // 页面加载时检查
    window.addEventListener('DOMContentLoaded', () => {
      log('=== 角色同步测试工具 ===', 'info');
      log('检查角色 ID 同步状态...', 'info');
      checkSyncStatus();
    });
  </script>
</body>
</html>
