openapi: 3.0.0
info:
  title: 灵月仙途 API
  description: 灵月仙途游戏后端API接口定义
  version: 1.0.0
servers:
  - url: http://localhost:8088/api
    description: 本地开发环境

paths:
  # 角色相关API
  /role/{roleId}:
    get:
      summary: 获取角色详情
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameRole'

  # 背包相关API
  /api/inventory/{roleId}:
    get:
      summary: 获取角色背包
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'

  /api/inventory/use:
    post:
      summary: 使用物品
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roleId:
                  type: integer
                  format: int64
                itemId:
                  type: integer
                  format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/inventory/sell:
    post:
      summary: 出售物品
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roleId:
                  type: integer
                  format: int64
                itemId:
                  type: integer
                  format: int64
                count:
                  type: integer
                  default: 1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SellResponse'

  /api/inventory/split:
    post:
      summary: 分割物品
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roleId:
                  type: integer
                  format: int64
                itemId:
                  type: integer
                  format: int64
                count:
                  type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # 宗门相关API
  /clan:
    get:
      summary: 获取宗门列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClanListResponse'

  /clan/{id}:
    get:
      summary: 获取宗门详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClanDetailResponse'

  /clan/member/role/{roleId}:
    get:
      summary: 获取角色的宗门成员信息
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClanMember'

  /clan/{clanId}/resources:
    get:
      summary: 获取宗门资源
      parameters:
        - name: clanId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClanResources'

  /clan/{clanId}/announcement:
    get:
      summary: 获取宗门公告
      parameters:
        - name: clanId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClanAnnouncement'

  /clan/role/{roleId}/join/{clanId}:
    post:
      summary: 加入宗门
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: clanId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinClanResponse'

  /clan/member/{memberId}/leave:
    post:
      summary: 离开宗门
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # 任务相关API
  /task/list/{roleId}:
    get:
      summary: 获取角色任务列表
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'

  /role/tasks/{roleId}/{taskId}/accept:
    post:
      summary: 接取任务
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /role/tasks/{roleId}/{taskId}/progress:
    put:
      summary: 更新任务进度
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                progress:
                  type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /role/tasks/{roleId}/{taskId}/complete:
    put:
      summary: 完成任务
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # 技能相关API
  /skill:
    get:
      summary: 获取所有技能列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'

  /role-skill/role/{roleId}:
    get:
      summary: 获取角色技能
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleSkill'

components:
  schemas:
    # 通用响应结构
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    # 角色相关
    GameRole:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        roleName:
          type: string
        gender:
          type: integer
        realm:
          type: string
        realmStage:
          type: string
        worldLevel:
          type: string
        cultivation:
          type: integer
        cultivationMax:
          type: integer
        spiritStones:
          type: integer
        hp:
          type: integer
        mp:
          type: integer
        spiritRoot:
          type: string
        profession:
          type: string
        professionLevel:
          type: integer
        professionExp:
          type: integer
        professionCertified:
          type: boolean
        sect:
          type: string
        sectPosition:
          type: string
        partner:
          type: string
        todayCultivationTimes:
          type: integer
        maxDailyCultivationTimes:
          type: integer
        createTime:
          type: string
          format: date-time

    # 背包相关
    InventoryResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/InventoryItem'
        total:
          type: integer

    InventoryItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        itemId:
          type: integer
          format: int64
        name:
          type: string
        type:
          type: string
        rarity:
          type: string
        count:
          type: integer
        icon:
          type: string
        description:
          type: string
        isBound:
          type: boolean

    SellResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        price:
          type: integer

    # 宗门相关
    ClanListResponse:
      type: array
      items:
        type: object
        properties:
          id:
            type: integer
            format: int64
          name:
            type: string
          level:
            type: string
          memberCount:
            type: integer
          maxMembers:
            type: integer
          leaderName:
            type: string
          activityPercent:
            type: integer
          activityLevel:
            type: string
          status:
            type: string

    ClanDetailResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        level:
          type: string
        description:
          type: string
        memberCount:
          type: integer
        maxMembers:
          type: integer
        leaderName:
          type: string
        status:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/ClanMemberDetail'

    ClanMember:
      type: object
      properties:
        id:
          type: integer
          format: int64
        clanId:
          type: integer
          format: int64
        roleId:
          type: integer
          format: int64
        roleName:
          type: string
        position:
          type: string
        joinTime:
          type: string
          format: date-time
        contribution:
          type: integer

    ClanMemberDetail:
      type: object
      properties:
        id:
          type: integer
          format: int64
        roleId:
          type: integer
          format: int64
        roleName:
          type: string
        position:
          type: string
        joinTime:
          type: string
          format: date-time
        contribution:
          type: integer

    ClanResources:
      type: object
      properties:
        lingshi:
          type: integer
        gongxian:
          type: integer
        material:
          type: integer
        item:
          type: integer

    ClanAnnouncement:
      type: object
      properties:
        content:
          type: string
        publishTime:
          type: string
          format: date-time
        publisher:
          type: string

    JoinClanResponse:
      type: object
      properties:
        clanId:
          type: integer
          format: int64
        clanName:
          type: string
        roleId:
          type: integer
          format: int64
        position:
          type: string

    # 任务相关
    Task:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        progress:
          type: integer
        completed:
          type: boolean

    # 技能相关
    Skill:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        type:
          type: string
        description:
          type: string
        level:
          type: integer

    RoleSkill:
      type: object
      properties:
        id:
          type: integer
          format: int64
        roleId:
          type: integer
          format: int64
        skillName:
          type: string
        skillType:
          type: string
        level:
          type: integer
        exp:
          type: integer
        maxExp:
          type: integer
        effect:
          type: string
        unlocked:
          type: boolean