<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="../js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="../css/mobile-adapt.css">
  <title>灵月仙途 - 宗门地图</title>
  <style>
    :root {
      --gold-primary: #e6c749;
      --gold-light: #f4d03f;
      --gold-dark: #b8860b;
      --text-main: #fdfbf7;
      --text-dim: #d4c5a9;
      --bg-overlay: rgba(20, 25, 40, 0.6);
      --glass-bg: rgba(30, 35, 50, 0.75);
      --border-glow: 0 0 15px rgba(230, 199, 73, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Microsoft YaHei', 'SimSun', serif;
      background: #1a1f2e;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* 地图背景容器 */
    .map-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 420px;
      max-height: 850px;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
      background: linear-gradient(to bottom, #2b3242, #1a1f2e);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0;
    }

    /* 顶部信息栏 */
    .top-info-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(230, 199, 73, 0.2);
      padding: 12px 15px;
      z-index: 100;
      animation: fadeInDown 0.8s ease-out;
    }

    .sect-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sect-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sect-level {
      font-size: 12px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(230, 199, 73, 0.2);
      color: var(--gold-primary);
    }

    .sect-name {
      font-size: 16px;
      font-weight: bold;
      color: var(--text-main);
    }

    .sect-resources {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .resource-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.2);
      padding: 4px 8px;
      border-radius: 12px;
    }

    /* 地图交互层 */
    .interactive-map {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .map-background {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.7) sepia(0.3);
    }

    /* 地图标记点 */
    .map-marker {
      position: absolute;
      width: 12px;
      height: 12px;
      background: var(--gold-primary);
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px var(--gold-primary);
      animation: pulse 2s infinite;
    }

    .map-marker:hover {
      transform: scale(1.5);
      box-shadow: 0 0 20px var(--gold-primary);
    }

    .map-marker::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      border: 2px solid var(--gold-primary);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.3;
    }

    .marker-label {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: var(--gold-primary);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 20;
    }

    .map-marker:hover .marker-label {
      opacity: 1;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* 地图区域（交互热区） */
    .map-area {
      position: absolute;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 5;
    }

    .map-area:hover {
      border-color: var(--gold-primary);
      background: rgba(230, 199, 73, 0.1);
      box-shadow: 0 0 20px rgba(230, 199, 73, 0.3);
    }

    .area-label {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: var(--gold-primary);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 6;
    }

    .map-area:hover .area-label {
      opacity: 1;
    }

    /* 详细信息面板 */
    .details-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(230, 199, 73, 0.2);
      padding: 15px;
      transform: translateY(100%);
      transition: transform 0.4s ease;
      z-index: 150;
      box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
    }

    .details-panel.active {
      transform: translateY(0);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(230, 199, 73, 0.2);
    }

    .panel-title {
      font-size: 18px;
      font-weight: bold;
      color: var(--gold-primary);
    }

    .close-panel {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 0;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .close-panel:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .panel-content {
      max-height: 300px;
      overflow-y: auto;
    }

    /* 功能模块 */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .function-card {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(230, 199, 73, 0.2);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .function-card:hover {
      background: rgba(0, 0, 0, 0.3);
      border-color: var(--gold-primary);
      transform: translateY(-2px);
    }

    .function-icon {
      font-size: 20px;
      margin-bottom: 8px;
      color: var(--gold-primary);
    }

    .function-title {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .function-desc {
      font-size: 10px;
      color: var(--text-dim);
    }

    /* 宗门建筑详情 */
    .building-details {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .building-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .building-icon {
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--gold-primary);
    }

    .building-text {
      flex: 1;
    }

    .building-name {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .building-desc {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* 底部导航栏 */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(230, 199, 73, 0.2);
      padding: 8px 0;
      display: flex;
      justify-content: space-around;
      z-index: 200;
      box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.3);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5px;
      text-decoration: none;
      color: #aaa;
      transition: all 0.2s ease;
      width: 20%;
    }

    .nav-item.active {
      color: var(--gold-primary);
    }

    .nav-icon {
      font-size: 20px;
      margin-bottom: 3px;
    }

    .nav-text {
      font-size: 10px;
    }

    /* 按钮样式 */
    .antique-button {
      background: linear-gradient(135deg, rgba(230, 199, 73, 0.2), rgba(230, 199, 73, 0.1));
      border: 1px solid var(--gold-primary);
      color: var(--gold-primary);
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      font-size: 12px;
      font-weight: bold;
    }

    .antique-button:hover {
      background: linear-gradient(135deg, rgba(230, 199, 73, 0.3), rgba(230, 199, 73, 0.2));
      transform: translateY(-2px);
    }

    /* 动画 */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 响应式调整 */
    @media (max-width: 480px) {
      .top-info-bar {
        padding: 10px 12px;
      }
      
      .sect-name {
        font-size: 14px;
      }
      
      .panel-title {
        font-size: 16px;
      }
    }
  </style>

  </head>
<body>

    // 显示区域详情
    function showAreaDetails(areaId) {
      const panel = document.getElementById('detailsPanel');
      const panelTitle = document.getElementById('panelTitle');
      const panelContent = document.getElementById('panelContent');
      
      const area = areaData[areaId];
      if (!area) return;
      
      panelTitle.textContent = area.name;
      
      let content = `
        <div class="building-details">
          <div class="building-info">
            <div class="building-icon" style="background: rgba(230, 199, 73, 0.2);">
              🏯
            </div>
            <div class="building-text">
              <div class="building-name">${area.name}（${'★'.repeat(area.level)}${'☆'.repeat(5-area.level)}）</div>
              <div class="building-desc">${area.description}</div>
            </div>
          </div>
          
          <div style="margin: 15px 0 10px;">
            <div style="font-weight: bold; color: var(--gold-primary); margin-bottom: 8px;">可用功能</div>
            <div class="module-grid">
      `;
      
      // 添加功能卡片
      area.functions.forEach(func => {
        content += `
          <div class="function-card" onclick="useFunction('${areaId}', '${func.name}')">
            <div class="function-icon">${func.icon}</div>
            <div class="function-title">${func.name}</div>
            <div class="function-desc">${func.desc}</div>
          </div>
        `;
      });
      
      content += `
            </div>
          </div>
          
          <div style="margin: 10px 0;">
            <div style="font-weight: bold; color: var(--gold-primary); margin-bottom: 8px;">当前事件</div>
            <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
      `;
      
      // 添加事件
      area.events.forEach(event => {
        content += `
          <div style="padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <div style="font-size: 12px;">✨ ${event}</div>
          </div>
        `;
      });
      
      content += `
            </div>
          </div>
          
          <button class="antique-button" style="width: 100%; margin-top: 10px;" onclick="enterArea('${areaId}')">
            进入${area.name}
          </button>
        </div>
      `;
      
      panelContent.innerHTML = content;
      panel.classList.add('active');
    }
    
    // 关闭详情面板
    function closeDetailsPanel() {
      const panel = document.getElementById('detailsPanel');
      panel.classList.remove('active');
    }
    
    // 使用功能
    function useFunction(areaId, functionName) {
      showToast(`正在使用【${areaData[areaId].name}】的【${functionName}】功能...`);
      // 这里可以跳转到对应功能页面
    }
    
    // 进入区域
    function enterArea(areaId) {
      showToast(`进入【${areaData[areaId].name}】...`);
      // 这里可以跳转到对应区域页面
    }
    
    // 创建地图标记点
    function createMapMarkers() {
      const mapContainer = document.getElementById('interactiveMap');
      
      // 示例：创建一些资源点标记
      const markers = [
        { id: 'goldMine', label: '金矿脉', x: 25, y: 25 },
        { id: 'herbField', label: '灵草田', x: 75, y: 20 },
        { id: 'spiritSpring', label: '灵泉', x: 20, y: 60 },
        { id: 'trainingGround', label: '修炼场', x: 60, y: 65 },
        { id: 'market', label: '坊市', x: 80, y: 80 }
      ];
      
      markers.forEach(marker => {
        const markerElement = document.createElement('div');
        markerElement.className = 'map-marker';
        markerElement.style.left = `${marker.x}%`;
        markerElement.style.top = `${marker.y}%`;
        markerElement.onclick = () => {
          showMarkerDetails(marker.id, marker.label);
        };
        
        const label = document.createElement('div');
        label.className = 'marker-label';
        label.textContent = marker.label;
        markerElement.appendChild(label);
        
        mapContainer.appendChild(markerElement);
      });
    }
    
    // 显示标记点详情
    function showMarkerDetails(markerId, markerLabel) {
      const panel = document.getElementById('detailsPanel');
      const panelTitle = document.getElementById('panelTitle');
      const panelContent = document.getElementById('panelContent');
      
      panelTitle.textContent = markerLabel;
      
      let content = '';
      
      // 根据不同的标记点显示不同的信息
      switch(markerId) {
        case 'goldMine':
          content = `
            <div class="building-details">
              <div class="building-info">
                <div class="building-icon" style="background: rgba(212, 175, 55, 0.2);">
                  💰
                </div>
                <div class="building-text">
                  <div class="building-name">金矿脉</div>
                  <div class="building-desc">宗门重要资源点，日产黄金1000两</div>
                </div>
              </div>
              
              <div style="margin: 15px 0;">
                <div style="font-weight: bold; color: var(--gold-primary); margin-bottom: 8px;">矿脉信息</div>
                <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
                  <div style="padding: 5px 0;">储量：丰富</div>
                  <div style="padding: 5px 0;">开采状态：进行中</div>
                  <div style="padding: 5px 0;">守卫力量：10名内门弟子</div>
                </div>
              </div>
              
              <button class="antique-button" style="width: 100%; margin-top: 10px;">
                派遣弟子开采
              </button>
            </div>
          `;
          break;
          
        case 'herbField':
          content = `
            <div class="building-details">
              <div class="building-info">
                <div class="building-icon" style="background: rgba(76, 175, 80, 0.2);">
                  🌿
                </div>
                <div class="building-text">
                  <div class="building-name">灵草田</div>
                  <div class="building-desc">种植各类灵草，供应炼丹房需求</div>
                </div>
              </div>
              
              <div style="margin: 15px 0;">
                <div style="font-weight: bold; color: var(--gold-primary); margin-bottom: 8px;">可采集灵草</div>
                <div class="module-grid">
                  <div class="function-card">
                    <div class="function-icon">🌱</div>
                    <div class="function-title">聚灵草</div>
                    <div class="function-desc">成熟可采</div>
                  </div>
                  <div class="function-card">
                    <div class="function-icon">🍀</div>
                    <div class="function-title">七星花</div>
                    <div class="function-desc">还需3天</div>
                  </div>
                </div>
              </div>
              
              <button class="antique-button" style="width: 100%; margin-top: 10px;">
                采集灵草
              </button>
            </div>
          `;
          break;
      }
      
      panelContent.innerHTML = content;
      panel.classList.add('active');
    }
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 创建地图标记
      createMapMarkers();
      
      // 为地图容器添加点击事件，点击空白处关闭面板
      document.getElementById('interactiveMap').addEventListener('click', function(e) {
        // 如果点击的是地图背景（不是标记点或区域）
        if (e.target.classList.contains('interactive-map') || e.target.classList.contains('map-background')) {
          closeDetailsPanel();
        }
      });
    });
  </script>
  <script src="../js/ui-components.js"></script>
</body>
</html>
