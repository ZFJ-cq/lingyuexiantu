<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="../js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="../css/mobile-adapt.css">
    <title>宗门列表 - 灵月仙途</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #2a4a6c;
            --secondary-color: #4a7a9c;
            --accent-color: #d4af37;
            --dark-bg: #0a1628;
            --light-text: #e6e6e6;
            --card-bg: rgba(20, 30, 48, 0.9);
            --border-color: rgba(120, 150, 200, 0.3);
            --highlight: #ffcc00;
        }
        
        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background-color: var(--dark-bg);
            color: var(--light-text);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 70px;
            position: relative;
        }
        
        /* 水墨山水背景 */
        .mountain-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .mountain {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, #1a2a4a, transparent);
            clip-path: polygon(0% 100%, 10% 70%, 20% 80%, 30% 60%, 40% 75%, 50% 50%, 60% 65%, 70% 45%, 80% 55%, 90% 35%, 100% 50%, 100% 100%);
        }
        
        .mountain-1 {
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 50%;
            background: linear-gradient(to top, #2a3a5a, transparent);
            clip-path: polygon(0% 100%, 5% 60%, 15% 75%, 25% 50%, 35% 65%, 45% 40%, 55% 55%, 65% 35%, 75% 50%, 85% 30%, 95% 45%, 100% 100%);
            opacity: 0.7;
        }
        
        .mountain-2 {
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 40%;
            background: linear-gradient(to top, #3a4a6a, transparent);
            clip-path: polygon(0% 100%, 10% 55%, 20% 65%, 30% 45%, 40% 60%, 50% 35%, 60% 50%, 70% 30%, 80% 45%, 90% 25%, 100% 100%);
            opacity: 0.5;
        }
        
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            filter: blur(10px);
            animation: float 20s infinite ease-in-out;
        }
        
        .cloud-1 {
            width: 120px;
            height: 60px;
            top: 20%;
            left: -20px;
            animation-delay: 0s;
        }
        
        .cloud-2 {
            width: 150px;
            height: 80px;
            top: 40%;
            right: -30px;
            animation-delay: 5s;
        }
        
        .cloud-3 {
            width: 100px;
            height: 50px;
            top: 10%;
            left: 30%;
            animation-delay: 10s;
        }
        
        .crane {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            animation: fly 30s infinite linear;
        }
        
        .crane-1 {
            top: 15%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .crane-2 {
            top: 25%;
            right: 15%;
            animation-delay: 15s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-10px) translateX(10px); }
        }
        
        @keyframes fly {
            0% { transform: translateX(-50px) translateY(0); }
            50% { transform: translateX(calc(100vw + 50px)) translateY(-20px); }
            100% { transform: translateX(calc(100vw + 50px)) translateY(-20px); }
        }
        
        /* 主容器 */
        .container {
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* 顶部标题 */
        .page-header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px 0;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 10px;
        }
        
        .page-subtitle {
            font-size: 14px;
            color: #aaa;
        }
        
        /* 筛选栏 */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-btn {
            flex: 1;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--light-text);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 80px;
            text-align: center;
        }
        
        .filter-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            transform: translateY(-2px);
        }
        
        .filter-btn.active {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--accent-color);
            color: var(--accent-color);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        
        /* 搜索栏 */
        .search-bar {
            margin-bottom: 20px;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            color: var(--light-text);
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        
        .search-input::placeholder {
            color: #aaa;
        }
        
        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 16px;
        }
        
        /* 宗门列表 */
        .clan-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        /* 宗门卡片 */
        .clan-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .clan-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border-color: var(--accent-color);
        }
        
        .clan-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--accent-color), var(--secondary-color));
        }
        
        .clan-card::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .clan-card:hover::after {
            opacity: 1;
        }
        
        .clan-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .clan-info {
            flex: 1;
        }
        
        .clan-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--light-text);
            margin-bottom: 5px;
        }
        
        .clan-level {
            font-size: 14px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(212, 175, 55, 0.2);
            color: var(--accent-color);
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .clan-desc {
            font-size: 14px;
            color: #aaa;
            line-height: 1.4;
            margin-bottom: 15px;
        }
        
        .clan-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: var(--accent-color);
        }
        
        .stat-label {
            font-size: 12px;
            color: #aaa;
        }
        
        .clan-requirements {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .requirement-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .requirement-item:last-child {
            margin-bottom: 0;
        }
        
        .requirement-status {
            color: var(--accent-color);
            font-weight: bold;
        }
        
        .clan-actions {
            display: flex;
            gap: 10px;
        }
        
        .join-btn {
            flex: 1;
            padding: 12px 15px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.1));
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }
        
        .join-btn:hover {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.3), rgba(212, 175, 55, 0.2));
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }
        
        .join-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .detail-btn {
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--light-text);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .detail-btn:hover {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--accent-color);
            color: var(--accent-color);
            transform: translateY(-2px);
        }
        
        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 8px 0;
            display: flex;
            justify-content: space-around;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px;
            text-decoration: none;
            color: #aaa;
            transition: all 0.2s ease;
            width: 20%;
        }
        
        .nav-item.active {
            color: var(--accent-color);
        }
        
        .nav-icon {
            font-size: 22px;
            margin-bottom: 3px;
        }
        
        .nav-text {
            font-size: 12px;
        }
        
        /* 响应式调整 */
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            
            .page-title {
                font-size: 20px;
            }
            
            .clan-name {
                font-size: 16px;
            }
            
            .clan-desc {
                font-size: 13px;
            }
            
            .clan-stats {
                gap: 10px;
            }
            
            .stat-value {
                font-size: 14px;
            }
        }
        
        /* 修仙元素装饰 */
        .cultivation-element {
            position: absolute;
            z-index: -1;
            opacity: 0.1;
        }
        
        .floating-text {
            position: absolute;
            font-family: 'Ma Shan Zheng', cursive;
            color: rgba(255, 255, 255, 0.05);
            font-size: 40px;
            z-index: -1;
            animation: floatText 30s infinite linear;
        }
        
        @keyframes floatText {
            0% { transform: translateX(-100px) translateY(0); }
            50% { transform: translateX(calc(100vw + 100px)) translateY(-20px); }
            100% { transform: translateX(calc(100vw + 100px)) translateY(-20px); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }
        
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        
        .close-modal {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--accent-color);
        }
    </style>

  </head>
<body>
    <!-- 水墨山水背景 -->
    <div class="mountain-bg">
        <div class="mountain"></div>
        <div class="mountain-1"></div>
        <div class="mountain-2"></div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="crane crane-1"><i class="fas fa-dove"></i></div>
        <div class="crane crane-2"><i class="fas fa-dove"></i></div>
        
        <!-- 修仙元素装饰 -->
        <div class="floating-text" style="top: 15%; left: 0;">道法自然</div>
        <div class="floating-text" style="top: 40%; left: 0; animation-delay: 10s;">修真问道</div>
        <div class="floating-text" style="top: 65%; left: 0; animation-delay: 20s;">天人合一</div>
        
        <div class="cultivation-element" style="top: 20%; right: 10%; font-size: 60px; transform: rotate(15deg);">☯</div>
        <div class="cultivation-element" style="top: 50%; left: 5%; font-size: 80px; transform: rotate(-10deg);">☯</div>
        <div class="cultivation-element" style="bottom: 20%; right: 15%; font-size: 50px; transform: rotate(5deg);">✨</div>
    </div>
    
    <!-- 主容器 -->
    <div class="container">
        <!-- 顶部标题 -->
        <div class="page-header">
            <h1 class="page-title">宗门列表</h1>
            <p class="page-subtitle">选择一个宗门加入，开启修仙之路</p>
        </div>
        
        <!-- 搜索栏 -->
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索宗门名称..." onkeyup="handleSearch(event)">
            <div class="search-icon">
                <i class="fas fa-search"></i>
            </div>
        </div>
        
        <!-- 筛选栏 -->
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterClans('all')">全部</button>
            <button class="filter-btn" onclick="filterClans('top')">顶级宗门</button>
            <button class="filter-btn" onclick="filterClans('element')">元素宗门</button>
            <button class="filter-btn" onclick="filterClans('special')">特殊宗门</button>
        </div>
        
        <!-- 排序栏 -->
        <div class="sort-bar" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <button class="filter-btn" onclick="sortClans('strength')">按实力排序</button>
            <button class="filter-btn" onclick="sortClans('level')">按等级排序</button>
            <button class="filter-btn" onclick="sortClans('members')">按人数排序</button>
            <button class="filter-btn" onclick="sortClans('difficulty')">按难度排序</button>
        </div>
        
        <!-- 申请状态区域 -->
        <div class="application-status" id="applicationStatus" style="display: none;">
            <div style="background: rgba(212, 175, 55, 0.1); border: 1px solid var(--accent-color); border-radius: 10px; padding: 15px; margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div style="font-size: 16px; font-weight: bold; color: var(--accent-color);">🎯 申请状态</div>
                    <button onclick="refreshApplicationStatus()" style="background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 5px 10px; border-radius: 15px; font-size: 12px; cursor: pointer; transition: all 0.3s ease;">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                </div>
                <div id="applicationStatusContent" style="font-size: 14px; color: var(--light-text);">
                    <!-- 申请状态将通过 JS 动态加载 -->
                </div>
            </div>
        </div>
        
        <!-- 宗门列表 -->
        <div class="clan-list">
            <!-- 宗门卡片将通过 JS 从数据库动态加载 -->
        </div>
    </div>
    
    <!-- 底部导航栏 -->
    <nav class="bottom-nav" role="navigation" aria-label="主导航">
            <a href="javascript:void(0)" onclick="pageUtils.navigateTo('../index.html')" class="nav-item" aria-label="修炼页面">
                <div class="nav-icon">🧘</div>
                <div class="nav-text">修炼</div>
            </a>
            <a href="javascript:void(0)" onclick="pageUtils.navigateTo('../skills/skills.html')" class="nav-item" aria-label="功法页面">
                <div class="nav-icon">📜</div>
                <div class="nav-text">功法</div>
            </a>
            <a href="javascript:void(0)" onclick="window.pageUtils.navigateToGuildPage()" class="nav-item active" aria-label="宗门页面" aria-current="page">
                <div class="nav-icon">🏯</div>
                <div class="nav-text">宗门</div>
            </a>
            <a href="javascript:void(0)" onclick="pageUtils.navigateTo('../word/world.html')" class="nav-item" aria-label="仙途页面">

            <a href="javascript:void(0)" onclick="pageUtils.navigateTo('../map/map.html')" class="nav-item" aria-label="云游页面">
                <div class="nav-icon">🗺️</div>
                <div class="nav-text">云游</div>
            </a>
        </nav>
    
    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div class="modal-title" id="modalTitle">宗门详情</div>
            <div id="modalBody">
                <!-- 弹窗内容将通过 JS 动态填充 -->
            </div>
        </div>
    </div>

    <script src="../js/token-manager.js"></script>
    <script src="../js/role-sync.js"></script>

    <script>
        // 异步获取角色 ID
        async function getRoleId() {
            // 优先从 localStorage 获取
            let roleId = localStorage.getItem('currentRoleId') || localStorage.getItem('roleId');
            
            // 如果没有，尝试从 API 获取
            if (!roleId) {
                const userId = localStorage.getItem('userId');
                if (userId) {
                    try {
                        const roles = await apiService.getRole(userId);
                        if (roles && roles.length > 0) {
                            roleId = roles[0].id;
                            localStorage.setItem('currentRoleId', roleId);
                        }
                    } catch (error) {
                        console.error('获取角色 ID 失败:', error);
                    }
                }
            }
            
            return roleId || null;
        }
        
        // 页面加载时从数据库获取宗门列表
        window.addEventListener('DOMContentLoaded', async () => {
            await loadClansFromDatabase();
            await loadApplicationStatus();
        });
        
        // 加载申请状态
        async function loadApplicationStatus() {
            try {
                const roleId = await getRoleId();
                if (roleId) {
                    const status = await apiService.getClanApplicationStatus(roleId);
                    if (status && status.length > 0) {
                        showApplicationStatus(status);
                    }
                }
            } catch (error) {
                console.error('加载申请状态失败:', error);
            }
        }
        
        // 刷新申请状态
        async function refreshApplicationStatus() {
            const statusContent = document.getElementById('applicationStatusContent');
            statusContent.innerHTML = '<div style="text-align: center; padding: 10px; color: var(--accent-color);">正在刷新...</div>';
            
            try {
                await loadApplicationStatus();
            } catch (error) {
                statusContent.innerHTML = '<div style="text-align: center; padding: 10px; color: #ff6b6b;">刷新失败，请稍后重试</div>';
            }
        }
        
        // 显示申请状态
        function showApplicationStatus(applications) {
            const statusContainer = document.getElementById('applicationStatus');
            const statusContent = document.getElementById('applicationStatusContent');
            
            statusContainer.style.display = 'block';
            
            let content = '';
            applications.forEach(app => {
                const statusText = getApplicationStatusText(app.status);
                const statusColor = getApplicationStatusColor(app.status);
                
                content += `
                    <div style="background: rgba(0,0,0,0.2); border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 3px solid ${statusColor};">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                            <div style="font-weight: bold; color: var(--accent-color);">${app.clanName}</div>

        // 全局存储宗门数据

        // 渲染宗门列表
        function renderClanList(clans) {
            allClans = clans; // 存储原始数据用于排序
            const clanListEl = document.querySelector('.clan-list');
            clanListEl.innerHTML = '';
            
            clans.forEach(clan => {
                const clanCard = createClanCard(clan);
                clanListEl.appendChild(clanCard);
            });
        }
        
        // 排序宗门
        function sortClans(criteria) {
            // 重置所有排序按钮
            document.querySelectorAll('.sort-bar .filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (allClans.length === 0) return;
            
            let sortedClans = [...allClans];
            
            switch (criteria) {
                case 'strength':
                    sortedClans.sort((a, b) => (b.strength || 0) - (a.strength || 0));
                    break;
                case 'level':
                    sortedClans.sort((a, b) => (b.level || 0) - (a.level || 0));
                    break;
                case 'members':
                    sortedClans.sort((a, b) => {
                        const membersA = (a.memberCount || 0);
                        const membersB = (b.memberCount || 0);
                        return membersB - membersA;
                    });
                    break;
                case 'difficulty':
                    sortedClans.sort((a, b) => {
                        const difficultyA = (a.joinDifficulty || 0);
                        const difficultyB = (b.joinDifficulty || 0);
                        return difficultyB - difficultyA;
                    });
                    break;
            }
            
            // 重新渲染列表
            const clanListEl = document.querySelector('.clan-list');
            clanListEl.innerHTML = '';
            
            sortedClans.forEach(clan => {
                const clanCard = createClanCard(clan);
                clanListEl.appendChild(clanCard);
            });
        }

                }
            } catch (error) {
                console.error('获取详情失败:', error);
                showErrorModal('网络错误', `获取宗门详情失败：${error.message}`);
            }
        }
        
        // 显示错误弹窗
        function showErrorModal(title, message) {
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            const modalOverlay = document.getElementById('modalOverlay');
            
            modalTitle.textContent = title;
            
            let bodyContent = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="font-size: 40px; margin-bottom: 15px; color: #ff6b6b;">❌</div>
                    <div style="font-size: 16px; color: #ccc; margin-bottom: 20px;">${message}</div>
                </div>
                
                <button onclick="closeModal()" style="width: 100%; padding: 12px; border: 1px solid var(--accent-color); background: var(--accent-color); color: #1a252f; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s;">
                    确定
                </button>
            `;
            
            modalBody.innerHTML = bodyContent;
            modalOverlay.classList.add('active');
        }
        
        // 显示宗门详情弹窗
        function showClanDetailModal(clan) {
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            const modalOverlay = document.getElementById('modalOverlay');
            
            modalTitle.textContent = clan.name + ' - 宗门详情';
            
            const difficultyPercent = clan.joinDifficulty || 50;
            
            let bodyContent = `
                <div style="margin-bottom: 15px;">
                    <div style="font-weight: bold; margin-bottom: 10px;">${getLevelText(clan.level)}</div>
                    <div style="margin-bottom: 15px;">${clan.description || '暂无详细介绍'}</div>
                    
                    <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                        <div style="font-weight: bold; margin-bottom: 10px;">宗门实力</div>
                        <div style="display: flex; justify-content: space-around; margin-bottom: 10px;">
                            <div style="text-align: center;">
                                <div style="font-size: 16px; font-weight: bold; color: var(--accent-color);">${clan.strength || 0}</div>
                                <div style="font-size: 12px; color: #aaa;">综合实力</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 16px; font-weight: bold; color: var(--accent-color);">${clan.memberCount || 0}</div>
                                <div style="font-size: 12px; color: #aaa;">弟子数量</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 16px; font-weight: bold; color: var(--accent-color);">${difficultyPercent}%</div>
                                <div style="font-size: 12px; color: #aaa;">加入难度</div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                        <div style="font-weight: bold; margin-bottom: 10px;">加入要求</div>
                        <div style="margin-bottom: 5px;">修为要求：${getRealmText(clan.minRealm) || '无要求'}</div>
                        <div style="margin-bottom: 5px;">贡献要求：${clan.joinContribution || 0}</div>
                        <div>推荐属性：${clan.recommendedAttributes || '无'}</div>
                    </div>
                    
                    <button class="join-btn" style="width: 100%;">申请加入 ${clan.name}</button>
                </div>
            `;
            
            modalBody.innerHTML = bodyContent;
            modalOverlay.classList.add('active');
            
            // 添加事件监听器
            setTimeout(() => {
                const joinBtn = modalBody.querySelector('.join-btn');
                if (joinBtn) {
                    joinBtn.addEventListener('click', () => {
                        joinClan(clan.name, clan.id);
                    });
                }
            }, 100);
        }
        
        // 关闭弹窗
        function closeModal() {
            const modalOverlay = document.getElementById('modalOverlay');
            if (modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        }
        
        // 显示加入失败弹窗
        function showJoinFailureModal(error) {
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            const modalOverlay = document.getElementById('modalOverlay');
            
            modalTitle.textContent = '申请失败';
            
            let errorMessage = '申请加入宗门失败，请稍后重试';
            if (error && error.message) {
                errorMessage = error.message;
            }
            
            let bodyContent = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="font-size: 48px; margin-bottom: 15px; color: #ff6b6b;">❌</div>
                    <div style="font-size: 16px; color: #ccc; margin-bottom: 20px;">${errorMessage}</div>
                </div>
                
                <button onclick="closeModal()" style="width: 100%; padding: 12px; border: 1px solid var(--accent-color); background: var(--accent-color); color: #1a252f; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s;">
                    确定
                </button>
            `;
            
            modalBody.innerHTML = bodyContent;
            modalOverlay.classList.add('active');
        }
        
        // 处理搜索
        function handleSearch(event) {
            const searchTerm = event.target.value.toLowerCase();
            const clanCards = document.querySelectorAll('.clan-card');
            
            clanCards.forEach(card => {
                const clanName = card.querySelector('.clan-name').textContent.toLowerCase();
                if (clanName.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
        
        // 页面加载完成后绑定事件监听器
        window.addEventListener('DOMContentLoaded', () => {
            console.log('DOM加载完成，绑定事件监听器');
            
            // 为所有申请加入按钮绑定事件
            document.body.addEventListener('click', (event) => {
                console.log('捕获到点击事件:', event.target);
                
                // 检查是否点击了申请加入按钮
                if (event.target.classList.contains('join-btn') || event.target.closest('.join-btn')) {
                    const btn = event.target.classList.contains('join-btn') ? event.target : event.target.closest('.join-btn');
                    const card = btn.closest('.clan-card');
                    if (card) {
                        const clanName = card.querySelector('.clan-name').textContent;
                        const clanId = card.dataset.id;
                        console.log('通过事件委托捕获到申请加入按钮点击:', { clanName, clanId });
                        joinClan(clanName, clanId);
                    }
                }
                
                // 检查是否点击了详情按钮
                if (event.target.classList.contains('detail-btn') || event.target.closest('.detail-btn')) {
                    const btn = event.target.classList.contains('detail-btn') ? event.target : event.target.closest('.detail-btn');
                    const card = btn.closest('.clan-card');
                    if (card) {
                        const clanId = card.dataset.id;
                        const clanName = card.querySelector('.clan-name').textContent;
                        console.log('通过事件委托捕获到详情按钮点击:', { clanId, clanName });
                        showClanDetail(clanId, clanName);
                    }
                }
            }, true);
        });
    </script>
</body>
</html>
