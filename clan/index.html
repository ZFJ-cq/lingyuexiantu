<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="../js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="../css/mobile-adapt.css">
  <title>灵月仙途 - 洞府</title>
  <style>
    :root {
      --gold-primary: #e6c749;
      --gold-light: #f4d03f;
      --gold-dim: #8a7525;
      --text-main: #fdfbf7;
      --text-dim: #d4c5a9;
      --bg-dark: rgba(15, 20, 35, 0.95);
      --bg-panel: rgba(20, 25, 45, 0.85);
      --border-glow: 0 0 10px rgba(230, 199, 73, 0.3);
      --success: #4CAF50;
      --danger: #ff4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Microsoft YaHei', 'SimSun', serif;
      background: linear-gradient(to bottom, #0f1420, #1a202c), 
                  url('https://images.unsplash.com/photo-1518063319789-7217e6706b04?q=80&w=2070&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 动态背景粒子 */
    .particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(var(--gold-primary) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: particleFloat 30s linear infinite;
      opacity: 0.15;
    }

    @keyframes particleFloat {
      from { background-position: 0 0; }
      to { background-position: 0 1000px; }
    }

    /* 主容器 */
    .main-container {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      overflow-y: auto;
      padding-bottom: 80px;
    }

    /* 顶部状态栏 */
    .top-status {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 15px;
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 10px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      position: relative;
    }

    .player-info {
      display: flex;
      align-items: center;
      gap: 10px;
      border-right: 1px solid rgba(230, 199, 73, 0.2);
      padding-right: 15px;
    }

    .player-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid var(--gold-primary);
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 0 10px rgba(230, 199, 73, 0.4);
      cursor: pointer;
      transition: transform 0.3s;
    }

    .player-avatar:hover { transform: scale(1.1); }

    .player-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .player-name {
      font-size: 1rem;
      color: var(--gold-primary);
      font-weight: bold;
      text-shadow: 0 0 5px rgba(230, 199, 73, 0.5);
    }

    .player-cultivation {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .resources-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      font-size: 0.75rem;
    }

    .resource-item {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,0,0,0.3);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: background 0.3s;
    }
    
    .resource-item:hover {
      background: rgba(230, 199, 73, 0.1);
    }

    .res-icon { font-size: 0.9rem; }
    .res-label { color: var(--text-dim); opacity: 0.8; }
    .res-value { color: var(--gold-light); font-weight: bold; white-space: nowrap; min-width: 45px; text-align: right;}

    /* 功能快捷键区 */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 10px;
      backdrop-filter: blur(10px);
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 5px;
      background: rgba(30, 35, 55, 0.6);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      width: 70px;
      height: 70px;
      margin: 0 auto;
      justify-content: center;
    }

    .action-btn:hover {
      background: rgba(230, 199, 73, 0.15);
      border-color: var(--gold-primary);
      transform: translateY(-3px);
      box-shadow: 0 0 10px rgba(230, 199, 73, 0.4);
    }

    .action-icon { font-size: 1.4rem; position: relative; margin-bottom: 3px; }

    .badge {
      position: absolute;
      top: 5px; right: 5px;
      background: var(--danger);
      color: white;
      font-size: 0.6rem;
      padding: 2px 5px;
      border-radius: 10px;
      border: 1px solid #fff;
      animation: pulseBadge 1.5s infinite;
      z-index: 10;
    }

    @keyframes pulseBadge {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .action-label { font-size: 0.7rem; color: var(--text-dim); text-align: center; width: 100%; }

    /* 核心修炼区 */
    .cultivation-core {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
      min-height: 200px;
    }

    .dual-cultivation {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex: 1;
      position: relative;
    }

    .cultivation-card {
      flex: 1;
      background: linear-gradient(135deg, rgba(30,35,55,0.9), rgba(20,25,45,0.95));
      border: 2px solid rgba(230, 199, 73, 0.4);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .cultivation-card::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(230,199,73,0.1) 0%, transparent 60%);
      animation: rotateBg 10s linear infinite;
      pointer-events: none;
    }

    @keyframes rotateBg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .cultivation-card:hover {
      border-color: var(--gold-primary);
      box-shadow: 0 0 20px rgba(230, 199, 73, 0.4);
      transform: scale(1.02);
    }

    .card-avatar { font-size: 3rem; filter: drop-shadow(0 0 10px rgba(230,199,73,0.6)); z-index: 1; animation: floatAvatar 3s ease-in-out infinite; }
    @keyframes floatAvatar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    .card-title { font-size: 1.1rem; color: var(--gold-primary); font-weight: bold; z-index: 1; text-shadow: 0 0 5px rgba(230,199,73,0.5); }
    .card-level { font-size: 0.8rem; color: var(--text-dim); z-index: 1; }
    .card-cost { font-size: 0.7rem; color: var(--gold-dim); background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(230,199,73,0.2); z-index: 1; }

    /* 效率条 */
    .efficiency-bar {
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 10px 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .eff-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-dim); }
    .eff-value { color: var(--success); font-weight: bold; }

    .progress-track {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold-primary), var(--gold-light));
      width: 0%;
      border-radius: 3px;
      animation: fillProgress 2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; width: 2px;
      background: #fff;
      box-shadow: 0 0 10px #fff;
    }

    @keyframes fillProgress { from { width: 0%; } to { width: 78%; } }

    /* 底部信息区 */
    .bottom-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      min-height: 180px;
    }

    .info-panel {
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 10px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      font-size: 0.9rem;
      color: var(--gold-primary);
      font-weight: bold;
      margin-bottom: 8px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(230, 199, 73, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .scroll-content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 4px;
    }

    .scroll-content::-webkit-scrollbar { width: 4px; }
    .scroll-content::-webkit-scrollbar-track { background: transparent; }
    .scroll-content::-webkit-scrollbar-thumb { background: rgba(230, 199, 73, 0.3); border-radius: 2px; }

    .list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      background: rgba(0,0,0,0.2);
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 2px solid transparent;
    }

    .list-item:hover {
      background: rgba(230, 199, 73, 0.1);
      border-left-color: var(--gold-primary);
      transform: translateX(2px);
    }

    .item-icon { font-size: 1rem; }
    .item-text { flex: 1; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-status { font-size: 0.65rem; padding: 1px 4px; border-radius: 3px; }
    .status-green { color: var(--success); background: rgba(76, 175, 80, 0.2); }
    .status-red { color: var(--danger); background: rgba(255, 68, 68, 0.2); }

    .log-item {
      font-size: 0.7rem;
      color: var(--text-dim);
      line-height: 1.4;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .log-tag { color: var(--gold-dim); margin-right: 4px; }

    /* 底部导航栏 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: linear-gradient(to top, rgba(15, 20, 35, 0.98), rgba(15, 20, 35, 0.8));
      border-top: 2px solid var(--gold-primary);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      box-shadow: 0 -5px 30px rgba(230, 199, 73, 0.4);
      backdrop-filter: blur(15px);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      color: var(--text-dim);
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 12px;
      transition: all 0.3s ease;
      position: relative;
      min-width: 70px;
    }

    .nav-item:hover {
      color: var(--gold-primary);
      background: rgba(230, 199, 73, 0.2);
      transform: translateY(-3px);
    }

    .nav-item.active {
      color: var(--gold-primary);
      background: rgba(230, 199, 73, 0.3);
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.5);
    }

    .nav-item.active::after {
      content: '';
      position: absolute;
      top: -8px;
      width: 25px;
      height: 4px;
      background: var(--gold-primary);
      border-radius: 0 0 4px 4px;
      box-shadow: 0 0 15px var(--gold-primary);
    }

    .nav-icon { font-size: 1.6rem; text-shadow: 0 0 10px rgba(230, 199, 73, 0.3); }
    .nav-text { font-size: 0.8rem; font-weight: 600; text-shadow: 0 0 5px rgba(230, 199, 73, 0.3); }
    .nav-item.active .nav-icon { animation: pulse 2s infinite; }

    @keyframes pulse {
      0% { text-shadow: 0 0 10px rgba(230, 199, 73, 0.3); }
      50% { text-shadow: 0 0 20px rgba(230, 199, 73, 0.8); }
      100% { text-shadow: 0 0 10px rgba(230, 199, 73, 0.3); }
    }

    /* 弹窗样式 */
    .popup-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .popup-overlay.active { opacity: 1; pointer-events: all; }

    .popup-content {
      background: var(--bg-panel);
      border: 2px solid var(--gold-primary);
      border-radius: 12px;
      padding: 20px;
      width: 85%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(230, 199, 73, 0.4);
      transform: scale(0.9);
      transition: transform 0.3s;
    }

    .popup-overlay.active .popup-content { transform: scale(1); }

    .popup-title { font-size: 1.2rem; color: var(--gold-primary); text-align: center; margin-bottom: 15px; font-weight: bold; }
    .popup-body { color: var(--text-dim); font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; text-align: center; }

    .popup-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, transparent, rgba(230,199,73,0.2), transparent);
      border: 1px solid var(--gold-primary);
      color: var(--gold-primary);
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .popup-btn:hover { background: rgba(230,199,73,0.3); box-shadow: 0 0 15px rgba(230,199,73,0.4); }

    /* 响应式调整 */
    @media (max-height: 700px) {
      .cultivation-core { min-height: 160px; }
      .card-avatar { font-size: 2.5rem; }
      .bottom-info { min-height: 140px; }
      .list-item { padding: 4px; font-size: 0.7rem; }
    }
    
    /* 加载动画 */
    .loading-skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 4px;
      color: transparent !important;
    }
    
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>

  </head>
<body>

  <!-- 背景粒子 -->
  <div class="particles"></div>

  <div class="main-container">
    
    <!-- 顶部状态栏 -->
    <div class="top-status">
      <div class="player-info">
        <div class="player-avatar" id="charAvatar">👤</div>
        <div class="player-details">
          <div class="player-name" id="charName">加载中...</div>
          <div class="player-cultivation" id="charLevel">加载中...</div>
        </div>
      </div>
      <div class="resources-grid" id="resourcesGrid">
        <!-- 资源将通过 JS 动态生成 -->
        <div class="resource-item"><span class="res-icon">⚡</span><span class="res-label">仙力</span><span class="res-value loading-skeleton">---</span></div>
        <div class="resource-item"><span class="res-icon">💎</span><span class="res-label">仙石</span><span class="res-value loading-skeleton">---</span></div>
        <div class="resource-item"><span class="res-icon">💰</span><span class="res-label">灵石</span><span class="res-value loading-skeleton">---</span></div>
        <div class="resource-item"><span class="res-icon">✨</span><span class="res-label">修为</span><span class="res-value loading-skeleton">---</span></div>
        <div class="resource-item"><span class="res-icon">🪨</span><span class="res-label">魂石</span><span class="res-value loading-skeleton">---</span></div>
        <div class="resource-item"><span class="res-icon">🌬️</span><span class="res-label">灵气</span><span class="res-value loading-skeleton">---</span></div>
      </div>
      <div class="mail-icon" onclick="showMailPopup()" style="position: absolute; top: 15px; right: 50px; cursor: pointer;">
        <i class="fas fa-envelope" style="font-size: 1.5rem; color: var(--gold-primary);"></i>
        <span class="badge" id="mailBadge" style="display: none;">0</span>
      </div>
    </div>

    <!-- 功能快捷键 -->
    <div class="quick-actions">
      <div class="action-btn" onclick="window.location.href='checkin.html'">
        <div class="action-icon">🎁<span class="badge" id="giftBadge" style="display:none;">0</span></div>
        <div class="action-label">福利</div>
      </div>
      <div class="action-btn" onclick="showPopup('修仙榜单', '全服修士战力排名，争锋夺魁！')">
        <div class="action-icon">🏆</div>
        <div class="action-label">榜单</div>
      </div>
      <div class="action-btn" onclick="showPopup('道友社交', '添加好友，组建宗门，共闯仙界！')">
        <div class="action-icon">👥</div>
        <div class="action-label">道友</div>
      </div>
      <div class="action-btn" onclick="window.location.href='inventory/inventory.html'">
        <div class="action-icon">🎒</div>
        <div class="action-label">背包</div>
      </div>
      <div class="action-btn" onclick="showPopup('任务大厅', '主线、支线、日常任务，奖励丰厚！')">
        <div class="action-icon">📋</div>
        <div class="action-label">任务</div>
      </div>
      <div class="action-btn" onclick="showPopup('仙缘商城', '琳琅满目，应有尽有，童叟无欺！')">
        <div class="action-icon">🛒</div>
        <div class="action-label">商城</div>
      </div>
      <div class="action-btn" onclick="showPopup('宗门大殿', '加入宗门，学习功法，参与国战！')">
        <div class="action-icon">🏯</div>
        <div class="action-label">宗门</div>
      </div>
      <div class="action-btn" onclick="window.location.href='settings/settings.html'">
        <div class="action-icon">⚙️</div>
        <div class="action-label">设置</div>
      </div>
    </div>

    <!-- 核心修炼区 -->
    <div class="cultivation-core">
      <div class="dual-cultivation">
        <div class="cultivation-card" id="cardImmortal" onclick="handleCardClick('immortal')">
          <div class="card-avatar">🧚‍️</div>
          <div class="card-title">渡仙</div>
          <div class="card-level" id="immortalLevel">加载中...</div>
          <div class="card-cost" id="immortalCost">加载中...</div>
        </div>
        <div class="cultivation-card" id="cardBody" onclick="handleCardClick('body')">
          <div class="card-avatar">🥋</div>
          <div class="card-title">炼体</div>
          <div class="card-level" id="bodyLevel">加载中...</div>
          <div class="card-cost" id="bodyCost">加载中...</div>
        </div>
      </div>
      
      <div class="efficiency-bar">
        <div class="eff-info">
          <span>修炼效率</span>
          <span class="eff-value" id="effValue">加载中...</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="effProgress"></div>
        </div>
      </div>
    </div>

    <!-- 底部信息区 -->
    <div class="bottom-info">
      <!-- 活动列表 -->
      <div class="info-panel">
        <div class="panel-header">
          <span>🔥 精彩活动</span>
          <span style="font-size:0.7rem; opacity:0.7;">更多 ></span>
        </div>
        <div class="scroll-content" id="activityList">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 系统日志 -->
      <div class="info-panel">
        <div class="panel-header">
          <span>📜 三界传闻</span>
          <span style="font-size:0.7rem; opacity:0.7;" onclick="clearLogs()">清除</span>
        </div>
        <div class="scroll-content" id="systemLog">
          <!-- 动态生成 -->
        </div>
      </div>
    </div>

  </div>

  <!-- 底部导航 -->
  <nav class="bottom-nav" role="navigation" aria-label="主导航">
    <a href="../index.html" class="nav-item" aria-label="修炼页面">
      <div class="nav-icon">🧘</div>
      <div class="nav-text">修炼</div>
    </a>
    <a href="../skills/skills.html" class="nav-item" aria-label="功法页面">
      <div class="nav-icon">📜</div>
      <div class="nav-text">功法</div>
    </a>
    <a href="clan.html" class="nav-item active" aria-label="宗门页面" aria-current="page">
      <div class="nav-icon">🏯</div>
      <div class="nav-text">宗门</div>
    </a>
    <a href="../word/world.html" class="nav-item" aria-label="仙途页面">
      <div class="nav-icon">🌌</div>
      <div class="nav-text">仙途</div>
    </a>
    <a href="../map/map.html" class="nav-item" aria-label="云游页面">
      <div class="nav-icon">🗺️</div>
      <div class="nav-text">云游</div>
    </a>
  </nav>

  <!-- 通用弹窗 -->
  <div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">
    <div class="popup-content" onclick="event.stopPropagation()">
      <div class="popup-title" id="popupTitle">标题</div>
      <div class="popup-body" id="popupBody">内容</div>
      <button class="popup-btn" onclick="closePopup()">确定</button>
    </div>
  </div>

  <!-- 邮件弹窗 -->
  <div class="popup-overlay" id="mailPopupOverlay" onclick="closeMailPopup(event)">
    <div class="popup-content" onclick="event.stopPropagation()" style="max-height: 80vh; overflow-y: auto;">
      <div class="popup-title">邮件中心</div>
      <div class="mail-list" id="mailList" style="display: flex; flex-direction: column; gap: 10px;">
        <!-- 邮件动态生成 -->
      </div>
      <button class="popup-btn" onclick="closeMailPopup()" style="margin-top: 20px;">关闭</button>
    </div>
  </div>
  
  <!-- 登录成功弹窗 -->
  <div class="popup-overlay" id="loginSuccessPopup" onclick="closeLoginSuccessPopup(event)">
    <div class="popup-content" onclick="event.stopPropagation()" style="max-width: 350px;">
      <div class="popup-title">闭关修炼</div>
      <div class="popup-body" style="text-align: left;" id="loginStatsBody">
        <!-- 动态填充 -->
      </div>
      <button class="popup-btn" onclick="closeLoginSuccessPopup()">知道了</button>
    </div>
  </div>

  <script>
    /**
     * 模拟后端 API 服务
     * 在实际项目中，请替换为真实的 fetch/axios 请求
     */
    const MockAPI = {
      // 模拟网络延迟
      delay: (ms) => new Promise(resolve => setTimeout(resolve, ms)),

      // 获取角色基本信息
      async getRoleInfo() {
        await this.delay(500);
        return {
          id: 1001,
          name: "李逍遥",
          realm: "筑基初期",
          spiritRoot: "five", // five, fire, water, etc.
          immortalLevel: "九天玄仙 3 阶",
          immortalCost: 90000000,
          bodyLevel: "渡劫肉身 1 层",
          bodyCost: 1380000000,
          efficiency: { current: 8700, max: 17400, percent: 431 }
        };
      },

      // 获取资源列表
      async getResources() {
        await this.delay(600);
        return [
          { type: 'xianli', name: '仙力', icon: '⚡', value: 87720000 },
          { type: 'xianshi', name: '仙石', icon: '💎', value: 11600 },
          { type: 'lingshi', name: '灵石', icon: '💰', value: 1545000000 },
          { type: 'xiuwei', name: '修为', icon: '✨', value: 687000000 },
          { type: 'hunshi', name: '魂石', icon: '🪨', value: 55100000 },
          { type: 'lingqi', name: '灵气', icon: '🌬️', value: 553000000 }
        ];
      },

      // 获取活动列表
      async getActivities() {
        await this.delay(400);
        return [
          { id: 1, title: '新春庆典·登录送豪礼', status: '进行中', type: 'green', icon: '🎊' },
          { id: 2, title: '超值礼包·限时折扣', status: '热卖', type: 'red', icon: '🎁' },
          { id: 3, title: '跨界争霸·正式开启', status: 'PVP', type: 'green', icon: '⚔️' },
          { id: 4, title: '湖底秘宝·寻宝探险', status: '挑战', type: 'green', icon: '💎' }
        ];
      },

      // 获取系统日志
      async getSystemLogs() {
        await this.delay(300);
        return [
          { type: '系统', content: '晴朗初春日，高心望素云。彩光浮玉辇，紫气隐元君。' },
          { type: '系统', content: '灵师中天去，道随上界分。遥骑白鹤下，人在太虚层。' },
          { type: '宗门', content: '缥缈地窟道尊 [340.轰雷] 游历归来，回归修真大世界！' },
          { type: '世界', content: '玩家“剑断万古”成功突破元婴期，特发全服公告！' }
        ];
      },

      // 获取邮件
      async getMails() {
        await this.delay(400);
        return [
          {
            id: 1,
            title: '系统通知',
            content: '欢迎加入灵月仙途！这是你的新手礼包，请查收。',
            items: [{ name: '聚气丹', quantity: 10, icon: '💊' }, { name: '灵石', quantity: 100, icon: '💰' }],
            read: false,
            time: '2026-03-05 10:00'
          },
          {
            id: 2,
            title: '背包装满通知',
            content: '你的背包已满，以下物品已发送到邮件中。',
            items: [{ name: '七星草', quantity: 5, icon: '🌿' }, { name: '一阶妖丹', quantity: 1, icon: '💎' }],
            read: false,
            time: '2026-03-05 09:30'
          }
        ];
      }
    };

    // 工具函数：格式化数字 (10000 -> 1w, 100000000 -> 1 亿)
    function formatNumber(num) {
      if (num >= 100000000) {
        return (num / 100000000).toFixed(2) + ' 亿';
      } else if (num >= 10000) {
        return (num / 10000).toFixed(2) + 'w';
      }
      return num.toString();
    }

    // 工具函数：根据灵根设置头像
    function getAvatarBySpiritRoot(root) {
      const map = {
        'fire': '🔥', 'water': '💧', 'wood': '🌿', 'metal': '⚔️', 'earth': '⛰️',
        'five': '🌈', 'lightning': '⚡'
      };
      return map[root] || '👤';
    }

    // 全局状态
    let gameState = {
      role: null,
      resources: [],
      activities: [],
      logs: [],
      mails: []
    };

    // 初始化
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const roleId = window.getRoleId ? window.getRoleId() : localStorage.getItem('currentRoleId');
        let roleData, resData, actData, logData, mailData;
        
        try {
          const results = await Promise.allSettled([
            roleId ? window.apiService.getRoleById(roleId) : Promise.reject('无角色ID'),
            roleId ? window.apiService.getAssets(roleId) : Promise.reject('无角色ID'),
            window.apiService.get('/activity/list').catch(() => null),
            window.apiService.get('/system/logs').catch(() => null),
            roleId ? window.apiService.getMails(roleId) : Promise.reject('无角色ID')
          ]);
          
          if (results[0].status === 'fulfilled' && results[0].value) {
            roleData = results[0].value;
          } else {
            roleData = MockAPI.getRoleInfo();
          }
          if (results[1].status === 'fulfilled' && results[1].value) {
            resData = results[1].value;
          } else {
            resData = MockAPI.getResources();
          }
          actData = results[2].status === 'fulfilled' && results[2].value ? results[2].value : MockAPI.getActivities();
          logData = results[3].status === 'fulfilled' && results[3].value ? results[3].value : MockAPI.getSystemLogs();
          mailData = results[4].status === 'fulfilled' && results[4].value ? results[4].value : MockAPI.getMails();
        } catch (apiError) {
          console.warn('API加载失败，使用备用数据:', apiError);
          [roleData, resData, actData, logData, mailData] = await Promise.all([
            MockAPI.getRoleInfo(),
            MockAPI.getResources(),
            MockAPI.getActivities(),
            MockAPI.getSystemLogs(),
            MockAPI.getMails()
          ]);
        }

        gameState = {
          role: roleData,
          resources: resData,
          activities: actData,
          logs: logData,
          mails: mailData
        };

        renderUI();
        
        // 检查是否首次登录显示统计弹窗
        const hasShown = localStorage.getItem('loginStatsShown');
        if (!hasShown) {
          setTimeout(() => {
            showLoginStats();
            localStorage.setItem('loginStatsShown', 'true');
          }, 1000);
        }

      } catch (error) {
        console.error("数据加载失败:", error);
        showPopup("加载失败", "无法连接仙界服务器，请稍后重试。");
      }
    });

    // 渲染 UI 主函数
    function renderUI() {
      const { role, resources, activities, logs, mails } = gameState;

      // 1. 渲染角色信息
      document.getElementById('charName').textContent = role.name;
      document.getElementById('charLevel').textContent = role.realm;
      document.getElementById('charAvatar').textContent = getAvatarBySpiritRoot(role.spiritRoot);

      // 2. 渲染资源
      const resGrid = document.getElementById('resourcesGrid');
      resGrid.innerHTML = resources.map(res => `
        <div class="resource-item">
          <span class="res-icon">${res.icon}</span>
          <span class="res-label">${res.name}</span>
          <span class="res-value">${formatNumber(res.value)}</span>
        </div>
      `).join('');

      // 3. 渲染修炼卡片
      document.getElementById('immortalLevel').textContent = role.immortalLevel;
      document.getElementById('immortalCost').textContent = `消耗：${formatNumber(role.immortalCost)} 魂石`;
      
      document.getElementById('bodyLevel').textContent = role.bodyLevel;
      document.getElementById('bodyCost').textContent = `消耗：${formatNumber(role.bodyCost)} 修为`;

      // 4. 渲染效率条
      const effText = `${formatNumber(role.efficiency.current)}-${formatNumber(role.efficiency.max)}/5s (+${role.efficiency.percent}%)`;
      document.getElementById('effValue').textContent = effText;
      // 模拟进度条动画重置
      const progress = document.getElementById('effProgress');
      progress.style.width = '0%';
      setTimeout(() => {
        progress.style.width = '78%'; // 这里可以动态计算百分比
      }, 100);

      // 5. 渲染活动列表
      const actList = document.getElementById('activityList');
      actList.innerHTML = activities.map(act => `
        <div class="list-item" onclick="showToast('进入活动：${act.title}')">
          <span class="item-icon">${act.icon}</span>
          <span class="item-text">${act.title}</span>
          <span class="item-status status-${act.type}">${act.status}</span>
        </div>
      `).join('');

      // 6. 渲染系统日志
      const logContainer = document.getElementById('systemLog');
      logContainer.innerHTML = logs.map(log => `
        <div class="log-item">
          <span class="log-tag">[${log.type}]</span>${log.content}
        </div>
      `).join('');

      // 7. 更新邮件角标
      const unreadCount = mails.filter(m => !m.read).length;
      const badge = document.getElementById('mailBadge');
      if (unreadCount > 0) {
        badge.textContent = unreadCount;
        badge.style.display = 'block';
      } else {
        badge.style.display = 'none';
      }
      
      // 福利角标模拟
      const giftBadge = document.getElementById('giftBadge');
      if (Math.random() > 0.5) {
        giftBadge.textContent = '3';
        giftBadge.style.display = 'block';
      }
    }

    // 交互逻辑
    function handleCardClick(type) {
      const { role } = gameState;
      if (type === 'immortal') {
        showPopup('渡仙修炼', `提升仙阶，解锁更强神通！\n当前：${role.immortalLevel}\n消耗：${formatNumber(role.immortalCost)} 魂石`);
      } else {
        showPopup('炼体修炼', `淬炼肉身，金刚不坏！\n当前：${role.bodyLevel}\n消耗：${formatNumber(role.bodyCost)} 修为`);
      }
    }

    function showLoginStats() {
      const { role, resources } = gameState;
      const xiuwei = resources.find(r => r.type === 'xiuwei')?.value || 0;
      const lingshi = resources.find(r => r.type === 'lingshi')?.value || 0;
      
      const html = `
        <div style="margin-bottom: 15px; text-align: center;">
          <div style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px;">武学修炼</div>
          <div style="color: #4CAF50; margin-bottom: 5px;">内力：${formatNumber(Math.floor(xiuwei * 0.8))}</div>
          <div style="color: #9370DB; margin-bottom: 5px;">内力：${formatNumber(Math.floor(xiuwei * 1.2))} (君山)</div>
          <div style="color: var(--gold-primary); margin-bottom: 15px;">悟性：${formatNumber(Math.floor(xiuwei * 0.05))}</div>
          <div style="margin-top: 20px; margin-bottom: 10px; font-size: 1.2rem; font-weight: bold;">江湖变迁</div>
          <div style="margin-bottom: 5px;">江湖名望：18</div>
          <div style="margin-bottom: 5px;">身家财产：${formatNumber(lingshi)}</div>
          <div style="margin-bottom: 5px;">门派贡献：180</div>
        </div>
      `;
      document.getElementById('loginStatsBody').innerHTML = html;
      document.getElementById('loginSuccessPopup').classList.add('active');
    }

    function closeLoginSuccessPopup(e) {
      if (!e || e.target === document.getElementById('loginSuccessPopup')) {
        document.getElementById('loginSuccessPopup').classList.remove('active');
      }
    }

    function showPopup(title, content) {
      document.getElementById('popupTitle').textContent = title;
      document.getElementById('popupBody').innerHTML = content.replace(/\n/g, '<br>');
      document.getElementById('popupOverlay').classList.add('active');
    }

    function closePopup(e) {
      if (!e || e.target === document.getElementById('popupOverlay')) {
        document.getElementById('popupOverlay').classList.remove('active');
      }
    }

    function showMailPopup() {
      const mailList = document.getElementById('mailList');
      mailList.innerHTML = '';
      
      if (gameState.mails.length === 0) {
        mailList.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 20px;">暂无邮件</div>';
      } else {
        gameState.mails.forEach(email => {
          const item = document.createElement('div');
          item.style.cssText = `
            background: rgba(30, 35, 55, 0.6);
            border: 1px solid ${email.read ? 'rgba(230, 199, 73, 0.1)' : 'var(--gold-primary)'};
            border-left: ${email.read ? '1px' : '3px'} solid ${email.read ? 'rgba(230, 199, 73, 0.1)' : 'var(--gold-primary)'};
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
          `;
          item.innerHTML = `
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
              <h4 style="color: var(--gold-primary); font-size: 0.9rem; margin: 0;">${email.title}</h4>
              <span style="font-size: 0.7rem; color: var(--text-dim);">${email.time}</span>
            </div>
            <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 10px;">${email.content}</p>
            ${email.items ? `
              <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px;">
                ${email.items.map(i => `<span style="font-size:0.7rem; background:rgba(0,0,0,0.3); padding:2px 5px; border-radius:3px;">${i.icon}${i.name}×${i.quantity}</span>`).join('')}
              </div>
            ` : ''}
            <button onclick="claimMail(${email.id})" style="width:100%; padding:5px; background:transparent; border:1px solid var(--gold-primary); color:var(--gold-primary); border-radius:4px; cursor:pointer; font-size:0.8rem;">
              ${email.read ? '已领取' : '领取附件'}
            </button>
          `;
          mailList.appendChild(item);
        });
      }
      
      document.getElementById('mailPopupOverlay').classList.add('active');
    }

    function closeMailPopup(e) {
      if (!e || e.target === document.getElementById('mailPopupOverlay')) {
        document.getElementById('mailPopupOverlay').classList.remove('active');
      }
    }

    function claimMail(id) {
      const email = gameState.mails.find(m => m.id === id);
      if (email && !email.read) {
        email.read = true;
        showPopup('领取成功', `成功领取邮件附件！`);
        showMailPopup(); // 刷新列表
        // 更新角标
        const unreadCount = gameState.mails.filter(m => !m.read).length;
        const badge = document.getElementById('mailBadge');
        badge.textContent = unreadCount;
        if (unreadCount === 0) badge.style.display = 'none';
      }
    }

    function clearLogs() {
      document.getElementById('systemLog').innerHTML = '<div style="text-align:center; color:var(--text-dim); padding:10px;">日志已清空</div>';
    }

    // 自动滚动日志
    setInterval(() => {
      const container = document.getElementById('systemLog');
      if (container.scrollHeight > container.clientHeight) {
        container.scrollTop += 1;
        if (container.scrollHeight - container.scrollTop <= container.clientHeight + 5) {
          container.scrollTop = 0;
        }
      }
    }, 50);

  </script>
  <script src="../js/store.js"></script>
  <script src="../js/api-service.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/ui-components.js"></script>
</body>
