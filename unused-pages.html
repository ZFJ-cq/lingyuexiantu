<!DOCTYPE html>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    .stat-card h3 {
      color: #667eea;
      font-size: 2rem;
      margin-bottom: 5px;
    }

    .stat-card p {
      color: #666;
      font-size: 0.9rem;
    }

    .category {
      background: white;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .category-title {
      font-size: 1.5rem;
      color: #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .category-title .icon {
      font-size: 1.8rem;
    }

    .category-count {
      background: #667eea;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: bold;
    }

    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 15px;
    }

    .page-item {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      transition: all 0.3s ease;
      border-left: 4px solid #667eea;
    }

    .page-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
      background: white;
    }

    .page-item a {
      text-decoration: none;
      color: #333;
      display: block;
    }

    .page-item .path {
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #667eea;
      word-break: break-all;
      margin-bottom: 8px;
      padding: 5px;
      background: rgba(102, 126, 234, 0.1);
      border-radius: 4px;
    }

    .page-item .name {
      font-size: 0.95rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 5px;
    }

    .page-item .type {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .type-test {
      background: #fee;
      color: #c33;
    }

    .type-debug {
      background: #eef;
      color: #33c;
    }

    .type-admin {
      background: #efe;
      color: #3c3;
    }

    .type-old {
      background: #ffe;
      color: #c93;
    }

    .type-backup {
      background: #eee;
      color: #666;
    }

    .type-other {
      background: #e8f4f8;
      color: #29b;
    }

    .actions {
      text-align: center;
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    .search-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .search-box input {
      width: 100%;
      padding: 12px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }

    .search-box input:focus {
      outline: none;
      border-color: #667eea;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8rem;
      }

      .page-grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    let allPages = [];

    function init() {
      const container = document.getElementById('categories-container');
      let total = 0, test = 0, debug = 0, admin = 0;

      for (const [categoryName, categoryData] of Object.entries(unusedPages)) {
        const count = categoryData.pages.length;
        total += count;

        if (categoryName.includes('测试')) test += count;
        if (categoryName.includes('调试')) debug += count;
        if (categoryName.includes('管理')) admin += count;

        const categoryDiv = document.createElement('div');
        categoryDiv.className = 'category';
        categoryDiv.innerHTML = `
          <div class="category-header">
            <h2 class="category-title">
              <span class="icon">${categoryData.icon}</span>
              ${categoryName}
            </h2>
            <span class="category-count">${count} 个页面</span>
          </div>
          <div class="page-grid" id="category-${categoryName.replace(/\s+/g, '-')}"></div>
        `;

        container.appendChild(categoryDiv);
        const grid = categoryDiv.querySelector('.page-grid');

        categoryData.pages.forEach(page => {
          const pageItem = document.createElement('div');
          pageItem.className = 'page-item';
          pageItem.dataset.search = `${page.path} ${page.name}`.toLowerCase();
          pageItem.innerHTML = `
            <a href="${page.path}" target="_blank">
              <div class="path">${page.path}</div>
              <div class="name">${page.name}</div>
              <span class="type ${categoryData.typeClass}">${categoryName.split(' ')[0]}</span>
            </a>
          `;
          grid.appendChild(pageItem);
          allPages.push({ path: page.path, name: page.name, category: categoryName });
        });
      }

      document.getElementById('total-count').textContent = total;
      document.getElementById('test-count').textContent = test;
      document.getElementById('debug-count').textContent = debug;
      document.getElementById('admin-count').textContent = admin;
    }

    function filterPages() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const pageItems = document.querySelectorAll('.page-item');

      pageItems.forEach(item => {
        const searchText = item.dataset.search;
        if (searchText.includes(searchTerm)) {
          item.style.display = 'block';
        } else {
          item.style.display = 'none';
        }
      });
    }

    init();
  </script>
