<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="../js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="../css/mobile-adapt.css">
  <title>灵月仙途 - 任务系统</title>
  <style>
    :root {
      --gold-primary: #e6c749;
      --gold-light: #f4d03f;
      --gold-dim: #8a7525;
      --text-main: #fdfbf7;
      --text-dim: #d4c5a9;
      --bg-dark: rgba(15, 20, 35, 0.95);
      --bg-panel: rgba(20, 25, 45, 0.85);
      --border-glow: 0 0 10px rgba(230, 199, 73, 0.3);
      --success: #4CAF50;
      --danger: #ff4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Microsoft YaHei', 'SimSun', serif;
      background: linear-gradient(to bottom, #0f1420, #1a202c), 
                  url('https://images.unsplash.com/photo-1518063319789-7217e6706b04?q=80&w=2070&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(var(--gold-primary) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: particleFloat 30s linear infinite;
      opacity: 0.15;
    }

    @keyframes particleFloat {
      from { background-position: 0 0; }
      to { background-position: 0 1000px; }
    }

    .main-container {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 15px;
      overflow-y: auto;
      padding-bottom: 80px;
    }

    .back-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 100;
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--gold-primary);
      color: var(--gold-primary);
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(230, 199, 73, 0.2);
    }

    .activity-panel {
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .panel-title {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--gold-primary);
      margin-bottom: 15px;
      text-align: center;
      border-bottom: 1px solid rgba(230, 199, 73, 0.3);
      padding-bottom: 10px;
    }

    .activity-bar {
      margin-bottom: 15px;
    }

    .activity-bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      font-size: 1rem;
      color: var(--gold-primary);
    }

    .activity-bar-container {
      height: 30px;
      background: rgba(0,0,0,0.5);
      border-radius: 15px;
      overflow: hidden;
      border: 2px solid var(--gold-primary);
    }

    .activity-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #e6c749, #f4d03f);
      transition: width 0.3s;
      border-radius: 15px;
    }

    .activity-rewards {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 5px;
    }

    .activity-reward {
      flex-shrink: 0;
      width: 70px;
      padding: 8px;
      background: rgba(0,0,0,0.4);
      border: 2px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .activity-reward.available {
      border-color: var(--success);
    }

    .activity-reward.claimed {
      border-color: var(--text-dim);
      opacity: 0.5;
    }

    .activity-reward.can-claim {
      border-color: var(--gold-primary);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(230, 199, 73, 0.3); }
      50% { box-shadow: 0 0 20px rgba(230, 199, 73, 0.7); }
    }

    .activity-reward-threshold {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-bottom: 3px;
    }

    .activity-reward-name {
      font-size: 0.75rem;
      font-weight: bold;
      color: var(--text-main);
    }

    .tabs {
      display: flex;
      gap: 10px;
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      backdrop-filter: blur(10px);
    }

    .tab {
      flex: 1;
      padding: 10px;
      background: rgba(30, 35, 55, 0.6);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 20px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
      font-size: 0.9rem;
      text-align: center;
    }

    .tab.active {
      background: var(--gold-primary);
      color: #1a2a3a;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(230, 199, 73, 0.5);
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .task-card {
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 10px;
      padding: 15px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }

    .task-card:hover {
      border-color: var(--gold-primary);
      box-shadow: 0 0 20px rgba(230, 199, 73, 0.3);
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .task-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--gold-primary);
    }

    .task-type-badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 10px;
      background: rgba(230, 199, 73, 0.2);
      color: var(--gold-primary);
    }

    .task-desc {
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .task-progress {
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .progress-text {
      font-size: 0.85rem;
      color: var(--text-main);
      margin-bottom: 5px;
    }

    .progress-bar {
      height: 15px;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
      transition: width 0.3s;
      border-radius: 8px;
    }

    .task-rewards {
      font-size: 0.85rem;
      color: var(--success);
      margin-bottom: 10px;
    }

    .task-buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-size: 0.9rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #e6c749, #c9a227);
      color: #1a2a3a;
    }

    .btn-primary:hover {
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.5);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #aaa;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 20, 30, 0.95);
      border-top: 2px solid rgba(230, 175, 55, 0.3);
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      z-index: 1000;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #aaa;
      text-decoration: none;
      font-size: 12px;
      transition: all 0.3s;
    }

    .nav-item.active {
      color: #d4af37;
    }

    .nav-icon {
      font-size: 20px;
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      color: var(--text-main);
      padding: 20px 40px;
      border-radius: 10px;
      border: 2px solid var(--gold-primary);
      font-size: 1.2rem;
      z-index: 2000;
      display: none;
      text-align: center;
    }

    .toast.show {
      display: block;
      animation: fadeInOut 2s ease-in-out;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      20%, 80% { opacity: 1; }
    }
  </style>

  </head>
<body>
  <div class="particles"></div>
  
  <button class="back-btn" onclick="goBack()">← 返回</button>

  <div class="main-container">
    
    <!-- 活跃度面板 -->
    <div class="activity-panel">
      <div class="panel-title">🔥 今日活跃度</div>
      
      <div class="activity-bar">
        <div class="activity-bar-label">
          <span>活跃度</span>
          <span id="activityValue">0 / 100</span>
        </div>
        <div class="activity-bar-container">
          <div class="activity-bar-fill" id="activityBarFill" style="width: 0%"></div>
        </div>
      </div>
      
      <div class="activity-rewards" id="activityRewards">
      </div>
    </div>
    
    <!-- 标签页 -->
    <div class="tabs">
      <div class="tab active" data-tab="daily">日常任务</div>
      <div class="tab" data-tab="my">我的任务</div>
    </div>
    
    <!-- 任务列表 -->
    <div class="task-list" id="taskList">
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <div class="nav-icon">🧘</div>
      <div class="nav-text">修炼</div>
    </a>
    <a href="tasks.html" class="nav-item active">
      <div class="nav-icon">📋</div>
      <div class="nav-text">任务</div>
    </a>
    <a href="../skills/skills.html" class="nav-item">
      <div class="nav-icon">📜</div>
      <div class="nav-text">功法</div>
    </a>
    <a href="javascript:void(0)" onclick="window.pageUtils.navigateToGuildPage()" class="nav-item">
      <div class="nav-icon">🏯</div>
      <div class="nav-text">宗门</div>
    </a>
    <a href="../map/map.html" class="nav-item">
      <div class="nav-icon">🗺️</div>
      <div class="nav-text">云游</div>
    </a>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/config.js"></script>
  <script src="../js/auth-service.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/api-service.js"></script>
  <script src="../js/common.js"></script>
  <script>
    let roleId = null;
    
    let dailyTasks = [];
    let myTasks = [];
    let activityInfo = null;
    let currentTab = 'daily';
    
    async function init() {
      // 获取角色 ID
      roleId = window.getRoleId ? window.getRoleId() : (window.APP_CONFIG.currentRoleId || localStorage.getItem('roleId'));
      
      if (!roleId) {
        const userId = localStorage.getItem('userId');
        if (userId) {
          const roles = await apiService.getRole(userId);
          if (roles && roles.length > 0) {
            roleId = roles[0].id;
            localStorage.setItem('roleId', roleId);
            window.APP_CONFIG.currentRoleId = roleId;
          }
        }
      }
      
      if (!roleId) {
        alert('请先创建角色！');
        window.location.href = '../character-create/character-create-step1.html';
        return;
      }
      
      console.log('任务页面初始化，roleId:', roleId);
      await refreshDailyTasks();
      await loadActivityInfo();
      await loadDailyTasks();
      await loadMyTasks();
      setupTabs();
      renderTasks();
    }
    
    async function refreshDailyTasks() {
      try {
        await apiService.post('/task/refresh/' + roleId, {});
      } catch (error) {
        console.error('刷新任务失败:', error);
      }
    }
    
    async function loadActivityInfo() {
      try {
        const result = await apiService.get('/activity/activity-info/' + roleId);
        activityInfo = result.data || result;
        renderActivity();
      } catch (error) {
        console.error('加载活跃度失败:', error);
      }
    }
    
    async function loadDailyTasks() {
      try {
        const result = await apiService.get('/task/list/' + roleId);
        const taskList = Array.isArray(result) ? result : (result.data || result.tasks || []);
        dailyTasks = taskList.filter(t => t.taskType === 'daily');
      } catch (error) {
        console.error('加载日常任务失败:', error);
      }
    }
    
    async function loadMyTasks() {
      try {
        const result = await apiService.get('/task/list/' + roleId);
        const taskList = Array.isArray(result) ? result : (result.data || result.tasks || []);
        myTasks = taskList;
      } catch (error) {
        console.error('加载我的任务失败:', error);
      }
    }
    
    function setupTabs() {
      const tabs = document.querySelectorAll('.tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', function() {
          tabs.forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          currentTab = this.dataset.tab;
          renderTasks();
        });
      });
    }
    
    function renderActivity() {
      if (!activityInfo) return;
      
      const activity = Math.min(activityInfo.dailyActivity, 100);
      document.getElementById('activityValue').textContent = `${activity} / 100`;
      document.getElementById('activityBarFill').style.width = activity + '%';
      
      const rewardsContainer = document.getElementById('activityRewards');
      rewardsContainer.innerHTML = '';
      
      if (activityInfo.availableRewards) {
        activityInfo.availableRewards.forEach(reward => {
          const div = document.createElement('div');
          div.className = 'activity-reward';
          
          if (reward.claimed) {
            div.classList.add('claimed');
          } else if (reward.available) {
            div.classList.add('can-claim');
            div.onclick = () => claimActivityReward(reward.id);
          } else {
            div.classList.add('available');
          }
          
          div.innerHTML = `
            <div class="activity-reward-threshold">${reward.activityThreshold}</div>
            <div class="activity-reward-name">${reward.name}</div>
          `;
          
          rewardsContainer.appendChild(div);
        });
      }
    }
    
    function renderTasks() {
      const taskList = document.getElementById('taskList');
      taskList.innerHTML = '';
      
      let tasks = currentTab === 'daily' ? dailyTasks : myTasks;
      
      if (currentTab === 'daily') {
        const acceptedTaskIds = myTasks.map(t => t.taskId);
        tasks = dailyTasks.filter(t => !acceptedTaskIds.includes(t.id));
      }
      
      if (tasks.length === 0) {
        taskList.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 50px;">暂无任务</div>';
        return;
      }
      
      tasks.forEach(task => {
        const taskCard = createTaskCard(task);
        taskList.appendChild(taskCard);
      });
    }
    
    function createTaskCard(task) {
      const card = document.createElement('div');
      card.className = 'task-card';
      
      const isMyTask = currentTab === 'my';
      const roleTask = isMyTask ? task : null;
      const taskInfo = isMyTask ? task.task : task;
      
      const typeName = getSubTypeName(taskInfo.subType);
      const progress = roleTask ? roleTask.currentProgress || 0 : 0;
      const targetCount = taskInfo.targetCount || 1;
      const status = roleTask ? roleTask.status : 0;
      
      let buttonsHTML = '';
      
      if (!isMyTask) {
        buttonsHTML = `<button class="btn btn-primary" onclick="acceptTask(${taskInfo.id})">接取任务</button>`;
      } else {
        if (status === 1) {
          buttonsHTML = `
            <span class="progress-text">进度：${progress}/${roleTask.targetCount || '?'}</span>
            <button class="btn btn-secondary" onclick="abandonTask(${roleTask.taskId})">放弃</button>
          `;
        } else if (status === 2) {
          buttonsHTML = `<button class="btn btn-primary" onclick="claimReward(${roleTask.taskId})">领取奖励</button>`;
        } else if (status === 3) {
          buttonsHTML = `<div style="text-align: center; color: var(--success); padding: 10px;">已完成</div>`;
        }
      }
      
      let progressHTML = '';
      if (isMyTask && status < 3) {
        const progressPercent = Math.min((progress / targetCount) * 100, 100);
        progressHTML = `
          <div class="task-progress">
            <div class="progress-text">进度：${progress} / ${targetCount}</div>
            <div class="progress-bar">
              <div class="progress-bar-fill" style="width: ${progressPercent}%"></div>
            </div>
          </div>
        `;
      }
      
      card.innerHTML = `
        <div class="task-header">
          <div class="task-name">${taskInfo.name}</div>
          <span class="task-type-badge">${typeName}</span>
        </div>
        <div class="task-desc">${taskInfo.description}</div>
        ${progressHTML}
        <div class="task-rewards">
          奖励：修为×${taskInfo.rewardXiuwei || 0} | 灵石×${taskInfo.rewardLingshi || 0} | 活跃度×${taskInfo.rewardActivity || 0}
          ${taskInfo.rewardClanContribution ? ` | 贡献×${taskInfo.rewardClanContribution}` : ''}
        </div>
        <div class="task-buttons">
          ${buttonsHTML}
        </div>
      `;
      
      return card;
    }
    
    function getSubTypeName(subType) {
      const typeMap = {
        'COLLECT': '采集',
        'HUNT': '狩猎',
        'INTERACT': '交互',
        'CONSUME': '消耗'
      };
      return typeMap[subType] || '日常';
    }
    
    async function acceptTask(taskId) {
      try {
        await apiService.post('/task/' + taskId + '/accept', { roleId: roleId });
        showToast('任务接取成功！');
        await loadMyTasks();
        renderTasks();
      } catch (error) {
        console.error('接取任务失败:', error);
        showToast(error.message || '任务接取失败');
      }
    }
    
    async function abandonTask(taskId) {
      if (!taskId) return;
      window.uiComponents.showConfirmDialog('放弃任务', '确定要放弃这个任务吗？', async () => {
        try {
          await window.apiService.post('/task/' + taskId + '/abandon');
          window.showToast('已放弃任务');
          await loadMyTasks();
        } catch(e) {
          window.showToast('放弃任务失败', 'error');
        }
      });
    }

    async function updateProgress(roleTaskId, taskId, progress) {
      try {
        await apiService.post('/task/progress', { roleId: roleId, taskId: taskId, progress: progress });
        await loadMyTasks();
        renderTasks();
      } catch (error) {
        console.error('更新进度失败:', error);
        showToast(error.message || '更新进度失败');
      }
    }
    
    async function claimReward(taskId) {
      try {
        const result = await apiService.post('/task/' + taskId + '/claim', { roleId: roleId });
        showToast(result.message || '奖励领取成功！');
        await loadActivityInfo();
        await loadMyTasks();
        renderTasks();
      } catch (error) {
        console.error('领取奖励失败:', error);
        showToast(error.message || '领取奖励失败');
      }
    }
    
    async function claimActivityReward(rewardId) {
      try {
        const result = await apiService.post('/activity/activity-claim/' + roleId + '/' + rewardId, {});
        showToast(result.message || '活跃度奖励领取成功！');
        await loadActivityInfo();
      } catch (error) {
        console.error('领取活跃度奖励失败:', error);
        showToast(error.message || '领取奖励失败');
      }
    }
    
    function goBack() {
      window.location.href = '../index.html';
    }
    
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }
    
    init();
  </script>
</body>
</html>
