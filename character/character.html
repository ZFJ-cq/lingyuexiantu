<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="../js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="../css/mobile-adapt.css">
  <title>灵月仙途 - 角色</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-main: #f0e6d2;
      --bg-panel: #d4c5a9;
      --bg-card: #c8b69f;
      --text-main: #333333;
      --text-dim: #666666;
      --border-color: #a89880;
      --highlight-color: #b8860b;
      --equip-slot-bg: #8b7355;
      --bag-slot-bg: #8b7355;
      --tab-active: #b8860b;
      --tab-inactive: #a89880;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding-bottom: 60px; /* 为底部导航栏留出空间 */
    }

    /* 主容器 */
    .main-container {
      flex: 1;
      overflow-y: auto;
      position: relative;
      padding-top: 60px; /* 为返回按钮留出空间 */
    }
  </style>

  <!-- 加载必要的JavaScript文件 -->
  <script src="../js/token-manager.js"></script>
  <script src="../js/auth-service.js"></script>
  <script src="../js/api-interceptor.js"></script>
  <script src="../js/role-sync.js"></script>
  
  <!-- EquipmentComparator 实现 -->
  <script>
    window.EquipmentComparator = {
      // 比较装备
      compare(current, newItem) {
        if (!current || !newItem) {
          return null;
        }
        
        const result = {
          better: false,
          changes: {}
        };
        
        // 比较属性
        const stats = ['attack', 'defense', 'speed', 'crit', 'dodge'];
        let totalChange = 0;
        
        stats.forEach(stat => {
          const currentValue = current[stat] || 0;
          const newValue = newItem[stat] || 0;
          const change = newValue - currentValue;
          
          if (change !== 0) {
            result.changes[stat] = change;
            totalChange += change;
          }
        });
        
        result.better = totalChange > 0;
        return result;
      }
    };
  </script>

  <style>
    /* 返回按钮 */
    .back-button-container {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 100;
    }

      align-items: flex-start;

    .char-avatar {

      border-radius: 50%;

      align-items: center;

      margin-top: 3px;

    }

    /* 寿命 */

      font-weight: bold;
      margin-bottom: 5px;
      text-align: center;

      font-weight: bold;
      margin-top: 3px;

    }

      font-weight: bold;
      margin-bottom: 3px;
    }

    }

    .stat-value-horizontal.lifespan-value {

    }

    /* 属性面板 */

      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;

      padding-bottom: 5px;

      grid-template-columns: 1fr 1fr;
      gap: 10px;

      align-items: center;

    .tabs-container {

      gap: 10px;
      margin-bottom: 10px;

    .tab-button {

      border-radius: 15px;
      font-size: 0.9rem;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }

    .tab-button.active {
      background: var(--tab-active);
      color: white;
      border-color: var(--highlight-color);
    }

      border: 1px solid var(--border-color);
      border-radius: 12px;
      font-size: 0.8rem;
      color: var(--text-main);
      cursor: pointer;

      transition: all 0.3s;

    .category-tab.active {

      color: white;
      border-color: var(--highlight-color);
    }

    /* 存储空间使用情况 */
    .storage-info {

      border: 1px solid var(--border-color);

      padding: 10px;
      margin-bottom: 15px;

    .storage-header {

      align-items: center;
      margin-bottom: 5px;

      transition: width 0.3s;
    }

    /* 背包网格 */

      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }

    .bag-slot {
      aspect-ratio: 1;
      background: var(--bag-slot-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;

    .bag-slot:hover {

      color: white;

    /* 搜索框 */

      flex: 1;

      gap: 5px;

    }

    .search-box input {

      padding: 6px 10px;
      border: 1px solid var(--border-color);
      border-radius: 15px;
      background: var(--bg-main);
      color: var(--text-main);
      font-size: 0.8rem;
      outline: none;

    .search-box input::placeholder {
      color: var(--text-dim);
    }

    .search-btn {
      padding: 6px 10px;
      border: 1px solid var(--border-color);
      border-radius: 15px;
      background: var(--tab-inactive);
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.8rem;
    }

    .search-btn:hover {

      color: white;
      border-color: var(--highlight-color);
    }

      justify-content: center;
      gap: 10px;

      height: 30px;
      border: 1px solid var(--border-color);
      border-radius: 50%;
      background: var(--bg-card);
      color: var(--text-main);

      align-items: center;

      transform: translate(-50%, -50%);

      color: var(--text-dim);

    .bag-grid-container {

      overflow: hidden;

      left: 0;

      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .expand-modal-content {
      background: var(--bg-panel);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      width: 90%;
      max-width: 350px;
      padding: 20px;
      text-align: center;

    .expand-modal h3 {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 15px;
      color: var(--text-main);
    }

    .expand-modal p {
      font-size: 0.9rem;
      margin-bottom: 10px;
      color: var(--text-dim);
    }

    .expand-modal .cost-info {
      font-size: 1rem;
      font-weight: bold;
      margin: 15px 0;
      color: var(--highlight-color);
    }

    .expand-modal .reward-info {
      font-size: 0.9rem;
      margin: 10px 0;
      color: #4CAF50;
    }

    .expand-modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;

    .expand-modal-btn {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid var(--border-color);
      border-radius: 15px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .expand-btn {

      color: white;
      border-color: var(--highlight-color);

    .cancel-btn {

      color: var(--text-main);
    }

    .expand-modal-btn:hover {

      transform: translateY(-1px);
    }

    /* 物品详情弹窗 */
    .item-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-content {

      border: 2px solid var(--border-color);
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-card);
      border-radius: 10px 10px 0 0;
    }

    .modal-header h3 {
      font-size: 1rem;
      font-weight: bold;
      color: var(--text-main);
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-dim);
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.3s;
    }

    .close-btn:hover {
      background: rgba(139, 115, 85, 0.3);
      color: var(--text-main);
    }

    .modal-body {
      padding: 20px;
    }

    .item-info {
      display: flex;
      gap: 15px;
    }

    .item-icon {
      font-size: 3rem;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }

    .item-details {
      flex: 1;
    }

    .detail-row {
      margin-bottom: 10px;
      display: flex;
      flex-wrap: wrap;
    }

    .detail-label {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-right: 5px;
      min-width: 60px;
    }

    .detail-value {
      font-size: 0.8rem;
      font-weight: bold;
      color: var(--text-main);
      flex: 1;
    }

    .detail-row.description .detail-value {
      font-weight: normal;
      line-height: 1.4;
    }

    .attributes-list {
      margin-top: 5px;
      width: 100%;
    }

    .attribute-item {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 0.7rem;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      padding: 15px 20px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-card);
      border-radius: 0 0 10px 10px;
    }

    .modal-btn {
      flex: 1;
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      border-radius: 15px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .equip-btn {
      background: var(--highlight-color);
      color: white;
      border-color: var(--highlight-color);
    }

    .use-btn {
      background: #4CAF50;
      color: white;
      border-color: #4CAF50;
    }

    .view-btn {
      background: var(--tab-inactive);
      color: var(--text-main);
    }

    .modal-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .modal-btn:active {
      transform: scale(0.95);
    }

    /* 装备槽位提示 */
    .slot-tooltip {
      position: absolute;
      bottom: -80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(139, 115, 85, 0.95);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.7rem;
      color: var(--text-main);
      white-space: normal;
      min-width: 120px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .equip-slot:hover .slot-tooltip {
      opacity: 1;
    }

    /* 底部导航栏 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: var(--bg-panel);
      border-top: 2px solid var(--border-color);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-dim);
      transition: all 0.3s;
      width: 60px;
    }

    .nav-icon {
      font-size: 1.4rem;
      transition: transform 0.3s;
    }

    .nav-text {
      font-size: 0.7rem;
    }

    .nav-item.active {
      color: var(--highlight-color);
    }

    .nav-item.active .nav-icon {
      transform: translateY(-3px);
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .top-section {
        flex-direction: row;
        align-items: flex-start;
        text-align: left;
        gap: 15px;
      }

      .char-avatar {
        width: 70px;
        height: 70px;
        font-size: 2rem;
      }

      .hp-bar {
        width: 100px;
      }

      .equip-grid {
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;

  <script>
    // 全局变量
    let currentRoleId = null;
    let characterData = null;
    let currentBagTab = 'all';
    
    // 背包分页相关变量
    let currentPage = 1;
    let maxPage = 2; // 默认开启2页
    let itemsPerPage = 24; // 每页24格 (6*4)

    // 页面加载完成后执行
    window.addEventListener('DOMContentLoaded', async () => {
      await initCharacterPage();
    });

    // 初始化角色页面
    async function initCharacterPage() {
      showLoading('正在获取角色信息...');
      
      try {
        // 验证用户是否已登录
        const userId = localStorage.getItem('userId');
        if (!userId) {
          hideLoading();
          showToast('请先登录！');
          setTimeout(() => {
            window.location.href = '../login.html';
          }, 1000);
          return;
        }
        
        // 获取当前角色 ID
        currentRoleId = localStorage.getItem('currentRoleId') || localStorage.getItem('roleId');
        if (!currentRoleId) {
          hideLoading();
          showToast('未找到角色信息，请重新登录');
          setTimeout(() => {
            window.location.href = '../login.html';
          }, 1000);
          return;
        }
        
        console.log('初始化角色页面，用户ID:', userId, '角色ID:', currentRoleId);
        
        // 检查API服务是否可用
        try {
          const healthCheck = await window.AuthService.get('http://localhost:8088/api/health');
          
          if (!healthCheck || !healthCheck.ok) {
            throw new Error('后端服务不可用');
          }
          console.log('✅ 后端服务可用');
        } catch (error) {
          hideLoading();
          showToast('后端服务未运行，请启动Spring Boot后端服务');
          console.error('后端服务检查失败:', error);
          return;
        }
        
        // 加载AttributeCalculator配置
        if (window.AttributeCalculator) {
          try {
            await window.AttributeCalculator.loadConfig();
            console.log('✅ AttributeCalculator配置加载成功');
          } catch (error) {
            console.error('❌ 加载AttributeCalculator配置失败:', error);
            // 配置加载失败不影响其他功能
          }
        }
        
        // 获取角色信息
        console.log('开始获取角色信息');
        await fetchCharacterInfo(userId);
        
        // 加载装备数据
        console.log('开始加载装备数据');
        await loadEquipmentData();
        
        // 加载背包数据
        console.log('开始加载背包数据');
        await loadBagData();
        
        hideLoading();

      } catch (error) {
        console.error('初始化角色页面失败:', error);
        hideLoading();
        showToast('获取数据失败，请检查网络连接或后端服务是否运行');
      }
    }

    // 获取角色信息
    async function fetchCharacterInfo(userId) {
      try {
        // 只使用API调用获取角色信息
        const roles = await window.apiService.getRole(userId);
        console.log('角色信息获取成功:', roles);
        
        if (roles && Array.isArray(roles) && roles.length > 0) {
          let charData;
          
          // 如果有当前角色 ID，尝试找到对应的角色
          if (currentRoleId) {
            charData = roles.find(role => role.id == currentRoleId);
          }
          
          // 如果没有找到对应的角色，或者没有设置当前角色 ID，使用第一个角色
          if (!charData) {
            charData = roles[0];
            currentRoleId = charData.id;
            localStorage.setItem('currentRoleId', currentRoleId);
          }
          
          // 验证角色数据是否完整
          if (!charData) {
            throw new Error('角色数据为空');
          }
          
          // 尝试获取角色的详细信息，包括装备、属性等
          try {
            const charDetail = await window.apiService.getRoleById(currentRoleId);
            if (charDetail) {
              characterData = charDetail;
              updateCharacterDisplay(charDetail);
            } else {
              // 如果没有详细信息，使用基本角色数据
              characterData = charData;
              updateCharacterDisplay(charData);
            }
          } catch (detailError) {
            console.error('获取角色详细信息失败:', detailError);
            // 使用基本角色数据
            characterData = charData;
            updateCharacterDisplay(charData);
          }
        } else {
          throw new Error('未找到角色信息');
        }
      } catch (error) {
        console.error('获取角色信息失败:', error);
        // 不使用默认数据，直接显示错误信息
        document.getElementById('charName').textContent = '未找到角色';
        document.getElementById('charRealm').textContent = '---';
        document.getElementById('charHp').textContent = '---';
        document.getElementById('charLifespan').textContent = '---';
        document.getElementById('statAttack').textContent = '---';
        document.getElementById('statDefense').textContent = '---';
        document.getElementById('statSpeed').textContent = '---';
        document.getElementById('statCrit').textContent = '---';
        document.getElementById('statCritDmg').textContent = '---';
        document.getElementById('statDodge').textContent = '---';
        document.getElementById('statHit').textContent = '---';
        document.getElementById('statTenacity').textContent = '---';
        document.getElementById('charAvatar').textContent = '❌';
      }
    }

    // 更新角色显示
  async function updateCharacterDisplay(charData) {
    document.getElementById('charName').textContent = charData.roleName || charData.name || '加载中...';
    document.getElementById('charRealm').textContent = charData.realm || '加载中...';
    
    let attributesLoaded = false;
    
    if (currentRoleId) {
      try {
        const attrData = await window.apiService.getAttributes(currentRoleId);
        if (attrData && attrData.atk !== undefined) {
          const attr = attrData;
          
          document.getElementById('charHp').textContent = attr.hpMax || attr.hp || 0;
          document.getElementById('statAttack').textContent = attr.atk || 0;
          document.getElementById('statDefense').textContent = attr.def || 0;
          document.getElementById('statSpeed').textContent = attr.speed || 0;
          document.getElementById('statCrit').textContent = (attr.critRate != null ? attr.critRate.toFixed(2) + '%' : '0.00%');
          document.getElementById('statCritDmg').textContent = (attr.critDmg != null ? attr.critDmg.toFixed(2) + '%' : '150.00%');
          document.getElementById('statDodge').textContent = (attr.dodgeRate != null ? attr.dodgeRate.toFixed(2) + '%' : '0.00%');
          document.getElementById('statHit').textContent = (attr.hitRate != null ? attr.hitRate.toFixed(2) + '%' : '100.00%');
          document.getElementById('statTenacity').textContent = (attr.tenacity != null ? attr.tenacity.toFixed(2) + '%' : '0.00%');
          
          if (attr.age != null && attr.maxAge != null) {
            document.getElementById('charLifespan').textContent = `${attr.age}/${attr.maxAge}`;
          } else {
            document.getElementById('charLifespan').textContent = '0/0';
          }
          
          if (attr.realmName) {
            document.getElementById('charRealm').textContent = attr.realmName;
          }
          
          attributesLoaded = true;
          console.log('从后端/attributes API获取属性成功:', attr);
        }
      } catch (error) {
        console.warn('从后端/attributes API获取属性失败，尝试回退方案:', error);
      }
    }
    
    if (!attributesLoaded) {
      try {
        let baseStats = {};
        try {
          if (currentRoleId) {
            const statsResponse = await window.apiService.getRoleBaseStats(currentRoleId);
            if (statsResponse) {
              const backendStats = statsResponse;
              baseStats = {
                vitality: backendStats.vit || 0,
                spirit: backendStats.spi || 0,
                agility: backendStats.agi || 0,
                wisdom: backendStats.wis || 0,
                luck: backendStats.lck || 0
              };
            }
          }
        } catch (error) {
          console.error('获取角色基础属性失败:', error);
          baseStats = charData.baseStats || {};
        }
        
        if (window.AttributeCalculator) {
          const backendStats = {
            vit: baseStats.vitality || 0,
            spi: baseStats.spirit || 0,
            agi: baseStats.agility || 0,
            wis: baseStats.wisdom || 0,
            lck: baseStats.luck || 0,
            realmLevel: charData.realmLevel || 0
          };
          const calculatedStats = window.AttributeCalculator.calculate(backendStats);
          
          let equipBonus = { attack: 0, defense: 0, hpBonus: 0, mpBonus: 0 };
          try {
            if (currentRoleId && window.apiService && typeof window.apiService.getEquipmentStats === 'function') {
              const equipStats = await window.apiService.getEquipmentStats(currentRoleId);
              if (equipStats) {
                equipBonus.attack = equipStats.attack || 0;
                equipBonus.defense = equipStats.defense || 0;
                equipBonus.hpBonus = equipStats.hpBonus || 0;
                equipBonus.mpBonus = equipStats.mpBonus || 0;
              }
            }
          } catch (e) {
            console.warn('获取装备加成失败:', e);
          }
          
          const displayHp = (calculatedStats.maxHp && calculatedStats.maxHp !== '---') 
            ? parseInt(calculatedStats.maxHp) + equipBonus.hpBonus 
            : (charData.hp || '---');
          document.getElementById('charHp').textContent = displayHp;
          
          const displayAttack = (calculatedStats.attack && calculatedStats.attack !== '---') 
            ? parseInt(calculatedStats.attack) + equipBonus.attack 
            : calculatedStats.attack;
          const displayDefense = (calculatedStats.defense && calculatedStats.defense !== '---') 
            ? parseInt(calculatedStats.defense) + equipBonus.defense 
            : calculatedStats.defense;
          
          document.getElementById('statAttack').textContent = displayAttack;
          document.getElementById('statDefense').textContent = displayDefense;
          document.getElementById('statSpeed').textContent = calculatedStats.speed || '---';
          document.getElementById('statCrit').textContent = calculatedStats.critRate || '---';
          document.getElementById('statCritDmg').textContent = calculatedStats.critDmg || '---';
          document.getElementById('statDodge').textContent = calculatedStats.dodgeRate || '---';
          document.getElementById('statHit').textContent = calculatedStats.hitRate || '---';
          document.getElementById('statTenacity').textContent = calculatedStats.tenacity || '---';
        } else {
          updateAttributesWithRawData(charData, baseStats);
        }
      } catch (error) {
        console.error('回退属性计算失败:', error);
        updateAttributesWithRawData(charData, {});
      }
      
      if (charData.age !== undefined && charData.maxAge !== undefined) {
        document.getElementById('charLifespan').textContent = `${charData.age || 0}/${charData.maxAge || 0}`;
      } else {
        try {
          if (currentRoleId) {
            const roleDetail = await window.apiService.getRoleById(currentRoleId);
            if (roleDetail) {
              document.getElementById('charLifespan').textContent = `${roleDetail.age || 0}/${roleDetail.maxAge || 0}`;
            } else {
              document.getElementById('charLifespan').textContent = '0/0';
            }
          } else {
            document.getElementById('charLifespan').textContent = '0/0';
          }
        } catch (error) {
          console.error('获取角色详细信息失败:', error);
          document.getElementById('charLifespan').textContent = '0/0';
        }
      }
    }
    
    setAvatarBySpiritRoot(charData.spiritRoot);
  }

    // 使用原始数据更新属性
    function updateAttributesWithRawData(charData, baseStats) {
      // 更新气血
      if (charData.hp) {
        document.getElementById('charHp').textContent = charData.hp;
      } else if (charData.maxHp) {
        document.getElementById('charHp').textContent = charData.maxHp;
      } else {
        document.getElementById('charHp').textContent = '---';
      }
      
      // 更新寿命
      if (charData.age !== undefined && charData.maxAge !== undefined && (charData.age !== 0 || charData.maxAge !== 0)) {
        document.getElementById('charLifespan').textContent = `${charData.age}/${charData.maxAge}`;
      } else {
        document.getElementById('charLifespan').textContent = '---';
      }
      
      // 更新属性面板
      document.getElementById('statAttack').textContent = baseStats.attack || charData.attack || '---';
      document.getElementById('statDefense').textContent = baseStats.defense || charData.defense || '---';
      document.getElementById('statSpeed').textContent = baseStats.speed || charData.speed || '---';
      document.getElementById('statCrit').textContent = baseStats.crit || charData.crit || '---';
      document.getElementById('statCritDmg').textContent = charData.critDmg || baseStats.critDmg || '---';
      document.getElementById('statDodge').textContent = baseStats.dodge || charData.dodge || '---';
      document.getElementById('statHit').textContent = baseStats.hit || charData.hit || '---';
      document.getElementById('statTenacity').textContent = charData.tenacity || baseStats.tenacity || '---';
    }

    // 根据灵根类型设置头像
    function setAvatarBySpiritRoot(spiritRoot) {
      const avatarElement = document.getElementById('charAvatar');
      switch(spiritRoot) {
        case '金灵根':
          avatarElement.textContent = '⚡';
          break;
        case '木灵根':
          avatarElement.textContent = '🌿';
          break;
        case '水灵根':
          avatarElement.textContent = '💧';
          break;
        case '火灵根':
          avatarElement.textContent = '🔥';
          break;
        case '土灵根':
          avatarElement.textContent = '⛰️';
          break;
        case '雷灵根':
          avatarElement.textContent = '⚡';
          break;
        case '五行灵根':
        case '五灵根':
          avatarElement.textContent = '🌈';
          break;
        default:

    // 加载背包数据
    async function loadBagData() {
      try {
        if (!currentRoleId) {
          console.warn('角色ID为空，无法加载背包数据');
          originalItems = [];
          renderBagGrid([]);
          return;
        }
        
        console.log('尝试获取背包数据，角色ID:', currentRoleId);
        
        let inventoryItems = [];
        try {
          const inventoryData = await window.apiService.getInventory(currentRoleId);
          if (inventoryData && Array.isArray(inventoryData)) {
            inventoryItems = inventoryData.map(item => ({
              id: item.id,
              itemId: item.itemId,
              name: item.name,
              assetName: item.name,
              assetType: mapItemType(item.type),
              type: item.type,
              quality: mapRarity(item.rarity),
              quantity: item.count || 1,
              description: item.description || '',
              icon: item.icon || '',
              rarity: item.rarity
            }));
            console.log('从/inventory API获取背包物品:', inventoryItems.length, '件');
          }
        } catch (invError) {
          console.warn('从/inventory API获取背包数据失败:', invError);
        }
        
        let assetItems = [];
        try {
          const assetsResponse = await window.apiService.getAssets(currentRoleId);
          let assetsList = [];
          if (Array.isArray(assetsResponse)) {
            assetsList = assetsResponse;
          } else if (assetsResponse && Array.isArray(assetsResponse.data)) {
            assetsList = assetsResponse.data;
          }
          if (assetsList.length > 0) {
            assetItems = assetsList.filter(a => a.assetType !== 'currency').map(a => ({
              id: a.id,
              assetName: a.assetTypeName,
              name: a.assetTypeName,
              assetType: a.assetType,
              type: a.category,
              quality: '凡品',
              quantity: a.quantity || 1,
              description: a.assetTypeName,
              assetTypeCode: a.assetTypeCode
            }));
            console.log('从/role-asset API获取资产物品:', assetItems.length, '件');
          }
        } catch (assetError) {
          console.warn('从/role-asset API获取资产数据失败:', assetError);
        }
        
        const allItems = [...inventoryItems, ...assetItems];
        console.log('背包物品总数:', allItems.length);
        
        if (allItems.length > 0) {
          originalItems = allItems;
          if (searchKeyword) {
            performSearch();
          } else {
            renderBagGrid(allItems);
          }
        } else {
          originalItems = [];
          renderBagGrid([]);
        }
      } catch (error) {
        console.error('获取背包数据失败:', error);
        originalItems = [];
        renderBagGrid([]);
      }
    }
    
    function mapItemType(type) {
      const typeMap = {
        'dan_yao': '丹药',
        'cai_liao': '材料',
        'zhuang_bei': '装备',
        'fa_bao': '法宝',
        'qi_ta': '杂物',
        'weapon': '武器',
        'armor': '防具',
        'consumable': '消耗品',
        'material': '材料',
        'equipment': '装备'
      };
      return typeMap[type] || type || '杂物';
    }
    
    function mapRarity(rarity) {
      const rarityMap = {
        'common': '凡品',
        'uncommon': '良品',
        'rare': '珍品',
        'epic': '极品',
        'legendary': '仙品'
      };
      return rarityMap[rarity] || '凡品';
    }

    // 渲染背包网格
    function renderBagGrid(items) {
      const grid = document.getElementById('bag-grid');
      if (!grid) return;
      
      grid.innerHTML = '';
      
      // 过滤物品
      const filteredItems = filterItemsByCategory(items, currentBagTab);
      
      // 计算当前页显示的物品
      const startIndex = (currentPage - 1) * itemsPerPage;
      const endIndex = startIndex + itemsPerPage;
      const pageItems = filteredItems.slice(startIndex, endIndex);
      
      // 填充物品
      pageItems.forEach(item => {
        const slot = document.createElement('div');
        slot.className = 'bag-slot';
        
        // 获取物品图标
        const icon = getItemIcon(item.assetType || item.type);
        
        // 获取物品品质颜色
        const qualityColor = getItemQualityColor(item.quality);
        
        slot.innerHTML = `
          <span style="color: ${qualityColor};">${icon}</span>
          ${item.quantity > 1 ? `<div class="item-count">${item.quantity}</div>` : ''}
        `;
        
        // 点击事件
        slot.onclick = () => showItemDetail(item);
        
        // 添加拖拽功能（仅装备可拖拽）
        if (item.assetType === '装备') {
          slot.draggable = true;
          slot.ondragstart = (e) => {
            e.dataTransfer.setData('text/plain', JSON.stringify({
              type: 'bagItem',
              item: item
            }));
          };
        }
        
        grid.appendChild(slot);
      });
      
      // 填充空槽位
      const emptySlots = itemsPerPage - pageItems.length;
      for (let i = 0; i < emptySlots; i++) {
        const slot = document.createElement('div');
        slot.className = 'bag-slot empty';
        grid.appendChild(slot);
      }
      
      // 更新存储空间使用情况
      updateStorageInfo(filteredItems.length, maxPage * itemsPerPage);
      
      // 更新分页状态
      updatePagination();
    }

    // 获取物品品质颜色
    function getItemQualityColor(quality) {
      const colors = {
        '凡品': '#888888',
        '良品': '#4CAF50',
        '珍品': '#2196F3',
        '极品': '#9C27B0',
        '仙品': '#FF9800'
      };
      return colors[quality] || '#888888';
    }

    // 更新存储空间使用情况
    function updateStorageInfo(used, total) {
      const storageValue = document.getElementById('storageValue');
      const storageProgress = document.getElementById('storageProgress');
      
      if (storageValue) {
        storageValue.textContent = `${used}/${total}`;
      }
      
      if (storageProgress) {
        const percentage = (used / total) * 100;
        storageProgress.style.width = `${percentage}%`;
      }
    }

    // 根据分类过滤物品
    function filterItemsByCategory(items, category) {
      if (category === 'all') {
        return items;
      }
      
      const categoryMap = {
        'equipment': ['装备', '武器', '防具'],
        'consumable': ['消耗品', '食物', '饮料'],
        'pill': ['丹药', '药材', '草药'],
        'material': ['材料', '矿石', '木材'],
        'quest': ['任务物品']
      };
      
      const types = categoryMap[category] || [];
      return items.filter(item => types.includes(item.assetType || item.type));
    }

    // 获取物品图标
    function getItemIcon(type) {
      const icons = {
        '装备': '⚔️',
        '武器': '🗡️',
        '防具': '🛡️',
        '材料': '🌿',
        '矿石': '💎',
        '木材': '🪵',
        '药材': '🌱',
        '草药': '🌿',
        '丹药': '💊',
        '杂物': '📦',
        '任务物品': '📜'
      };
      return icons[type] || '📦';

    // 显示物品详情
    function showItemDetail(item) {
      const modal = document.createElement('div');
      modal.className = 'item-modal';
      
      const qualityColor = getItemQualityColor(item.quality);
      const itemIcon = getItemIcon(item.assetType || item.type);
      const itemDesc = item.description || getItemDescription(item);
      const itemAttrs = buildItemAttributes(item);
      
      let attrsHTML = '';
      if (itemAttrs && Object.keys(itemAttrs).length > 0) {
        attrsHTML = `
          <div class="detail-row">
            <span class="detail-label">属性：</span>
            <div class="attributes-list">
              ${Object.entries(itemAttrs).map(([key, value]) => `
                <div class="attribute-item">
                  <span>${key}：</span>
                  <span style="color: ${value > 0 ? '#4CAF50' : '#f44336'};">${value > 0 ? '+' : ''}${value}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
      
      modal.innerHTML = `
        <div class="modal-content">
          <div class="modal-header">
            <h3>${item.assetName || item.name}</h3>
            <button class="close-btn" onclick="this.closest('.item-modal').remove()">×</button>
          </div>
          <div class="modal-body">
            <div class="item-info">
              <div class="item-icon" style="color: ${qualityColor};">
                ${itemIcon}
              </div>
              <div class="item-details">
                <div class="detail-row">
                  <span class="detail-label">类型：</span>
                  <span class="detail-value">${item.assetType || item.type}</span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">品质：</span>
                  <span class="detail-value" style="color: ${qualityColor};">
                    ${item.quality || '凡品'}
                  </span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">数量：</span>
                  <span class="detail-value">${item.quantity || 1}</span>
                </div>
                ${itemDesc ? `
                <div class="detail-row description">
                  <span class="detail-label">描述：</span>
                  <span class="detail-value">${itemDesc}</span>
                </div>
                ` : ''}
                ${attrsHTML}
              </div>
            </div>
          </div>
          <div class="modal-footer">
            ${item.assetType === '装备' ? `
              <button class="modal-btn equip-btn" onclick="equipItem(${item.id})">穿戴</button>
            ` : (item.assetType === '消耗品' || item.assetType === '丹药') ? `
              <button class="modal-btn use-btn" onclick="useItem(${item.id})">使用</button>
            ` : `
              <button class="modal-btn view-btn" onclick="this.closest('.item-modal').remove()">查看</button>
            `}
            <button class="modal-btn close-btn" onclick="this.closest('.item-modal').remove()">关闭</button>
          </div>
        </div>
      `;
      
      document.body.appendChild(modal);
    }
    
    function getItemDescription(item) {
      const type = item.assetType || item.type;
      const name = item.assetName || item.name || '';
      const quality = item.quality || '凡品';
      return `${quality}品阶的${type}·${name}`;
    }
    
    function buildItemAttributes(item) {
      const attrs = {};
      if (item.attack) attrs['攻击力'] = item.attack;
      if (item.defense) attrs['防御力'] = item.defense;
      if (item.hpBonus) attrs['气血加成'] = item.hpBonus;
      if (item.mpBonus) attrs['法力加成'] = item.mpBonus;
      if (item.speed) attrs['速度'] = item.speed;
      if (item.crit) attrs['暴击率'] = item.crit;
      if (item.dodge) attrs['闪避率'] = item.dodge;
      if (item.attributes && typeof item.attributes === 'object') {
        Object.entries(item.attributes).forEach(([key, value]) => {
          if (!attrs[key]) attrs[key] = value;
        });
      }
      if (item.base_stats) {
        try {
          const baseStats = typeof item.base_stats === 'string' ? JSON.parse(item.base_stats) : item.base_stats;
          if (baseStats) {
            Object.entries(baseStats).forEach(([key, value]) => {
              if (!attrs[key]) attrs[key] = value;
            });
          }
        } catch (e) {}
      }
      return attrs;
    }

    // 加载装备数据
    async function loadEquipmentData() {
      try {
        if (!currentRoleId) {
          console.warn('角色ID为空，无法加载装备数据');
          renderEquipmentGrid([]);
          return;
        }
        
        const response = await window.apiService.getEquippedItems(currentRoleId);
        if (response) {
          let equipmentList = [];
          if (Array.isArray(response)) {
            equipmentList = response;
          } else if (response.equippedList && Array.isArray(response.equippedList)) {
            equipmentList = response.equippedList;
          } else if (response.equippedItems && typeof response.equippedItems === 'object') {
            equipmentList = Object.entries(response.equippedItems).map(([slotId, equip]) => {
              if (equip && typeof equip === 'object') {
                return {
                  id: equip.id,
                  name: equip.name,
                  slot: parseInt(slotId),
                  slotId: parseInt(slotId),
                  slot_id: parseInt(slotId),
                  assetType: '装备',
                  assetName: equip.name,
                  attack: equip.attack || 0,
                  defense: equip.defense || 0,
                  hpBonus: equip.hpBonus || 0,
                  mpBonus: equip.mpBonus || 0,
                  rarity: equip.rarity,
                  level: equip.level,
                  description: equip.description
                };
              }
              return null;
            }).filter(Boolean);
          }
          renderEquipmentGrid(equipmentList);
        } else {
          renderEquipmentGrid([]);
        }
      } catch (error) {
        console.error('获取装备数据失败:', error);
        renderEquipmentGrid([]);
      }
    }

    // 渲染装备网格
    function renderEquipmentGrid(equipment) {
      const grid = document.getElementById('equip-grid');
      if (!grid) return;
      
      // 清空网格
      grid.innerHTML = '';
      
      // 装备槽位配置
      const slots = [
        { slot: 'weapon', slotId: 1, icon: '⚔️', name: '武器' },
        { slot: 'head', slotId: 2, icon: '👒', name: '头部' },
        { slot: 'body', slotId: 3, icon: '👕', name: '身体' },
        { slot: 'legs', slotId: 4, icon: '👖', name: '腿部' },
        { slot: 'feet', slotId: 5, icon: '👢', name: '鞋子' },
        { slot: 'accessory', slotId: 6, icon: '🐉', name: '饰品' }
      ];
      
      // 渲染装备槽位
      slots.forEach(slotInfo => {
        const slot = document.createElement('div');
        // 查找对应槽位的装备
        const equippedItem = equipment.find(item => 
          item.slot === slotInfo.slot || 
          item.slotId === slotInfo.slotId ||
          item.slot_id === slotInfo.slotId
        );
        
        if (equippedItem) {
          slot.className = 'equip-slot';
          // 构建属性信息
          let attributesHTML = '';
          if (equippedItem.attributes) {
            attributesHTML = Object.entries(equippedItem.attributes).map(([key, value]) => {
              return `<div>${key}: ${value > 0 ? '+' : ''}${value}</div>`;
            }).join('');
          } else if (equippedItem.base_stats) {
            // 处理base_stats格式的属性
            try {
              const baseStats = typeof equippedItem.base_stats === 'string' ? JSON.parse(equippedItem.base_stats) : equippedItem.base_stats;
              if (baseStats) {
                attributesHTML = Object.entries(baseStats).map(([key, value]) => {
                  return `<div>${key}: ${value > 0 ? '+' : ''}${value}</div>`;
                }).join('');
              }
            } catch (error) {
              console.error('解析装备属性失败:', error);
            }
          }
          
          slot.innerHTML = `
            <span>${getItemIcon(equippedItem.assetType || equippedItem.item_type || '装备')}</span>
            <div class="slot-tooltip">
              <div><strong>${equippedItem.assetName || equippedItem.item_name || equippedItem.name}</strong></div>
              ${attributesHTML ? `<div style="font-size: 0.6rem; margin-top: 2px;">${attributesHTML}</div>` : ''}
            </div>
          `;
          slot.onclick = () => unequipItem(slotInfo.slotId);
          // 添加拖拽功能
          slot.draggable = true;
          slot.ondragstart = (e) => {
            e.dataTransfer.setData('text/plain', JSON.stringify({
              type: 'equipment',
              item: equippedItem,
              slot: slotInfo.slot
            }));
          };
        } else {
          slot.className = 'equip-slot empty';
          slot.innerHTML = `<span>${slotInfo.icon}</span>`;
          // 添加拖放功能
          slot.ondragover = (e) => e.preventDefault();
          slot.ondrop = async (e) => {
            e.preventDefault();
            try {
              const data = JSON.parse(e.dataTransfer.getData('text/plain'));
              if (data.type === 'bagItem' && data.item.assetType === '装备') {
                // 检查装备类型是否匹配槽位
                const itemSubtype = data.item.subtype || data.item.item_type;
                console.log('装备类型:', itemSubtype, '槽位类型:', slotInfo.slot);
                if (itemSubtype === slotInfo.slot) {
                  await equipItem(data.item.id);
                } else {
                  showToast('该装备不能装备到这个槽位');
                }
              }
            } catch (error) {
              console.error('拖放装备失败:', error);
            }
          };
        }
        
        slot.dataset.slot = slotInfo.slot;
        slot.dataset.slotId = slotInfo.slotId;
        grid.appendChild(slot);
      });
    }

    // 执行搜索
    function performSearch() {
      const input = document.getElementById('searchInput');
      if (!input) return;
      
      searchKeyword = input.value.trim();
      
      if (searchKeyword) {
        // 过滤物品
        const filteredItems = originalItems.filter(item => {
          const name = item.assetName || item.name || '';
          const description = item.description || '';
          const type = item.assetType || item.type || '';
          return name.includes(searchKeyword) || 
                 description.includes(searchKeyword) || 
                 type.includes(searchKeyword);
        });
        renderBagGrid(filteredItems);
        showToast(`找到 ${filteredItems.length} 个物品`);
      } else {
        // 无搜索词，显示全部
        renderBagGrid(originalItems);
      }
    }

    // 清空搜索
    function clearSearch() {
      const input = document.getElementById('searchInput');
      if (input) {
        input.value = '';
      }
      searchKeyword = '';
      renderBagGrid(originalItems);
      showToast('搜索已清空');
    }

    // 更新分页状态
    function updatePagination() {
      // 更新页码指示器
      document.querySelectorAll('.page-indicator').forEach(indicator => {
        const page = parseInt(indicator.dataset.page);
        if (page === currentPage) {
          indicator.classList.add('active');
        } else {
          indicator.classList.remove('active');
        }
        
        // 控制锁定状态
        if (page > maxPage) {
          indicator.classList.add('locked');
          // 添加锁定图标
          if (!indicator.querySelector('.lock-icon')) {
            indicator.innerHTML = '<span class="lock-icon">🔒</span>';
          }
        } else {
          indicator.classList.remove('locked');
          // 移除锁定图标
          indicator.innerHTML = '';
        }
      });
      
      // 更新分页按钮状态
      const prevBtn = document.getElementById('prevPageBtn');
      const nextBtn = document.getElementById('nextPageBtn');
      
      if (prevBtn) {
        prevBtn.disabled = currentPage === 1;
      }
      
      if (nextBtn) {
        nextBtn.disabled = currentPage === maxPage;
      }
    }

    // 切换页面
    function switchPage(direction) {
      const newPage = currentPage + direction;
      if (newPage >= 1 && newPage <= maxPage) {
        currentPage = newPage;
        renderBagGrid(originalItems);
      } else if (newPage > maxPage) {
        // 尝试进入第3页，显示扩容弹窗
        showExpandModal();
      }
    }

    // 跳转到指定页面
    function goToPage(page) {
      if (page <= maxPage) {
        currentPage = page;
        renderBagGrid(originalItems);
      } else {
        // 尝试进入第3页，显示扩容弹窗
        showExpandModal();
      }
    }

    // 显示扩容弹窗
    function showExpandModal() {
      // 检查是否已经达到最大页数
      if (maxPage >= 5) {
        showToast('背包已经达到最大容量');
        return;
      }
      
      // 创建扩容弹窗
      const modal = document.createElement('div');
      modal.className = 'expand-modal';
      modal.innerHTML = `
        <div class="expand-modal-content">
          <h3>🔒 空间不足</h3>
          <p>背包空间已满，需要扩容才能继续存储物品</p>
          <div class="cost-info">消耗 10个[空间石]</div>
          <div class="reward-info">+30 格储物空间</div>
          <div class="expand-modal-buttons">
            <button class="expand-modal-btn expand-btn" onclick="expandBag()">解锁</button>
            <button class="expand-modal-btn cancel-btn" onclick="this.closest('.expand-modal').remove()">取消</button>
          </div>
        </div>
      `;
      
      document.body.appendChild(modal);
    }

    // 扩容背包
    async function expandBag() {
      try {
        if (!currentRoleId) {
          showToast('角色信息异常，无法扩容背包');
          return;
        }
        
        // 检查是否已经达到最大页数
        if (maxPage >= 5) {
          showToast('背包已经达到最大容量');
          return;
        }
        
        showLoading('正在扩容背包...');
        
        // 调用API扩容背包
        const result = await window.apiService.expandBag(currentRoleId, maxPage + 1);
        if (result) {
          // 扩容成功
          maxPage++;
          currentPage = maxPage;
          
          // 重新加载背包数据
          await loadBagData();
          
          hideLoading();
          showToast(`🎉 扩容成功！背包已增加 1 个新页面（+30 格），当前共 ${maxPage} 页`);
          
          // 关闭弹窗
          const modal = document.querySelector('.expand-modal');
          if (modal) {
            modal.remove();
          }
        } else {
          hideLoading();
          showToast('扩容失败：未知错误');
        }
      } catch (error) {
        console.error('扩容背包失败:', error);
        hideLoading();
        showToast('扩容失败，请检查网络连接');
      }
    }

    // 辅助函数
    function showLoading(message) {
      try {
        // 直接使用本地实现，避免调用window.showLoading导致的无限递归
        console.log('加载中:', message);
        
        // 创建简单的加载提示
        let loadingElement = document.querySelector('.loading-overlay');
        if (!loadingElement) {
          loadingElement = document.createElement('div');
          loadingElement.className = 'loading-overlay';
          loadingElement.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
          `;
          loadingElement.innerHTML = `
            <div style="background: var(--bg-panel); border: 2px solid var(--border-color); border-radius: 12px; padding: 20px; text-align: center;">
              <div style="font-size: 2rem; margin-bottom: 10px;">⏳</div>
              <div style="font-size: 1rem; color: var(--text-main);">${message || '加载中...'}</div>
            </div>
          `;
          document.body.appendChild(loadingElement);
        }
      } catch (error) {
        console.error('showLoading 错误:', error);
        console.log('加载中:', message);
      }
    }

    function hideLoading() {
      try {
        // 直接使用本地实现，避免调用window.hideLoading导致的无限递归
        const loadingElement = document.querySelector('.loading-overlay');
        if (loadingElement) {
          loadingElement.remove();
        }
      } catch (error) {
        console.error('hideLoading 错误:', error);
      }
    }

    function showToast(message) {
      try {
        // 直接使用本地实现，避免调用window.showToast导致的无限递归
        const toast = document.createElement('div');
        toast.style.cssText = `
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: rgba(0,0,0,0.8);
          color: #fff;
          padding: 20px 40px;
          border-radius: 10px;
          z-index: 9999;
          text-align: center;
        `;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      } catch (error) {
        console.error('showToast 错误:', error);
        // 降级处理
        console.log('提示:', message);
      }
    }
  </script>
</body>
</html>
