<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="css/mobile-adapt.css">
  <title>Token 持久化测试 - 灵月仙途</title>
  <style>
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      max-width: 700px;
      width: 100%;
    }
    h1 {
      color: #f4d03f;
      text-align: center;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    .section {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      border-left: 3px solid #f4d03f;
    }
    .section-title {
      color: #f4d03f;
      font-weight: bold;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .info-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .info-label {
      color: #aaa;
      font-size: 0.85rem;
    }
    .info-value {
      color: #f4d03f;
      font-family: monospace;
      word-break: break-all;
      font-size: 0.9rem;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
    }
    .status-ok {
      background: #4CAF50;
      color: white;
    }
    .status-error {
      background: #f44336;
      color: white;
    }
    .status-warn {
      background: #ff9800;
      color: white;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #f4d03f, #f1c40f);
      border: none;
      border-radius: 8px;
      color: #333;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .btn:hover {
      background: linear-gradient(90deg, #f1c40f, #f4d03f);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(244, 208, 63, 0.4);
    }
    .btn-danger {
      background: linear-gradient(90deg, #ff6b6b, #ee5a5a);
    }
    .btn-danger:hover {
      background: linear-gradient(90deg, #ee5a5a, #ff6b6b);
    }
    .btn-success {
      background: linear-gradient(90deg, #4CAF50, #45a049);
    }
    .btn-success:hover {
      background: linear-gradient(90deg, #45a049, #4CAF50);
    }
    .grid-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }
    .log-container {
      background: #000;
      border-radius: 8px;
      padding: 15px;
      max-height: 250px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.8rem;
      color: #0f0;
      margin-top: 20px;
    }
    .log-entry {
      margin-bottom: 5px;
    }
    .log-error { color: #f44; }
    .log-warn { color: #ff0; }
    .log-info { color: #0f0; }
    .test-result {
      padding: 10px;
      border-radius: 5px;
      margin-top: 10px;
      font-weight: bold;
    }
    .test-pass {
      background: rgba(76, 175, 80, 0.3);
      border: 1px solid #4CAF50;
      color: #4CAF50;
    }
    .test-fail {
      background: rgba(244, 67, 54, 0.3);
      border: 1px solid #f44336;
      color: #f44336;
    }
  </style>

  </head>
<body>
  <div class="container">
    <h1>🔐 Token 持久化测试</h1>
    <div class="subtitle">灵月仙途 - 身份认证状态检测工具</div>
    
    <div class="section">
      <div class="section-title">
        <span>📊 当前状态</span>
        <span id="overallStatus" class="status-badge status-error">检测中...</span>
      </div>
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">Token 存在</span>
          <span class="info-value" id="tokenExists">检查中...</span>
        </div>
        <div class="info-item">
          <span class="info-label">User ID</span>
          <span class="info-value" id="userId">检查中...</span>
        </div>
        <div class="info-item">
          <span class="info-label">Role ID</span>
          <span class="info-value" id="roleId">检查中...</span>
        </div>
        <div class="info-item">
          <span class="info-label">Token 格式</span>
          <span class="info-value" id="tokenFormat">检查中...</span>
        </div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">🔑 Token 详情</div>
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">Token 长度</span>
          <span class="info-value" id="tokenLength">0</span>
        </div>
        <div class="info-item">
          <span class="info-label">Token 过期时间</span>
          <span class="info-value" id="tokenExp">未知</span>
        </div>
        <div class="info-item">
          <span class="info-label">备份存在</span>
          <span class="info-value" id="backupExists">检查中...</span>
        </div>
        <div class="info-item">
          <span class="info-label">备份时间</span>
          <span class="info-value" id="backupTime">未知</span>
        </div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">✅ TokenManager 状态</div>
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">TokenManager 已加载</span>
          <span class="info-value" id="tokenManagerLoaded">检查中...</span>
        </div>
        <div class="info-item">
          <span class="info-label">TokenUtils 可用</span>
          <span class="info-value" id="tokenUtilsAvailable">检查中...</span>
        </div>
      </div>
    </div>
    
    <div class="grid-buttons">
      <button class="btn btn-success" onclick="testTokenPersistence()">测试 Token 持久性</button>
      <button class="btn" onclick="testApiConnection()">测试 API 连接</button>
      <button class="btn" onclick="goToLogin()">去登录</button>
      <button class="btn btn-danger" onclick="clearAllData()">清除所有数据</button>
    </div>
    
    <button class="btn" onclick="refreshPage()" style="margin-top: 10px;">刷新页面</button>
    
    <div class="log-container" id="logContainer">
      <div class="log-entry log-info">Token 持久化测试工具已启动...</div>
    </div>
  </div>
  
  <script src="js/token-manager.js"></script>
  <script>
    const logContainer = document.getElementById('logContainer');
    
    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = 'log-entry log-' + type;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }
    
    function checkTokenStatus() {
      const token = window.TokenUtils ? window.TokenUtils.get() : localStorage.getItem('token');
      const userId = localStorage.getItem('userId');
      const roleId = localStorage.getItem('roleId');
      const backup = localStorage.getItem('_token_backup_');
      
      // 更新状态显示
      document.getElementById('tokenExists').innerHTML = token ? 
        '<span class="status-badge status-ok">✓ 存在</span>' : 
        '<span class="status-badge status-error">✗ 不存在</span>';
      
      document.getElementById('userId').textContent = userId || '不存在';
      document.getElementById('roleId').textContent = roleId || '不存在';
      
      // Token 格式检查
      if (token) {
        const parts = token.split('.');
        document.getElementById('tokenFormat').innerHTML = parts.length === 3 ?
          '<span class="status-badge status-ok">JWT 格式</span>' :
          '<span class="status-badge status-warn">非 JWT 格式</span>';
        
        document.getElementById('tokenLength').textContent = token.length;
        
        // 解析过期时间
        try {
          if (parts.length === 3) {
            const payload = JSON.parse(atob(parts[1]));
            if (payload.exp) {
              const expDate = new Date(payload.exp * 1000);
              const now = new Date();
              const isExpired = expDate < now;
              document.getElementById('tokenExp').textContent = 
                `${expDate.toLocaleString()} (${isExpired ? '已过期' : '有效'})`;
            } else {
              document.getElementById('tokenExp').textContent = '无过期时间';
            }
          }
        } catch (e) {
          document.getElementById('tokenExp').textContent = '无法解析';
        }
      } else {
        document.getElementById('tokenFormat').textContent = '无 Token';
        document.getElementById('tokenLength').textContent = '0';
        document.getElementById('tokenExp').textContent = '无 Token';
      }
      
      // 备份状态
      if (backup) {
        document.getElementById('backupExists').innerHTML = 
          '<span class="status-badge status-ok">✓ 存在</span>';
        try {
          const backupData = JSON.parse(backup);
          const backupTime = new Date(backupData.timestamp);
          document.getElementById('backupTime').textContent = backupTime.toLocaleString();
        } catch (e) {
          document.getElementById('backupTime').textContent = '无法解析';
        }
      } else {
        document.getElementById('backupExists').innerHTML = 
          '<span class="status-badge status-error">✗ 不存在</span>';
        document.getElementById('backupTime').textContent = '无备份';
      }
      
      // TokenManager 状态
      document.getElementById('tokenManagerLoaded').innerHTML = 
        (window.TokenManager && window.TokenManager.init) ?
        '<span class="status-badge status-ok">✓ 已加载</span>' :
        '<span class="status-badge status-error">✗ 未加载</span>';
      
      document.getElementById('tokenUtilsAvailable').innerHTML = 
        (window.TokenUtils && window.TokenUtils.save) ?
        '<span class="status-badge status-ok">✓ 可用</span>' :
        '<span class="status-badge status-error">✗ 不可用</span>';
      
      // 总体状态
      const hasToken = !!token;
      const hasUserId = !!userId;
      const hasRoleId = !!roleId;
      const hasTokenManager = !!(window.TokenManager && window.TokenUtils);
      
      const overallStatus = document.getElementById('overallStatus');
      if (hasToken && hasUserId && hasRoleId && hasTokenManager) {
        overallStatus.className = 'status-badge status-ok';
        overallStatus.textContent = '✓ 状态良好';
        log('Token 状态检查通过', 'info');
      } else if (!hasToken && (hasUserId || hasRoleId)) {
        overallStatus.className = 'status-badge status-error';
        overallStatus.textContent = '✗ 数据不一致';
        log('警告：有 userId/roleId 但没有 Token', 'error');
      } else if (!hasToken) {
        overallStatus.className = 'status-badge status-error';
        overallStatus.textContent = '✗ 未登录';
        log('未检测到 Token，需要登录', 'error');
      } else {
        overallStatus.className = 'status-badge status-warn';
        overallStatus.textContent = '⚠ 状态异常';
        log('Token 状态异常', 'warn');
      }
    }
    
    async function testTokenPersistence() {
      log('=== 开始 Token 持久性测试 ===', 'info');
      
      const token = window.TokenUtils ? window.TokenUtils.get() : localStorage.getItem('token');
      
      if (!token) {
        log('测试失败：没有 Token', 'error');
        showTestResult('测试失败：没有 Token，请先登录', false);
        return;
      }
      
      // 模拟页面刷新
      log('模拟页面刷新...', 'info');
      const tokenBefore = token;
      
      // 使用 TokenManager 获取 Token
      const tokenAfter = window.TokenUtils ? window.TokenUtils.get() : localStorage.getItem('token');
      
      if (tokenBefore === tokenAfter) {
        log('✓ Token 持久性测试通过：刷新后 Token 仍然存在', 'info');
        showTestResult('Token 持久性测试通过 ✓', true);
      } else {
        log('✗ Token 持久性测试失败：刷新后 Token 丢失', 'error');
        showTestResult('Token 持久性测试失败 ✗', false);
      }
    }
    
    async function testApiConnection() {
      log('=== 开始 API 连接测试 ===', 'info');
      
      const token = window.TokenUtils ? window.TokenUtils.get() : localStorage.getItem('token');
      const roleId = localStorage.getItem('roleId');
      
      if (!token) {
        log('测试失败：没有 Token', 'error');
        alert('请先登录！');
        return;
      }
      
      try {
        const response = await fetch(`http://localhost:8088/api/role/${roleId}`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (response.ok) {
          const data = await response.json();
          log(`✓ API 测试成功！状态码：${response.status}`, 'info');
          log('返回数据：' + JSON.stringify(data).substring(0, 100), 'info');
          showTestResult('API 连接测试成功 ✓', true);
          alert('API 连接成功！');
        } else {
          const errorData = await response.json().catch(() => ({}));
          log(`✗ API 测试失败！状态码：${response.status}, 错误：${errorData.message || '未知'}`, 'error');
          showTestResult(`API 连接失败：${response.status}`, false);
          alert(`API 连接失败：${response.status} - ${errorData.message || '未知错误'}`);
        }
      } catch (error) {
        log(`✗ API 测试异常：${error.message}`, 'error');
        showTestResult(`API 连接异常：${error.message}`, false);
        alert(`API 连接异常：${error.message}`);
      }
    }
    
    function showTestResult(message, success) {
      const existingResult = document.querySelector('.test-result');
      if (existingResult) {
        existingResult.remove();
      }
      
      const resultDiv = document.createElement('div');
      resultDiv.className = 'test-result ' + (success ? 'test-pass' : 'test-fail');
      resultDiv.textContent = message;
      resultDiv.style.marginTop = '15px';
      
      document.querySelector('.grid-buttons').after(resultDiv);
      
      setTimeout(() => {
        resultDiv.remove();
      }, 5000);
    }
    
    function goToLogin() {
      log('跳转到登录页面...', 'info');
      window.location.href = 'login.html';
    }
    
    function clearAllData() {
      if (confirm('确定要清除所有本地数据吗？此操作不可恢复！')) {
        localStorage.clear();
        log('✓ 已清除所有本地数据', 'info');
        alert('已清除所有本地数据，请重新登录。');
        checkTokenStatus();
      }
    }
    
    function refreshPage() {
      log('刷新页面...', 'info');
      window.location.reload();
    }
    
    // 页面加载时执行检查
    window.addEventListener('DOMContentLoaded', () => {
      log('=== Token 持久化测试工具 ===', 'info');
      log('检查 Token 状态...', 'info');
      checkTokenStatus();
    });
  </script>
</body>
</html>
