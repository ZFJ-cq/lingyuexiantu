<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="css/mobile-adapt.css">
  <title>灵月仙途 - 月度签到</title>
  <style>
    :root {
      --gold-primary: #e6c749;
      --gold-light: #f4d03f;
      --gold-dark: #b8860b;
      --text-main: #fdfbf7;
      --text-dim: #a89f81;
      --bg-glass: rgba(20, 25, 40, 0.85);
      --card-bg: rgba(30, 35, 50, 0.6);
      --card-future: rgba(20, 25, 40, 0.3);
      --success-color: #4caf50;
      --danger-color: #e74c3c;
      --missed-color: #5a5a5a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Microsoft YaHei', 'SimSun', serif;
      background: linear-gradient(to bottom, #0f1219, #1a1f2e), url('images/beijing2.jpg');
      background-size: cover;
      background-position: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* --- 背景特效 --- */
    .bg-effects {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .fog {
      position: absolute;
      width: 300%;
      height: 100%;
      background: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png') repeat-x;
      background-size: contain;
      animation: moveFog 60s linear infinite;
      opacity: 0.2;
    }

    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(var(--gold-primary) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: floatUp 20s linear infinite;
      opacity: 0.15;
    }

    @keyframes moveFog { from { transform: translateX(0); } to { transform: translateX(-33%); } }
    @keyframes floatUp { from { background-position: 0 100%; } to { background-position: 0 0; } }

    /* --- 主容器 --- */
    .main-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      height: 100%;
      max-height: 850px;
      display: flex;
      flex-direction: column;
      padding: 20px;
      justify-content: space-between;
    }

    @media (min-width: 480px) {
      .main-container {
        height: 90vh;
        background: var(--bg-glass);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(230, 199, 73, 0.2);
        border-radius: 20px;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.6);
        padding: 30px;
      }
    }

    /* --- 头部 --- */
    .header {
      text-align: center;
      position: relative;
      margin-bottom: 10px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .title-vertical {
      font-family: 'SimSun', serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--gold-primary);
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 12px;
      height: 120px;
      text-shadow: 0 0 15px rgba(230, 199, 73, 0.5);
      position: relative;
      margin-bottom: 10px;
    }

    .title-seal {
      position: absolute;
      bottom: 10px;
      right: -25px;
      width: 28px;
      height: 28px;
      background: #b22222;
      color: #fff;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transform: rotate(-15deg);
      box-shadow: 0 2px 5px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      background: rgba(0,0,0,0.3);
      padding: 8px 15px;
      border-radius: 20px;
      border: 1px solid rgba(230, 199, 73, 0.2);
      margin-top: 5px;
    }

    .month-nav {
      background: none;
      border: none;
      color: var(--gold-primary);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 10px;
    }
    
    .month-nav:disabled {
      color: var(--text-dim);
      cursor: not-allowed;
    }

    .current-month-label {
      font-size: 1.1rem;
      font-weight: bold;
      font-family: 'SimSun', serif;
      color: var(--text-main);
    }

    .lunar-date {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 4px;
      font-style: italic;
    }

    /* --- 核心内容区 --- */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow: hidden;
      justify-content: flex-start;
    }

    /* 统计卡片 */
    .stats-card {
      display: flex;
      justify-content: space-around;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 12px;
      padding: 12px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-val {
      font-size: 1.3rem;
      color: var(--gold-light);
      font-weight: bold;
      font-family: 'SimSun', serif;
      text-shadow: 0 0 10px rgba(230, 199, 73, 0.4);
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* 星期头 */
    .weekdays-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.8rem;
      color: var(--gold-dim);
      margin-bottom: 5px;
      font-family: 'SimSun', serif;
    }

    /* 日历网格 */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      max-width: 100%;
      padding-bottom: 5px;
    }

    .day-card {
      aspect-ratio: 1/1.1;
      background: var(--card-bg);
      border: 1px solid rgba(230, 199, 73, 0.2);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2px;
      position: relative;
      transition: all 0.3s ease;
      cursor: pointer;
      max-width: 100%;
      box-sizing: border-box;
    }

    .day-num {
      font-size: 0.9rem;
      font-weight: bold;
      color: var(--text-main);
      margin-bottom: 2px;
      font-family: 'Consolas', monospace;
    }

    .day-lunar {
      font-size: 0.55rem;
      color: var(--text-dim);
      text-align: center;
      line-height: 1;
    }

    .day-icon {
      font-size: 0.9rem;
      margin-top: 4px;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.5));
    }

    /* 状态样式 */
    .day-card.future {
      background: var(--card-future);
      border-color: rgba(255,255,255,0.05);
      opacity: 0.5;
      cursor: default;
    }
    
    .day-card.future .day-num {
      color: var(--text-dim);
    }

    .day-card.current {
      border-color: var(--gold-light);
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.4);
      animation: pulseGold 2s infinite;
      background: rgba(230, 199, 73, 0.1);
      transform: scale(1.05);
      z-index: 2;
    }

    .day-card.checked {
      background: rgba(20, 40, 20, 0.8);
      border-color: rgba(76, 175, 80, 0.4);
    }
    
    .day-card.checked .day-icon {
      color: var(--success-color);
    }

    .day-card.missed {
      background: rgba(30, 30, 30, 0.6);
      border-color: rgba(255,255,255,0.1);
      opacity: 0.7;
    }
    
    .day-card.missed .day-num {
      color: var(--missed-color);
      text-decoration: line-through;
    }

    /* 印章效果 */
    .stamp {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-25deg);
      width: 70%;
      height: 30px;
      border: 2px solid var(--danger-color);
      color: var(--danger-color);
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-family: 'SimSun', serif;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      mask-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
    }

    .day-card.checked .stamp {
      opacity: 0.8;
    }

    @keyframes pulseGold {
      0% { box-shadow: 0 0 10px rgba(230, 199, 73, 0.2); }
      50% { box-shadow: 0 0 20px rgba(230, 199, 73, 0.6); }
      100% { box-shadow: 0 0 10px rgba(230, 199, 73, 0.2); }
    }

    /* --- 底部操作区 --- */
    .footer-action {
      margin-top: 15px;
      flex-shrink: 0;
    }

    .checkin-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, transparent, rgba(230, 199, 73, 0.2), transparent);
      border: 2px solid var(--gold-primary);
      border-radius: 8px;
      color: var(--gold-primary);
      font-size: 1.3rem;
      font-weight: bold;
      font-family: 'SimSun', serif;
      letter-spacing: 6px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.2);
    }

    .checkin-btn:hover:not(:disabled) {
      background: linear-gradient(90deg, transparent, rgba(230, 199, 73, 0.4), transparent);
      box-shadow: 0 0 25px rgba(230, 199, 73, 0.5);
      letter-spacing: 8px;
    }

    .checkin-btn:disabled {
      border-color: var(--text-dim);
      color: var(--text-dim);
      cursor: not-allowed;
      box-shadow: none;
      background: rgba(0,0,0,0.2);
    }

    .ink-effect {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(230, 199, 73, 0.4);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s ease-out, height 0.6s ease-out;
      z-index: 0;
    }
    
    .checkin-btn.clicked .ink-effect {
      width: 300%;
      height: 300%;
    }

    .btn-text {
      position: relative;
      z-index: 1;
    }

    /* --- 弹窗特效 --- */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(5px);
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .reward-modal {
      background: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="%231a202c"/><path d="M0 0 L100 100 M100 0 L0 100" stroke="%23333" stroke-width="1"/></svg>');
      background-size: 20px;
      width: 80%;
      max-width: 320px;
      border: 2px solid var(--gold-primary);
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
      transform: scale(0.8);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 0 50px rgba(230, 199, 73, 0.4);
      position: relative;
    }

    .modal-overlay.active .reward-modal {
      transform: scale(1);
    }

    .modal-title {
      font-size: 1.5rem;
      color: var(--gold-primary);
      font-family: 'SimSun', serif;
      margin-bottom: 15px;
      text-shadow: 0 0 10px rgba(230, 199, 73, 0.6);
    }

    .modal-item {
      font-size: 2.5rem;
      margin: 10px 0;
      animation: bounce 1s infinite;
    }

    .modal-desc {
      font-size: 1.1rem;
      color: var(--text-main);
      margin-bottom: 20px;
    }

    .modal-btn {
      background: var(--gold-primary);
      color: #1a202c;
      border: none;
      padding: 10px 30px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'SimSun', serif;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 返回按钮 */
    .back-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 20;
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--gold-primary);
      color: var(--gold-primary);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-height: 700px) {
      .title-vertical { font-size: 2rem; height: 100px; }
      .day-card { aspect-ratio: 1/1.1; }
      .day-icon { font-size: 0.8rem; }
      .day-lunar { font-size: 0.5rem; }
    }
  </style>

  </head>
<body>

  <!-- 背景特效 -->
  <div class="bg-effects">
    <div class="fog"></div>
    <div class="particles"></div>
  </div>

  <div class="main-container">
    <!-- 返回按钮 -->
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>

    <!-- 头部 -->
    <div class="header">
      <h1 class="title-vertical">
        月度赐福
        <div class="title-seal">福</div>
      </h1>
      
      <div class="calendar-header">
        <button class="month-nav" id="prevMonth" onclick="changeMonth(-1)">❮</button>
        <div style="text-align: center;">
          <div class="current-month-label" id="monthLabel">2026 年 3 月</div>
          <div class="lunar-date" id="lunarLabel">丙午年 二月初七</div>
        </div>
        <button class="month-nav" id="nextMonth" onclick="changeMonth(1)">❯</button>
      </div>
    </div>

    <!-- 内容区 -->
    <div class="content-area">
      <!-- 统计 -->
      <div class="stats-card">
        <div class="stat-item">
          <div class="stat-val" id="monthCheckedVal">0</div>
          <div class="stat-label">本月已签</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="consecutiveVal">0</div>
          <div class="stat-label">连续天数</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" style="color: var(--success-color);" id="statusVal">未签</div>
          <div class="stat-label">今日状态</div>
        </div>
      </div>

      <!-- 星期头 -->
      <div class="weekdays-header">
        <div style="color:var(--danger-color)">日</div>
        <div>一</div>
        <div>二</div>
        <div>三</div>
        <div>四</div>
        <div>五</div>
        <div style="color:var(--danger-color)">六</div>
      </div>

      <!-- 日历网格 -->
      <div class="calendar-grid" id="calendarGrid">
        <!-- JS 动态生成 -->
      </div>
    </div>

    <!-- 底部按钮 -->
    <div class="footer-action">
      <button class="checkin-btn" id="checkinBtn" onclick="handleCheckin()">
        <div class="ink-effect"></div>
        <span class="btn-text">立即签到</span>
      </button>
    </div>
  </div>

  <!-- 奖励弹窗 -->
  <div class="modal-overlay" id="rewardModal">
    <div class="reward-modal">
      <div class="modal-title">天道酬勤</div>
      <div class="modal-item" id="modalIcon">🎁</div>
      <div class="modal-desc" id="modalText">获得 灵气丹 × 10</div>
      <button class="modal-btn" onclick="closeModal()">收下机缘</button>
    </div>
  </div>

  <script>
    // 配置数据：每日奖励 (按日期 1-31 配置，超出当月天数的不显示)
    const dailyRewards = {
      1: { name: '灵气丹', count: 10, icon: '💊', color: '#4caf50' },
      2: { name: '下品灵石', count: 100, icon: '💎', color: '#2196f3' },
      3: { name: '筑基符', count: 1, icon: '📜', color: '#e6c749' },
      4: { name: '中品灵石', count: 50, icon: '💠', color: '#9c27b0' },
      5: { name: '洗髓丹', count: 2, icon: '🧪', color: '#ff5722' },
      6: { name: '玄铁精', count: 5, icon: '⚙️', color: '#607d8b' },
      7: { name: '极品灵石', count: 10, icon: '👑', color: '#ffd700' },
      // 循环或特定日期奖励
      10: { name: '千年人参', count: 1, icon: '🥕', color: '#ff9800' },
      15: { name: '元婴果', count: 1, icon: '🍑', color: '#e91e63' },
      20: { name: '飞升令', count: 1, icon: '🪐', color: '#673ab7' },
      30: { name: '仙缘宝箱', count: 1, icon: '🎁', color: '#ffeb3b' },
    };

    // 默认奖励
    const defaultReward = { name: '灵石碎片', count: 50, icon: '💠', color: '#90a4ae' };

    let checkinData = {
      history: [] // 存储格式: "YYYY-MM-DD"
    };

    let currentViewDate = new Date(); // 当前查看的月份
    let today = new Date(); // 真实今天

    // 简易农历模拟 (实际项目建议引入 lunar-javascript 库)
    function getLunarDate(date) {
      const days = ['初','十','二十','三十'];
      const nums = ['一','二','三','四','五','六','七','八','九','十'];
      const d = date.getDate();
      
      if (d === 1) return '初一';
      if (d === 10) return '初十';
      if (d === 20) return '二十';
      if (d === 30) return '三十';
      
      if (d < 10) return '初' + nums[d-1];
      if (d < 20) return '十' + nums[d-10];
      if (d < 30) return '二十' + nums[d-20];
      return '三十';
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      renderCalendar();
      updateUI();
    });

    function loadData() {
      const saved = localStorage.getItem('lingyue_checkin_monthly');
      if (saved) {
        checkinData = JSON.parse(saved);
      }
    }

    function saveData() {
      localStorage.setItem('lingyue_checkin_monthly', JSON.stringify(checkinData));
    }

    function changeMonth(delta) {
      currentViewDate.setMonth(currentViewDate.getMonth() + delta);
      renderCalendar();
      updateUI();
    }

    function renderCalendar() {
      const grid = document.getElementById('calendarGrid');
      const monthLabel = document.getElementById('monthLabel');
      const lunarLabel = document.getElementById('lunarLabel');
      
      grid.innerHTML = '';
      
      const year = currentViewDate.getFullYear();
      const month = currentViewDate.getMonth();
      
      // 更新头部
      monthLabel.textContent = `${year}年 ${month + 1}月`;
      
      // 如果是今天，显示农历
      if (year === today.getFullYear() && month === today.getMonth()) {
        lunarLabel.textContent = `丙午年 ${getLunarDate(today)}`;
      } else {
        lunarLabel.textContent = '择吉日签到';
      }

      // 计算当月第一天是星期几
      const firstDay = new Date(year, month, 1);
      const startWeekDay = firstDay.getDay(); // 0-6
      
      // 计算当月总天数
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      // 填充空白
      for (let i = 0; i < startWeekDay; i++) {
        const empty = document.createElement('div');
        grid.appendChild(empty);
      }
      
      // 填充日期
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const cellDate = new Date(year, month, d);
        
        const isChecked = checkinData.history.includes(dateStr);
        const isToday = (cellDate.toDateString() === today.toDateString());
        const isFuture = cellDate > today;
        const isMissed = cellDate < today && !isChecked;
        
        const card = document.createElement('div');
        card.className = `day-card ${isChecked ? 'checked' : ''} ${isToday ? 'current' : ''} ${isFuture ? 'future' : ''} ${isMissed ? 'missed' : ''}`;
        
        // 获取奖励图标
        const reward = dailyRewards[d] || defaultReward;
        
        card.innerHTML = `
          <div class="day-num">${d}</div>
          <div class="day-lunar">${getLunarDate(cellDate)}</div>
          <div class="day-icon" style="color:${isFuture ? 'transparent' : reward.color}">${isFuture ? '' : reward.icon}</div>
          <div class="stamp">已领</div>
        `;
        
        if (!isFuture && !isChecked) {
          card.onclick = () => {
            // 只能点今天
            if (isToday) handleCheckin();
          };
        }
        
        grid.appendChild(card);
      }
    }

    function updateUI() {
      const year = today.getFullYear();
      const month = today.getMonth();
      const todayStr = `${year}-${String(month+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      
      // 计算本月签到数
      const prefix = `${year}-${String(month+1).padStart(2,'0')}-`;
      const monthCount = checkinData.history.filter(d => d.startsWith(prefix)).length;
      
      // 计算连续签到 (从今天往前推)
      let consecutive = 0;
      let checkDate = new Date(today);
      while (true) {
        const dStr = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
        if (checkinData.history.includes(dStr)) {
          consecutive++;
          checkDate.setDate(checkDate.getDate() - 1);
        } else {
          break;
        }
      }

      const isTodayChecked = checkinData.history.includes(todayStr);

      document.getElementById('monthCheckedVal').textContent = monthCount;
      document.getElementById('consecutiveVal').textContent = consecutive;
      
      const btn = document.getElementById('checkinBtn');
      const statusVal = document.getElementById('statusVal');
      
      // 只有查看的是当前月且是今天，才能签到
      const isViewingToday = (currentViewDate.getMonth() === today.getMonth() && currentViewDate.getFullYear() === today.getFullYear());

      if (isTodayChecked) {
        btn.disabled = true;
        btn.querySelector('.btn-text').textContent = '今日已赐福';
        statusVal.textContent = '已签';
        statusVal.style.color = 'var(--success-color)';
      } else if (!isViewingToday) {
        btn.disabled = true;
        btn.querySelector('.btn-text').textContent = '非今日';
        statusVal.textContent = '查看中';
        statusVal.style.color = 'var(--text-dim)';
      } else {
        btn.disabled = false;
        btn.querySelector('.btn-text').textContent = '立即签到';
        statusVal.textContent = '未签';
        statusVal.style.color = 'var(--gold-primary)';
      }
    }

    async function handleCheckin() {
      const btn = document.getElementById('checkinBtn');
      if (btn.disabled) return;

      // 墨迹动画
      btn.classList.add('clicked');
      
      setTimeout(async () => {
        try {
          // 优先使用当前登录角色的 roleId
          const roleId = localStorage.getItem('roleId') || localStorage.getItem('currentRoleId');
          if (!roleId) {
            showToast('请先选择角色', 'error');
            return;
          }
          
          console.log('签到使用的 roleId:', roleId);
          
          // 调用新的签到 API
          const response = await window.apiService.post(`/checkin/do`, {
            roleId: roleId
          });
          
          const result = await response.json();
          console.log('签到结果:', result);
          
          if (result.code === 200) {
            // 签到成功
            const day = result.data.day;
            const continuousDays = result.data.continuousDays;
            
            // 更新本地数据
            const today = new Date();
            const dateStr = formatDate(today);
            if (!checkinData.history.includes(dateStr)) {
              checkinData.history.push(dateStr);
              saveData();
            }
            
            // 显示奖励
            showRewardWithContinuous(day, continuousDays, result.data.rewards);
            
            // 重新加载签到状态
            await loadCheckinStatus();
          } else if (result.code === 400) {
            // 今日已签到
            showToast(result.message || '今日已签到', 'error');
          } else {
            showToast(result.message || '签到失败', 'error');
          }
        } catch (error) {
          console.error('签到失败:', error);
          showToast('网络错误，请稍后重试', 'error');
        }
        
        updateUI();
        renderCalendar(); // 重新渲染以更新状态
        
        setTimeout(() => btn.classList.remove('clicked'), 600);
      }, 300);
    }
    
    // 补签函数
    async function doSupplement(day) {
      try {
        const roleId = localStorage.getItem('roleId') || localStorage.getItem('currentRoleId');
        if (!roleId) {
          showToast('请先选择角色', 'error');
          return;
        }
        
        if (!confirm(`确定要补签第${day}天吗？（消耗灵石 100，奖励减半）`)) {
          return;
        }
        
        const response = await window.apiService.post(`/checkin/supplement`, {
          roleId: roleId,
          day: day
        });
        
        const result = await response.json();
        console.log('补签结果:', result);
        
        if (result.code === 200) {
          showToast('补签成功！', 'success');
          // 重新加载签到状态
          await loadCheckinStatus();
        } else {
          showToast(result.message || '补签失败', 'error');
        }
      } catch (error) {
        console.error('补签失败:', error);
        showToast('网络错误，请稍后重试', 'error');
      }
    }
    
    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }
    
    // 加载月度签到状态
    async function loadCheckinStatus() {
      try {
        const roleId = localStorage.getItem('roleId') || localStorage.getItem('currentRoleId');
        if (!roleId) return;
        
        const response = await window.apiService.get(`/checkin/monthly/${roleId}`);
        const result = await response.json();
        
        if (result.code === 200 && result.data) {
          const data = result.data;
          
          // 更新签到历史
          checkinData.history = [];
          if (data.checkinDays && Array.isArray(data.checkinDays)) {
            const year = data.year || new Date().getFullYear();
            const month = data.month || new Date().getMonth() + 1;
            
            data.checkinDays.forEach((status, index) => {
              if (status === 1 || status === 2) {
                // 已签到或补签
                const day = index + 1;
                const date = new Date(year, month - 1, day);
                checkinData.history.push(formatDate(date));
              }
            });
          }
          
          // 更新连续签到天数
          checkinData.continuous = data.continuousDays || 0;
          checkinData.total = data.totalDays || 0;
          checkinData.supplementCount = data.supplementCount || 0;
          
          saveData();
          updateUI();
          renderCalendar();
        }
      } catch (error) {
        console.error('加载签到状态失败:', error);
      }
    }
    
    // 显示奖励（带连续签到信息）
    function showRewardWithContinuous(day, continuousDays, rewards) {
      let html = `
        <div style="text-align: center;">
          <div style="font-size: 3rem; margin-bottom: 15px;">🎁</div>
          <div style="font-size: 1.2rem; color: var(--gold-primary); margin-bottom: 10px;">
            签到成功！
          </div>
          <div style="font-size: 0.9rem; color: var(--text-dim); margin-bottom: 15px;">
            第${day}天 · 连续签到${continuousDays}天
          </div>
      `;
      
      // 显示奖励列表
      if (rewards && rewards.data) {
        const resourceRewards = rewards.data.resourceRewards || {};
        const itemRewards = rewards.data.itemRewards || [];
        
        html += '<div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px;">';
        
        if (resourceRewards.lingshi) {
          html += `<div style="background: rgba(230, 199, 73, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(230, 199, 73, 0.3);">
            <div style="font-size: 1.5rem;">💰</div>
            <div style="font-size: 0.85rem; color: var(--gold-primary);">灵石 x${resourceRewards.lingshi}</div>
          </div>`;
        }
        
        if (resourceRewards.xiuwei) {
          html += `<div style="background: rgba(100, 149, 237, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(100, 149, 237, 0.3);">
            <div style="font-size: 1.5rem;">✨</div>
            <div style="font-size: 0.85rem; color: #6495ED;">修为 x${resourceRewards.xiuwei}</div>
          </div>`;
        }
        
        if (resourceRewards.hunshi) {
          html += `<div style="background: rgba(255, 99, 71, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 99, 71, 0.3);">
            <div style="font-size: 1.5rem;">🔥</div>
            <div style="font-size: 0.85rem; color: #FF6347;">魂石 x${resourceRewards.hunshi}</div>
          </div>`;
        }
        
        html += '</div>';
      }
      
      html += `
          <div style="font-size: 0.85rem; color: var(--text-dim);">
            点击任意位置关闭
          </div>
        </div>
      `;
      
      // 使用 ui-components 的 showToast 或自定义弹窗
      const modal = document.getElementById('rewardModal');
      if (modal) {
        document.querySelector('.modal-content').innerHTML = html;
        modal.classList.add('active');
        
        // 点击关闭
        modal.onclick = () => {
          modal.classList.remove('active');
          // 恢复原始内容
          setTimeout(() => {
            location.reload(); // 重新加载以更新 UI
          }, 300);
        };
      }
    }

    function showReward(reward) {
      const modal = document.getElementById('rewardModal');
      document.getElementById('modalIcon').textContent = reward.icon;
      document.getElementById('modalText').innerHTML = `获得 <span style="color:${reward.color}; font-weight:bold;">${reward.name}</span> × ${reward.count}`;
      document.getElementById('modalIcon').style.color = reward.color;
      
      modal.classList.add('active');
    }

    function closeModal() {
      document.getElementById('rewardModal').classList.remove('active');
    }

    document.getElementById('rewardModal').addEventListener('click', (e) => {
      if (e.target.id === 'rewardModal') closeModal();
    });
  </script>
  <script src="js/store.js"></script>
  <script src="js/config.js"></script>
  <script src="../js/auth-service.js"></script>
  <script src="js/ui-components.js"></script>
</body>
