<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="css/mobile-adapt.css">
    <title>检查 Token - 灵月仙途</title>
    <style>
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .info {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .info div {
            margin: 5px 0;
        }
        button {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        button:hover {
            background: #aa8c2c;
        }
    </style>

  </head>
<body>
    <h1>🔍 检查 Token 状态</h1>
    
    <div class="info">
        <h3>当前 localStorage 数据：</h3>
        <div id="localStorageData">加载中...</div>
    </div>
    
    <div class="info">
        <h3>测试结果：</h3>
        <div id="testResult">等待测试...</div>
    </div>
    
    <button onclick="checkToken()">🔄 重新检查</button>
    <button onclick="testApi()">🧪 测试 API 请求</button>
    <button onclick="location.href='login.html'">🔑 去登录</button>
    <button onclick="location.href='index.html'">🏠 回首页</button>
    
    <script>
        function checkToken() {
            const data = {
                token: localStorage.getItem('token'),
                userId: localStorage.getItem('userId'),
                roleId: localStorage.getItem('roleId'),
                username: localStorage.getItem('username')
            };
            
            const html = Object.keys(data).map(key => 
                `<div><strong>${key}:</strong> ${data[key] ? (key === 'token' ? data[key].substring(0, 50) + '...' : data[key]) : '❌ 不存在'}</div>`
            ).join('');
            
            document.getElementById('localStorageData').innerHTML = html;
            
            if (data.token) {
                try {
                    const payload = JSON.parse(atob(data.token.split('.')[1]));
                    const expireTime = new Date(payload.exp * 1000).toLocaleString();
                    const now = Date.now() / 1000;
                    const isExpired = payload.exp && payload.exp < now;
                    
                    document.getElementById('localStorageData').innerHTML += 
                        `<div><strong>Token 过期时间:</strong> ${expireTime} (${isExpired ? '❌ 已过期' : '✅ 有效'})</div>`;
                } catch (e) {
                    document.getElementById('localStorageData').innerHTML += 
                        `<div><strong>Token 解析:</strong> ❌ 无法解析</div>`;
                }
            }
        }
        
        async function testApi() {
            const resultDiv = document.getElementById('testResult');
            resultDiv.innerHTML = '测试中...';
            
            const token = localStorage.getItem('token');
            const userId = localStorage.getItem('userId');
            
            if (!token) {
                resultDiv.innerHTML = '❌ Token 不存在，请先登录！';
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8088/api/role/user/${userId}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `✅ API 请求成功！<br><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    const error = await response.json();
                    resultDiv.innerHTML = `❌ API 请求失败 (${response.status})<br><pre>${JSON.stringify(error, null, 2)}</pre>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `❌ 请求错误：${error.message}`;
            }
        }
        
        // 页面加载时自动检查
        window.addEventListener('DOMContentLoaded', checkToken);
    </script>
</body>
</html>
