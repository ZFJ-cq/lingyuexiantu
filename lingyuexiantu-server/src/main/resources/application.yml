# 服务器基础配置
server:
  port: 8088
  servlet:
    context-path: /api
  tomcat:
    max-connections: 10000
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000

# SpringDoc OpenAPI/Swagger 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    default-models-expand-depth: 1
    default-model-expand-depth: 1
    display-request-duration: true
  show-actuator: false
  model-and-view-allowed: true

spring:
  main:
    allow-circular-references: true
  web:
    resources:
      add-mappings: false
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  # 数据源配置（连接 MySQL）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:lingyuexiantu}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
    # HikariCP 连接池配置
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      pool-name: LingyueXiantuHikariPool
      register-mbeans: true
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  # Flyway 配置
  flyway:
    enabled: false
    baseline-on-migrate: true
    validate-on-migrate: false
    locations: classpath:db/migration

# 跨域配置
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5500,http://localhost:8000}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# JWT 配置
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-must-be-at-least-32-chars-long}
  expire-time: ${JWT_EXPIRE_TIME:86400000}

# 日志配置
logging:
  level:
    root: INFO
    com.lingyue: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/lingyuexiantu.log
    max-size: 10MB
    max-history: 30
  group:
    web: org.springframework.web
    security: org.springframework.security
    hibernate: org.hibernate