<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="../js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="../css/mobile-adapt.css">
  <title>灵月仙途 - 资产管理</title>
  <style>
    :root {
      --gold-primary: #e6c749;
      --gold-light: #f4d03f;
      --gold-dim: #8a7525;
      --text-main: #fdfbf7;
      --text-dim: #d4c5a9;
      --bg-dark: rgba(15, 20, 35, 0.95);
      --bg-panel: rgba(20, 25, 45, 0.85);
      --border-glow: 0 0 10px rgba(230, 199, 73, 0.3);
      --success: #4CAF50;
      --danger: #ff4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Microsoft YaHei', 'SimSun', serif;
      background: linear-gradient(to bottom, #0f1420, #1a202c), 
                  url('https://images.unsplash.com/photo-1518063319789-7217e6706b04?q=80&w=2070&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(var(--gold-primary) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: particleFloat 30s linear infinite;
      opacity: 0.15;
    }

    @keyframes particleFloat {
      from { background-position: 0 0; }
      to { background-position: 0 1000px; }
    }

    .main-container {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      overflow-y: auto;
      padding-bottom: 80px;
    }

    .top-status {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 15px;
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 10px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      position: relative;
    }

    .player-info {
      display: flex;
      align-items: center;
      gap: 10px;
      border-right: 1px solid rgba(230, 199, 73, 0.2);
      padding-right: 15px;
    }

    .player-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid var(--gold-primary);
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 0 10px rgba(230, 199, 73, 0.4);
      cursor: pointer;
      transition: transform 0.3s;
    }

    .player-avatar:hover { transform: scale(1.1); }

    .player-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .player-name {
      font-size: 1rem;
      color: var(--gold-primary);
      font-weight: bold;
      text-shadow: 0 0 5px rgba(230, 199, 73, 0.5);
    }

    .player-cultivation {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .resources-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      font-size: 0.75rem;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 10px;
      backdrop-filter: blur(10px);
    }

    .quick-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      background: rgba(30, 35, 55, 0.6);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.3s;
    }

    .quick-action-btn:hover {
      background: rgba(230, 199, 73, 0.2);
      color: var(--gold-primary);
      transform: translateY(-2px);
    }

    .quick-action-icon { font-size: 1.2rem; }
    .quick-action-text { font-size: 0.7rem; text-align: center; }

    .cultivation-cards {
      display: flex;
      gap: 10px;
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 10px;
      backdrop-filter: blur(10px);
      overflow-x: auto;
    }

    .cultivation-card {
      flex: 1;
      min-width: 150px;
      background: rgba(30, 35, 55, 0.6);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      transition: all 0.3s;
    }

    .cultivation-card:hover {
      background: rgba(230, 199, 73, 0.2);
      border-color: var(--gold-primary);
    }

    .cultivation-title {
      font-size: 0.9rem;
      color: var(--gold-primary);
      font-weight: bold;
      margin-bottom: 8px;
    }

    .cultivation-value {
      font-size: 1.1rem;
      color: var(--text-main);
      font-weight: bold;
      margin-bottom: 4px;
    }

    .cultivation-progress {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .bottom-info {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 10px;
      backdrop-filter: blur(10px);
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-label { font-size: 0.7rem; color: var(--text-dim); }
    .info-value { font-size: 0.9rem; color: var(--gold-light); font-weight: bold; }

    @media (max-width: 480px) {
      .quick-actions { grid-template-columns: repeat(5, 1fr); }
      .quick-action-text { font-size: 0.6rem; }
      .cultivation-cards { gap: 8px; }
      .cultivation-card { min-width: 120px; padding: 10px; }
      .bottom-info { gap: 8px; }
    }

    .resource-item {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,0,0,0.3);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: background 0.3s;
    }
    
    .resource-item:hover {
      background: rgba(230, 199, 73, 0.1);
    }

    .res-icon { font-size: 0.9rem; }
    .res-label { color: var(--text-dim); opacity: 0.8; }
    .res-value { color: var(--gold-light); font-weight: bold; white-space: nowrap; min-width: 45px; text-align: right;}

    .asset-tabs {
      display: flex;
      gap: 10px;
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      backdrop-filter: blur(10px);
    }

    .asset-tab {
      padding: 8px 16px;
      background: rgba(30, 35, 55, 0.6);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 20px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
      font-size: 0.9rem;
    }

    .asset-tab.active {
      background: var(--gold-primary);
      color: #1a2530;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(230, 199, 73, 0.5);
    }

    .asset-tab:hover {
      background: rgba(230, 199, 73, 0.2);
      color: var(--gold-primary);
    }

    .asset-list {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 15px;
      backdrop-filter: blur(10px);
      overflow-y: auto;
    }

    .asset-section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 1rem;
      color: var(--gold-primary);
      font-weight: bold;
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(230, 199, 73, 0.2);
    }

    .asset-items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
    }

    .asset-item {
      background: rgba(30, 35, 55, 0.6);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .asset-item:hover {
      background: rgba(230, 199, 73, 0.1);
      border-color: var(--gold-primary);
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.3);
    }

    .asset-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 5px rgba(230, 199, 73, 0.5));
    }

    .asset-name {
      font-size: 0.85rem;
      color: var(--text-main);
      margin-bottom: 4px;
      font-weight: bold;
    }

    .asset-quantity {
      font-size: 0.75rem;
      color: var(--gold-light);
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 10px;
      display: inline-block;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: linear-gradient(to top, rgba(15, 20, 35, 0.98), rgba(15, 20, 35, 0.8));
      border-top: 2px solid var(--gold-primary);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      box-shadow: 0 -5px 30px rgba(230, 199, 73, 0.4);
      backdrop-filter: blur(15px);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      color: var(--text-dim);
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 12px;
      transition: all 0.3s ease;
      position: relative;
      min-width: 70px;
    }

    .nav-item:hover {
      color: var(--gold-primary);
      background: rgba(230, 199, 73, 0.2);
      transform: translateY(-3px);
    }

    .nav-item.active {
      color: var(--gold-primary);
      background: rgba(230, 199, 73, 0.3);
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.5);
    }

    .nav-item.active::after {
      content: '';
      position: absolute;
      top: -8px;
      width: 25px;
      height: 4px;
      background: var(--gold-primary);
      border-radius: 0 0 4px 4px;
      box-shadow: 0 0 15px var(--gold-primary);
    }

    .nav-icon { font-size: 1.6rem; text-shadow: 0 0 10px rgba(230, 199, 73, 0.3); }
    .nav-text { font-size: 0.8rem; font-weight: 600; text-shadow: 0 0 5px rgba(230, 199, 73, 0.3); }
    .nav-item.active .nav-icon { animation: pulse 2s infinite; }

    @keyframes pulse {
      0% { text-shadow: 0 0 10px rgba(230, 199, 73, 0.3); }
      50% { text-shadow: 0 0 20px rgba(230, 199, 73, 0.8); }
      100% { text-shadow: 0 0 10px rgba(230, 199, 73, 0.3); }
    }

    .popup-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .popup-overlay.active { opacity: 1; pointer-events: all; }

    .popup-content {
      background: var(--bg-panel);
      border: 2px solid var(--gold-primary);
      border-radius: 12px;
      padding: 20px;
      width: 85%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(230, 199, 73, 0.4);
      transform: scale(0.9);
      transition: transform 0.3s;
    }

    .popup-overlay.active .popup-content { transform: scale(1); }

    .popup-title { font-size: 1.2rem; color: var(--gold-primary); text-align: center; margin-bottom: 15px; font-weight: bold; }
    .popup-body { color: var(--text-dim); font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; text-align: center; }

    .popup-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, transparent, rgba(230,199,73,0.2), transparent);
      border: 1px solid var(--gold-primary);
      color: var(--gold-primary);
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .popup-btn:hover { background: rgba(230,199,73,0.3); box-shadow: 0 0 15px rgba(230,199,73,0.4); }
    
    /* 仙石弹窗特殊样式 - 2*3 小正方形模块 */
    .spirit-stone-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
      padding: 10px;
    }
    
    .spirit-stone-module {
      background: linear-gradient(135deg, rgba(230, 199, 73, 0.15), rgba(230, 199, 73, 0.05));
      border: 1px solid rgba(230, 199, 73, 0.4);
      border-radius: 6px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
    }
    
    .spirit-stone-module:hover {
      background: rgba(230, 199, 73, 0.25);
      border-color: var(--gold-primary);
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.5);
    }
    
    .spirit-stone-icon {
      font-size: 1.8rem;
      filter: drop-shadow(0 0 8px rgba(230, 199, 73, 0.6));
    }
    
    .spirit-stone-name {
      font-size: 0.75rem;
      color: var(--text-main);
      font-weight: bold;
    }
    
    .spirit-stone-value {
      font-size: 0.85rem;
      color: var(--gold-light);
      font-weight: bold;
    }

    .back-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 100;
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--gold-primary);
      color: var(--gold-primary);
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(230, 199, 73, 0.2);
    }

    .game-news {
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 15px;
      backdrop-filter: blur(10px);
      margin-bottom: 10px;
    }
    
    .news-list {
      max-height: 200px;
      overflow-y: auto;
    }
    
    .news-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px;
      background: rgba(30, 35, 55, 0.6);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 6px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .news-item:hover {
      background: rgba(230, 199, 73, 0.1);
      border-color: var(--gold-primary);
    }
    
    .news-title {
      font-size: 0.9rem;
      color: var(--gold-primary);
      font-weight: bold;
    }
    
    .news-content {
      font-size: 0.8rem;
      color: var(--text-dim);
      line-height: 1.4;
    }
    
    .news-time {
      font-size: 0.7rem;
      color: var(--text-dim);
      opacity: 0.7;
      margin-top: 5px;
    }
    
    .statistics-section {
      background: var(--bg-panel);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 15px;
      backdrop-filter: blur(10px);
      margin-bottom: 10px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    
    .stat-item {
      background: rgba(30, 35, 55, 0.6);
      border: 1px solid rgba(230, 199, 73, 0.2);
      border-radius: 6px;
      padding: 10px;
      text-align: center;
      transition: all 0.3s;
    }
    
    .stat-item:hover {
      background: rgba(230, 199, 73, 0.1);
      border-color: var(--gold-primary);
      transform: translateY(-2px);
    }
    
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 5px;
    }
    
    .stat-value {
      font-size: 1.1rem;
      color: var(--gold-light);
      font-weight: bold;
    }
    
    .stat-count {
      font-size: 0.85rem;
      color: var(--gold-primary);
      margin-top: 3px;
    }
    
    @media (max-height: 700px) {
      .asset-items { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .asset-item { padding: 8px; }
      .asset-icon { font-size: 1.5rem; }
      .asset-name { font-size: 0.75rem; }
      .game-news { padding: 10px; }
      .news-item { padding: 8px; }
      .news-title { font-size: 0.8rem; }
      .news-content { font-size: 0.7rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-item { padding: 8px; }
    }
  </style>

  </head>
<body>

  <div class="particles"></div>
  
  <button class="back-btn" onclick="goBack()">← 返回</button>

  <div class="main-container">
    
    <div class="top-status">
      <div class="player-info">
        <div class="player-avatar" id="charAvatar">👤</div>
        <div class="player-details">
          <div class="player-name" id="charName">加载中...</div>
          <div class="player-cultivation" id="charLevel">加载中...</div>
        </div>
      </div>
      <div class="resources-grid" id="resourcesGrid">
        <div class="resource-item"><span class="res-icon">⚡</span><span class="res-label">仙力</span><span class="res-value">---</span></div>
        <div class="resource-item"><span class="res-icon">💎</span><span class="res-label">仙石</span><span class="res-value">---</span></div>
        <div class="resource-item"><span class="res-icon">💰</span><span class="res-label">灵石</span><span class="res-value">---</span></div>
        <div class="resource-item"><span class="res-icon">✨</span><span class="res-label">修为</span><span class="res-value">---</span></div>
        <div class="resource-item"><span class="res-icon">🪨</span><span class="res-label">魂石</span><span class="res-value">---</span></div>
        <div class="resource-item"><span class="res-icon">🌬️</span><span class="res-label">灵气</span><span class="res-value">---</span></div>
      </div>
    </div>

    <div style="background: var(--bg-panel); border: 1px solid rgba(230, 199, 73, 0.3); border-radius: 8px; padding: 10px; backdrop-filter: blur(10px);">
      <input type="text" id="assetSearch" placeholder="输入角色名称搜索资产..." style="width: 100%; padding: 8px 12px; border: 1px solid rgba(230, 199, 73, 0.3); border-radius: 20px; background: rgba(0,0,0,0.3); color: var(--text-main); font-size: 0.9rem;">
    </div>

    <div class="quick-actions">
      <div class="quick-action-btn" onclick="goToCultivation()">
        <div class="quick-action-icon">🧘</div>
        <div class="quick-action-text">修炼</div>
      </div>
      <div class="quick-action-btn" onclick="goToSkills()">
        <div class="quick-action-icon">📜</div>
        <div class="quick-action-text">功法</div>
      </div>
      <div class="quick-action-btn" onclick="goToClan()">
        <div class="quick-action-icon">🏯</div>
        <div class="quick-action-text">宗门</div>
      </div>
      <div class="quick-action-btn" onclick="goToMap()">
        <div class="quick-action-icon">🗺️</div>
        <div class="quick-action-text">云游</div>
      </div>
      <div class="quick-action-btn" onclick="goToCharacter()">
        <div class="quick-action-icon">👤</div>
        <div class="quick-action-text">角色</div>
      </div>
    </div>

    <div class="cultivation-cards">
      <div class="cultivation-card">
        <div class="cultivation-title">境界</div>
        <div class="cultivation-value" id="realmValue">加载中...</div>
        <div class="cultivation-progress" id="realmProgress">进度：0%</div>
      </div>
      <div class="cultivation-card">
        <div class="cultivation-title">灵力</div>
        <div class="cultivation-value" id="spiritValue">加载中...</div>
        <div class="cultivation-progress" id="spiritProgress">进度：0%</div>
      </div>
      <div class="cultivation-card">
        <div class="cultivation-title">修为</div>
        <div class="cultivation-value" id="cultivationValue">加载中...</div>
        <div class="cultivation-progress" id="cultivationProgress">进度：0%</div>
      </div>
    </div>

    <div class="asset-tabs">
      <div class="asset-tab active" data-type="all">全部</div>
      <div class="asset-tab" data-type="丹药">丹药</div>
      <div class="asset-tab" data-type="材料">材料</div>
      <div class="asset-tab" data-type="法宝">法宝</div>
      <div class="asset-tab" data-type="功法">功法</div>
      <div class="asset-tab" data-type="装备">装备</div>
    </div>

    <div class="statistics-section">
      <div class="section-title">境界分布</div>
      <div class="stats-grid" id="realmStats">
        <div style="text-align: center; color: var(--text-dim); padding: 20px; grid-column: 1 / -1;">加载中...</div>
      </div>
    </div>

    <div class="statistics-section">
      <div class="section-title">出生分布</div>
      <div class="stats-grid" id="originStats">
        <div style="text-align: center; color: var(--text-dim); padding: 20px; grid-column: 1 / -1;">加载中...</div>
      </div>
    </div>

    <div class="statistics-section">
      <div class="section-title">灵根分布</div>
      <div class="stats-grid" id="spiritRootStats">
        <div style="text-align: center; color: var(--text-dim); padding: 20px; grid-column: 1 / -1;">加载中...</div>
      </div>
    </div>

    <div class="asset-list" id="assetList">
      <div style="text-align: center; color: var(--text-dim); padding: 50px 0;">
        加载中...
      </div>
    </div>

    <div class="bottom-info">
      <div class="info-item">
        <div class="info-label">在线时间</div>
        <div class="info-value" id="onlineTime">0 小时</div>
      </div>
      <div class="info-item">
        <div class="info-label">今日签到</div>
        <div class="info-value" id="checkinStatus">未签到</div>
      </div>
      <div class="info-item">
        <div class="info-label">任务进度</div>
        <div class="info-value" id="taskProgress">0/10</div>
      </div>
      <div class="info-item">
        <div class="info-label">成就点数</div>
        <div class="info-value" id="achievementPoints">0</div>
      </div>
    </div>
    
    <div class="game-news">
      <div class="section-title">游戏快讯</div>
      <div class="news-list" id="newsList">
        <div style="text-align: center; color: var(--text-dim); padding: 20px 0;">
          加载中...
        </div>
      </div>
    </div>

  </div>

  <div class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <div class="nav-icon">🧘</div>
      <div class="nav-text">修炼</div>
    </a>
    <a href="../skills/skills.html" class="nav-item">
      <div class="nav-icon">📜</div>
      <div class="nav-text">功法</div>
    </a>
    <a href="assets.html" class="nav-item active">
      <div class="nav-icon">🎒</div>
      <div class="nav-text">资产</div>
    </a>
    <a href="javascript:void(0)" onclick="window.pageUtils.navigateToGuildPage()" class="nav-item">
      <div class="nav-icon">🏯</div>
      <div class="nav-text">宗门</div>
    </a>
    <a href="../map/map.html" class="nav-item">
      <div class="nav-icon">🗺️</div>
      <div class="nav-text">云游</div>
    </a>
  </div>

  <div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">
    <div class="popup-content" onclick="event.stopPropagation()">
      <div class="popup-title" id="popupTitle">标题</div>
      <div class="popup-body" id="popupBody">内容</div>
      <button class="popup-btn" onclick="closePopup()">确定</button>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/auth-service.js"></script>
  <script src="../js/common.js"></script>
  <script>
    function formatNumber(num) {
      if (num >= 100000000) {
        return (num / 100000000).toFixed(2) + ' 亿';
      } else if (num >= 10000) {
        return (num / 10000).toFixed(2) + 'w';
      }
      return num ? num.toString() : '0';
    }

    function getAssetIcon(type) {
      const map = {
        '丹药': '💊',
        '材料': '🌿',
        '法宝': '🔮',
        '功法': '📜',
        '装备': '🛡️'
      };
      return map[type] || '📦';
    }

    let gameState = {
      profile: null,
      searchKeyword: ''
    };
    
    // 显示默认内容（未登录状态）
    function showDefaultContent() {
      const container = document.querySelector('.assets-container');
      if (container) {
        container.innerHTML = `
          <div style="text-align: center; padding: 50px; color: #aaa;">
            <div style="font-size: 60px; margin-bottom: 20px;">🔐</div>
            <div style="font-size: 18px; margin-bottom: 10px;">请先登录</div>
            <div style="font-size: 14px;">登录后可以查看您的资产</div>
          </div>
        `;
      }
    }

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        // 使用全局配置中的角色 ID
        const userId = window.APP_CONFIG.currentUserId || localStorage.getItem('userId');
        let currentRoleId = window.APP_CONFIG.currentRoleId || localStorage.getItem('currentRoleId') || localStorage.getItem('roleId');
        
        console.log('=== assets.html 初始化 ===');
        console.log('userId:', userId);
        console.log('currentRoleId:', currentRoleId);
        
        if (!userId) {
          console.log('未登录，显示默认内容');
          // 不强制跳转，显示默认内容
          showDefaultContent();
          return;
        }
        
        // 如果没有角色 ID，引导用户去选择角色
        if (!currentRoleId) {
          console.log('未选择角色，显示默认内容');
          // 不强制跳转，显示默认内容
          showDefaultContent();
          return;
        }

        const roleId = parseInt(currentRoleId);
        console.log('开始加载角色数据，roleId:', roleId);
        
        // 显示加载状态
        uiUtils.showLoading('charName', '正在加载...');
        uiUtils.showLoading('charLevel', '...');
        uiUtils.showLoading('assetList', '正在加载资产数据...');
        uiUtils.showLoading('newsList', '正在加载新闻...');
        uiUtils.showLoading('realmStats', '正在加载统计数据...');
        uiUtils.showLoading('originStats', '正在加载统计数据...');
        uiUtils.showLoading('spiritRootStats', '正在加载统计数据...');
        
        // 并行加载所有数据，添加错误处理
        const [profile, assets, news, statistics] = await Promise.all([
          apiService.getUserProfile(roleId).catch(err => {
            console.error('获取用户资料失败:', err);
            return null;
          }),
          apiService.getAssets(roleId).catch(err => {
            console.error('获取资产数据失败:', err);
            return [];
          }),
          apiService.getNews().catch(err => {
            console.error('获取新闻数据失败:', err);
            return [];
          }),
          apiService.getStatistics().catch(err => {
            console.error('获取统计数据失败:', err);
            return {};
          })
        ]);
        
        console.log('获取到的 profile 数据:', profile);
        console.log('获取到的 assets 数据:', assets);
        console.log('获取到的 news 数据:', news);
        console.log('获取到的 statistics 数据:', statistics);
        
        // 检查是否是错误响应
        if (profile && profile.code && profile.code !== 200) {
          throw new Error(profile.message || '获取角色数据失败');
        }
        
        gameState.profile = profile || {};
        gameState.assets = Array.isArray(assets) ? assets : (assets.data || assets.list || []);
        gameState.news = Array.isArray(news) ? news : (news.data || news.list || []);
        gameState.statistics = statistics.data || statistics || {};

        renderUI();
        console.log('=== assets.html 初始化完成 ===');

      } catch (error) {
        console.error('初始化失败:', error);
        const errorMsg = error.message || '数据加载失败';
        const errorContainer = document.getElementById('assetList');
        if (errorContainer) {
          errorContainer.innerHTML = `<div style="text-align: center; color: var(--danger); padding: 50px 0;">${errorMsg}</div>`;
        }
        uiUtils.showToast(errorMsg, 'error');
      }
    });

    function renderUI() {
      const { profile, assets, news, statistics } = gameState;
      console.log('开始渲染 UI, 数据:', { profile, assets, news, statistics });
      
      const role = profile.role || profile;
      const resources = profile.resources || [];
      const status = profile.status || {};

      console.log('解构后的数据:');
      console.log('  role:', role);
      console.log('  resources:', resources);
      console.log('  assets:', assets);
      console.log('  news:', news);
      console.log('  statistics:', statistics);

      if (role) {
        document.getElementById('charName').textContent = role.name || '未知';
        document.getElementById('charLevel').textContent = role.realm || '未知';
        const charAvatar = document.getElementById('charAvatar');
        charAvatar.textContent = role.avatar || '👤';
        charAvatar.onclick = function() {
          window.location.href = '../character/character.html';
        };
      } else {
        document.getElementById('charName').textContent = '无数据';
        document.getElementById('charLevel').textContent = '无数据';
      }

      const resGrid = document.getElementById('resourcesGrid');
      if (resGrid && resources.length > 0) {
        resGrid.innerHTML = resources.map(res => `
          <div class="resource-item">
            <span class="res-icon">${res.icon || '✨'}</span>
            <span class="res-label">${res.name || '未知'}</span>
            <span class="res-value">${formatNumber(res.value || 0)}</span>
          </div>
        `).join('');
      } else if (resGrid) {
        resGrid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: var(--text-dim); padding: 10px;">暂无资源数据</div>';
      }

      document.getElementById('realmValue').textContent = role.realm || '未知';
      document.getElementById('realmProgress').textContent = '进度：0%';
      
      const spiritResource = resources.find(res => res.name === '灵气');
      document.getElementById('spiritValue').textContent = spiritResource ? formatNumber(spiritResource.value) : '0';
      document.getElementById('spiritProgress').textContent = '进度：0%';
      
      const cultivationResource = resources.find(res => res.name === '修为');
      document.getElementById('cultivationValue').textContent = cultivationResource ? formatNumber(cultivationResource.value) : '0';
      document.getElementById('cultivationProgress').textContent = '进度：0%';

      document.getElementById('onlineTime').textContent = `${status.onlineTime || 0}小时`;
      document.getElementById('checkinStatus').textContent = status.checkinStatus ? '已签到' : '未签到';
      document.getElementById('taskProgress').textContent = `${status.taskProgress || 0}/${status.taskTotal || 0}`;
      document.getElementById('achievementPoints').textContent = status.achievementPoints || 0;

      renderAssets('all');
      renderNews();
      renderStatistics();
      
      console.log('UI 渲染完成');
    }
    
    function renderStatistics() {
      const { statistics, profile } = gameState;
      
      // 使用 API 返回的统计数据，如果没有则使用本地计算的
      const realmCount = statistics.realmDistribution || {};
      const originCount = statistics.originDistribution || {};
      const spiritRootCount = statistics.spiritRootDistribution || {};
      
      // 如果 API 没有返回统计数据，使用本地计算
      if (Object.keys(realmCount).length === 0) {
        const allCharacters = profile.allCharacters || [];
        allCharacters.forEach(char => {
          const realm = char.realm || '未知';
          const origin = char.origin || '未知';
          const spiritRoot = char.spiritRoot || '未知';
          
          realmCount[realm] = (realmCount[realm] || 0) + 1;
          originCount[origin] = (originCount[origin] || 0) + 1;
          spiritRootCount[spiritRoot] = (spiritRootCount[spiritRoot] || 0) + 1;
        });
      }
      
      renderStatGrid('realmStats', realmCount, '境界');
      renderStatGrid('originStats', originCount, '出生');
      renderStatGrid('spiritRootStats', spiritRootCount, '灵根');
    }
    
    function renderStatGrid(elementId, data, labelPrefix) {
      const container = document.getElementById(elementId);
      if (!container) return;
      
      const entries = Object.entries(data);
      if (entries.length === 0) {
        container.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 20px; grid-column: 1 / -1;">暂无数据</div>';
        return;
      }
      
      container.innerHTML = entries.map(([key, count]) => `
        <div class="stat-item">
          <div class="stat-label">${key}</div>
          <div class="stat-value">${count}</div>
          <div class="stat-count">${labelPrefix}分布</div>
        </div>
      `).join('');
    }
    
    function scrollToTop() {
      const mainContainer = document.querySelector('.main-container');
      if (mainContainer) {
        mainContainer.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }
    
    function renderNews() {
      const newsList = document.getElementById('newsList');
      const news = gameState.news || [];
      
      if (news.length === 0) {
        newsList.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 20px 0;">暂无新闻</div>';
        return;
      }
      
      newsList.innerHTML = news.map(item => {
        const date = item.createTime ? new Date(item.createTime) : new Date();
        const formattedDate = `${date.getMonth() + 1}月${date.getDate()}日 ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
        return `
          <div class="news-item">
            <div class="news-title">${item.title || '无标题'}</div>
            <div class="news-content">${item.content || item.description || '无内容'}</div>
            <div class="news-time">${formattedDate}</div>
          </div>
        `;
      }).join('');
    }

    function renderAssets(type) {
      const { assets, searchKeyword } = gameState;
      const assetList = document.getElementById('assetList');
      
      let filteredAssets = type === 'all' ? assets : assets.filter(asset => asset.type === type);
      
      if (searchKeyword) {
        const keyword = searchKeyword.toLowerCase();
        filteredAssets = filteredAssets.filter(asset => 
          asset.name && asset.name.toLowerCase().includes(keyword)
        );
      }
      
      if (filteredAssets.length === 0) {
        assetList.innerHTML = `
          <div style="text-align: center; color: var(--text-dim); padding: 50px 0;">
            ${searchKeyword ? `未找到包含"${searchKeyword}"的资产` : `暂无${type === 'all' ? '' : type}资产`}
          </div>
        `;
        return;
      }
      
      const assetsByType = {};
      filteredAssets.forEach(asset => {
        const assetType = asset.type || '其他';
        if (!assetsByType[assetType]) {
          assetsByType[assetType] = [];
        }
        assetsByType[assetType].push(asset);
      });
      
      let html = '';
      Object.keys(assetsByType).forEach(assetType => {
        html += `
          <div class="asset-section">
            <div class="section-title">${assetType}</div>
            <div class="asset-items">
              ${assetsByType[assetType].map(asset => `
                <div class="asset-item" onclick="showAssetDetail(${asset.id})">
                  <div class="asset-icon">${getAssetIcon(asset.type)}</div>
                  <div class="asset-name">${asset.name || '未知'}</div>
                  <div class="asset-quantity">${asset.quantity || 0}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });
      
      assetList.innerHTML = html;
    }

    function showAssetDetail(assetId) {
      const asset = gameState.assets?.find(a => a.id === assetId);
      if (asset) {
        // 如果是仙石/灵石类型，使用 2*3 网格布局
        if (asset.type === '灵石' || asset.type === '仙石' || asset.name?.includes('灵石') || asset.name?.includes('仙石')) {
          showSpiritStonePopup(asset);
        } else {
          showPopup(
            asset.name || '未知资产',
            `类型：${asset.type || '未知'}<br>
             数量：${asset.quantity || 0}<br>
             描述：${asset.description || '无'}`
          );
        }
      }
    }
    
    // 显示仙石弹窗（2*3 网格布局）
    function showSpiritStonePopup(asset) {
      const overlay = document.getElementById('popupOverlay');
      const title = document.getElementById('popupTitle');
      const body = document.getElementById('popupBody');
      
      title.textContent = asset.name || '仙石';
      
      // 生成 6 个模块（2*3 布局）
      const modules = [
        { icon: '💎', name: '下品灵石', value: Math.floor((asset.quantity || 0) / 1000000) },
        { icon: '💠', name: '中品灵石', value: Math.floor((asset.quantity || 0) / 10000) % 100 },
        { icon: '🔮', name: '上品灵石', value: Math.floor((asset.quantity || 0) / 100) % 100 },
        { icon: '✨', name: '极品灵石', value: (asset.quantity || 0) % 100 },
        { icon: '🌟', name: '仙石', value: Math.floor((asset.quantity || 0) / 100000000) },
        { icon: '⭐', name: '神石', value: Math.floor((asset.quantity || 0) / 10000000000) }
      ];
      
      body.innerHTML = `
        <div class="spirit-stone-grid">
          ${modules.map(module => `
            <div class="spirit-stone-module">
              <div class="spirit-stone-icon">${module.icon}</div>
              <div class="spirit-stone-name">${module.name}</div>
              <div class="spirit-stone-value">${formatNumber(module.value)}</div>
            </div>
          `).join('')}
        </div>
      `;
      
      overlay.classList.add('active');
    }

    document.querySelectorAll('.asset-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.asset-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const type = this.dataset.type;
        renderAssets(type);
      });
    });

    document.getElementById('assetSearch').addEventListener('input', function() {
      gameState.searchKeyword = this.value.trim();
      const activeTab = document.querySelector('.asset-tab.active');
      const type = activeTab ? activeTab.dataset.type : 'all';
      renderAssets(type);
    });

    function showPopup(title, content) {
      document.getElementById('popupTitle').textContent = title;
      document.getElementById('popupBody').innerHTML = content.replace(/\n/g, '<br>');
      document.getElementById('popupOverlay').classList.add('active');
    }

    function closePopup(e) {
      if (!e || e.target === document.getElementById('popupOverlay')) {
        document.getElementById('popupOverlay').classList.remove('active');
      }
    }

    function goToCultivation() { window.location.href = '../index.html'; }
    function goToSkills() { window.location.href = '../skills/skills.html'; }
    function goToClan() { if (window.pageUtils && window.pageUtils.navigateToGuildPage) { window.pageUtils.navigateToGuildPage(); } else { window.location.href = '../clan/clan-list.html'; } }
    function goToMap() { window.location.href = '../map/map.html'; }
    function goToCharacter() { window.location.href = '../character/character.html'; }
    function goBack() { window.location.href = '../index.html'; }
  </script>
</body>
