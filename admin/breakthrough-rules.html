<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>突破规则配置 - 灵月仙途后台管理</title>
  <link rel="stylesheet" href="../css/admin-common.css">
  <style>
    .content-area {
      padding: 30px;
      background: rgba(26, 18, 10, 0.95);
      border-radius: 8px;
      margin: 20px;
    }
    
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--primary-gold);
    }
    
    .page-title {
      font-size: 24px;
      color: var(--primary-gold);
      margin: 0;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary-gold), var(--secondary-gold));
      color: #1a120a;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(241, 196, 15, 0.3);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }
    
    .btn-danger {
      background: rgba(231, 76, 60, 0.8);
      color: #fff;
    }
    
    .rule-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    
    .rule-table th,
    .rule-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(241, 196, 15, 0.2);
    }
    
    .rule-table th {
      background: rgba(241, 196, 15, 0.1);
      color: var(--primary-gold);
      font-weight: 600;
    }
    
    .rule-table tr:hover {
      background: rgba(241, 196, 15, 0.05);
    }
    
    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      display: inline-block;
    }
    
    .status-enabled {
      background: rgba(46, 204, 113, 0.2);
      color: #2ecc71;
    }
    
    .status-disabled {
      background: rgba(149, 165, 166, 0.2);
      color: #95a5a6;
    }
    
    .penalty-type {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(231, 76, 60, 0.2);
      color: #e74c3c;
    }
    
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
    }
    
    .modal.show {
      display: flex;
    }
    
    .modal-content {
      background: linear-gradient(135deg, #1a120a, #2c1e12);
      border: 2px solid var(--primary-gold);
      border-radius: 8px;
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-header {
      padding: 20px;
      border-bottom: 2px solid var(--primary-gold);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-header h3 {
      margin: 0;
      color: var(--primary-gold);
    }
    
    .close {
      font-size: 28px;
      font-weight: bold;
      color: var(--primary-gold);
      cursor: pointer;
    }
    
    .close:hover {
      color: #fff;
    }
    
    .modal-body {
      padding: 20px;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: var(--primary-gold);
      font-size: 14px;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(241, 196, 15, 0.3);
      border-radius: 4px;
      color: #fff;
      font-size: 14px;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary-gold);
    }
    
    .form-group .help-text {
      font-size: 12px;
      color: #95a5a6;
      margin-top: 5px;
    }
    
    .modal-footer {
      padding: 20px;
      border-top: 2px solid rgba(241, 196, 15, 0.3);
      text-align: right;
    }
    
    .statistics-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: rgba(241, 196, 15, 0.1);
      border: 1px solid rgba(241, 196, 15, 0.3);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: var(--primary-gold);
      margin-bottom: 5px;
    }
    
    .stat-label {
      font-size: 14px;
      color: #95a5a6;
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>🎮 灵月仙途</h2>
        <p>游戏后台管理系统</p>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html">📊 控制台</a>
        <a href="#" class="dropdown-toggle" onclick="toggleDropdown(event)">⚙️ 系统管理</a>
        <ul class="dropdown-menu">
          <li><a href="index.html#sysUserSection">用户管理</a></li>
          <li><a href="index.html#sysRoleSection">角色管理</a></li>
          <li><a href="index.html#permissionSection">权限管理</a></li>
        </ul>
        <a href="#" class="dropdown-toggle" onclick="toggleDropdown(event)">🎯 游戏管理</a>
        <ul class="dropdown-menu">
          <li><a href="index.html#gamePlayerSection">玩家管理</a></li>
          <li><a href="index.html#assetSection">资产管理</a></li>
          <li><a href="index.html#skillSection">技能管理</a></li>
          <li><a href="index.html#mapSection">地图管理</a></li>
          <li><a href="breakthrough-rules.html" class="active">突破规则配置</a></li>
        </ul>
        <a href="index.html#logSection">📜 日志管理</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <h1>突破规则配置</h1>
        <div class="user-info">
          <span>管理员</span>
          <button class="btn btn-secondary" onclick="location.href='login.html'">退出</button>
        </div>
      </header>

      <div class="content-area">
        <div class="page-header">
          <h2 class="page-title">⚔️ 境界突破规则配置</h2>
          <button class="btn btn-primary" onclick="openAddRuleModal()">➕ 新增规则</button>
        </div>

        <!-- 统计卡片 -->
        <div class="statistics-cards">
          <div class="stat-card">
            <div class="stat-value" id="totalRules">0</div>
            <div class="stat-label">总规则数</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="enabledRules">0</div>
            <div class="stat-label">启用中</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="totalAttempts">0</div>
            <div class="stat-label">突破总次数</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="successRate">0%</div>
            <div class="stat-label">平均成功率</div>
          </div>
        </div>

        <!-- 规则表格 -->
        <table class="rule-table">
          <thead>
            <tr>
              <th>排序</th>
              <th>原境界</th>
              <th>目标境界</th>
              <th>基础成功率</th>
              <th>所需修为</th>
              <th>失败惩罚</th>
              <th>保底次数</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="ruleTableBody">
            <!-- 动态加载 -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- 新增/编辑规则模态框 -->
  <div id="ruleModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">新增突破规则</h3>
        <span class="close" onclick="closeModal()">&times;</span>
      </div>
      <div class="modal-body">
        <form id="ruleForm">
          <input type="hidden" id="ruleId">
          <div class="form-grid">
            <div class="form-group">
              <label>原境界 *</label>
              <select id="fromRealm" required>
                <option value="">请选择</option>
                <option value="无修为">无修为</option>
                <option value="炼体期">炼体期</option>
                <option value="炼气期">炼气期</option>
                <option value="筑基期">筑基期</option>
                <option value="金丹期">金丹期</option>
                <option value="元婴期">元婴期</option>
                <option value="化神期">化神期</option>
                <option value="炼虚期">炼虚期</option>
                <option value="合体期">合体期</option>
                <option value="大乘期">大乘期</option>
              </select>
            </div>
            <div class="form-group">
              <label>目标境界 *</label>
              <select id="toRealm" required>
                <option value="">请选择</option>
                <option value="炼体期">炼体期</option>
                <option value="炼气期">炼气期</option>
                <option value="筑基期">筑基期</option>
                <option value="金丹期">金丹期</option>
                <option value="元婴期">元婴期</option>
                <option value="化神期">化神期</option>
                <option value="炼虚期">炼虚期</option>
                <option value="合体期">合体期</option>
                <option value="大乘期">大乘期</option>
                <option value="渡劫期">渡劫期</option>
              </select>
            </div>
            <div class="form-group">
              <label>基础成功率 (%) *</label>
              <input type="number" id="baseSuccessRate" min="0" max="100" step="0.01" required>
              <div class="help-text">建议值：30-95%</div>
            </div>
            <div class="form-group">
              <label>所需修为 *</label>
              <input type="number" id="requiredXiuwei" min="0" required>
              <div class="help-text">突破需要消耗的修为值</div>
            </div>
            <div class="form-group">
              <label>失败惩罚类型</label>
              <select id="failurePenaltyType">
                <option value="NONE">无惩罚</option>
                <option value="LOSS">损失修为</option>
                <option value="DROP">境界跌落</option>
                <option value="WALK_FIRE">走火入魔</option>
              </select>
            </div>
            <div class="form-group">
              <label>失败惩罚值</label>
              <input type="number" id="failurePenaltyValue" min="0" value="0">
              <div class="help-text">损失修为百分比或跌落层数</div>
            </div>
            <div class="form-group">
              <label>走火入魔持续时间 (分钟)</label>
              <input type="number" id="walkFireDuration" min="0" value="0">
              <div class="help-text">失败后无法修炼的时间</div>
            </div>
            <div class="form-group">
              <label>最低保底成功率 (%)</label>
              <input type="number" id="minSuccessRate" min="0" max="100" step="0.01" value="10">
              <div class="help-text">即使属性再低也不会低于此值</div>
            </div>
            <div class="form-group">
              <label>保底次数</label>
              <input type="number" id="pityCount" min="0" value="0">
              <div class="help-text">连续失败多少次后必成功</div>
            </div>
            <div class="form-group">
              <label>排序</label>
              <input type="number" id="sortOrder" min="0" value="0">
            </div>
            <div class="form-group">
              <label>状态</label>
              <select id="isEnabled">
                <option value="1">启用</option>
                <option value="0">禁用</option>
              </select>
            </div>
            <div class="form-group">
              <label>备注</label>
              <textarea id="remark" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveRule()">保存</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    const API_BASE_URL = 'http://localhost:8088/api';
    let rulesData = [];

    // 切换下拉菜单
    function toggleDropdown(event) {
      event.preventDefault();
      const dropdownMenu = event.target.nextElementSibling;
      if (dropdownMenu && dropdownMenu.classList.contains('dropdown-menu')) {
        dropdownMenu.classList.toggle('show');
      }
    }

    // 加载规则列表
    function loadRules() {
      fetch(`${API_BASE_URL}/breakthrough/admin/rules`)
        .then(response => response.json())
        .then(data => {
          if (data.code === 200 && data.data) {
            rulesData = data.data;
            renderRuleTable(rulesData);
            updateStatistics(rulesData);
          }
        })
        .catch(error => {
          console.error('加载规则失败:', error);
          showMessage('加载规则失败，请检查后端服务', 'error');
        });
    }

    // 渲染规则表格
    function renderRuleTable(rules) {
      const tbody = document.getElementById('ruleTableBody');
      tbody.innerHTML = '';

      if (rules.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding: 40px; color: #95a5a6;">暂无规则数据</td></tr>';
        return;
      }

      rules.forEach(rule => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${rule.sortOrder || 0}</td>
          <td>${rule.fromRealm}</td>
          <td>${rule.toRealm}</td>
          <td>${rule.baseSuccessRate}%</td>
          <td>${rule.requiredXiuwei.toLocaleString()}</td>
          <td><span class="penalty-type">${getPenaltyTypeName(rule.failurePenaltyType)}</span></td>
          <td>${rule.pityCount || 0}</td>
          <td><span class="status-badge ${rule.isEnabled === 1 ? 'status-enabled' : 'status-disabled'}">
            ${rule.isEnabled === 1 ? '启用' : '禁用'}
          </span></td>
          <td>
            <button class="btn btn-primary" onclick="editRule(${rule.id})" style="padding: 5px 10px; font-size: 12px;">编辑</button>
            <button class="btn btn-danger" onclick="deleteRule(${rule.id})" style="padding: 5px 10px; font-size: 12px;">删除</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // 获取惩罚类型名称
    function getPenaltyTypeName(type) {
      const names = {
        'NONE': '无',
        'LOSS': '损失修为',
        'DROP': '境界跌落',
        'WALK_FIRE': '走火入魔'
      };
      return names[type] || type;
    }

    // 更新统计数据
    function updateStatistics(rules) {
      const enabledCount = rules.filter(r => r.isEnabled === 1).length;
      document.getElementById('totalRules').textContent = rules.length;
      document.getElementById('enabledRules').textContent = enabledCount;
      document.getElementById('totalAttempts').textContent = '0'; // 需要从后端获取
      document.getElementById('successRate').textContent = '0%'; // 需要从后端获取
    }

    // 打开新增模态框
    function openAddRuleModal() {
      document.getElementById('modalTitle').textContent = '新增突破规则';
      document.getElementById('ruleForm').reset();
      document.getElementById('ruleId').value = '';
      document.getElementById('ruleModal').classList.add('show');
    }

    // 编辑规则
    function editRule(id) {
      const rule = rulesData.find(r => r.id === id);
      if (!rule) return;

      document.getElementById('modalTitle').textContent = '编辑突破规则';
      document.getElementById('ruleId').value = rule.id;
      document.getElementById('fromRealm').value = rule.fromRealm;
      document.getElementById('toRealm').value = rule.toRealm;
      document.getElementById('baseSuccessRate').value = rule.baseSuccessRate;
      document.getElementById('requiredXiuwei').value = rule.requiredXiuwei;
      document.getElementById('failurePenaltyType').value = rule.failurePenaltyType;
      document.getElementById('failurePenaltyValue').value = rule.failurePenaltyValue || 0;
      document.getElementById('walkFireDuration').value = rule.walkFireDuration || 0;
      document.getElementById('minSuccessRate').value = rule.minSuccessRate;
      document.getElementById('pityCount').value = rule.pityCount || 0;
      document.getElementById('sortOrder').value = rule.sortOrder || 0;
      document.getElementById('isEnabled').value = rule.isEnabled;
      document.getElementById('remark').value = rule.remark || '';
      
      document.getElementById('ruleModal').classList.add('show');
    }

    // 保存规则
    function saveRule() {
      const ruleId = document.getElementById('ruleId').value;
      const rule = {
        fromRealm: document.getElementById('fromRealm').value,
        toRealm: document.getElementById('toRealm').value,
        baseSuccessRate: parseFloat(document.getElementById('baseSuccessRate').value),
        requiredXiuwei: parseInt(document.getElementById('requiredXiuwei').value),
        failurePenaltyType: document.getElementById('failurePenaltyType').value,
        failurePenaltyValue: parseInt(document.getElementById('failurePenaltyValue').value),
        walkFireDuration: parseInt(document.getElementById('walkFireDuration').value),
        minSuccessRate: parseFloat(document.getElementById('minSuccessRate').value),
        pityCount: parseInt(document.getElementById('pityCount').value),
        sortOrder: parseInt(document.getElementById('sortOrder').value),
        isEnabled: parseInt(document.getElementById('isEnabled').value),
        remark: document.getElementById('remark').value
      };

      const url = ruleId ? `${API_BASE_URL}/breakthrough/admin/rule/${ruleId}` : `${API_BASE_URL}/breakthrough/admin/rule`;
      const method = ruleId ? 'PUT' : 'POST';

      fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(rule)
      })
      .then(response => response.json())
      .then(data => {
        if (data.code === 200) {
          showMessage('保存成功', 'success');
          closeModal();
          loadRules();
        } else {
          showMessage(data.msg || '保存失败', 'error');
        }
      })
      .catch(error => {
        console.error('保存失败:', error);
        showMessage('保存失败，请重试', 'error');
      });
    }

    // 删除规则
    function deleteRule(id) {
      if (!confirm('确定删除该突破规则吗？此操作不可恢复！')) return;

      fetch(`${API_BASE_URL}/breakthrough/admin/rule/${id}`, {
        method: 'DELETE'
      })
      .then(response => response.json())
      .then(data => {
        if (data.code === 200) {
          showMessage('删除成功', 'success');
          loadRules();
        } else {
          showMessage(data.msg || '删除失败', 'error');
        }
      })
      .catch(error => {
        console.error('删除失败:', error);
        showMessage('删除失败，请重试', 'error');
      });
    }

    // 关闭模态框
    function closeModal() {
      document.getElementById('ruleModal').classList.remove('show');
    }

    // 显示消息
    function showMessage(message, type = 'info') {
      const colors = {
        'success': '#2ecc71',
        'error': '#e74c3c',
        'info': '#3498db'
      };
      
      const msgDiv = document.createElement('div');
      msgDiv.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 25px;
        background: ${colors[type]};
        color: white;
        border-radius: 4px;
        z-index: 9999;
        animation: slideIn 0.3s ease;
      `;
      msgDiv.textContent = message;
      document.body.appendChild(msgDiv);
      
      setTimeout(() => {
        msgDiv.remove();
      }, 3000);
    }

    // 页面加载时初始化
    window.onload = function() {
      loadRules();
    };
  </script>
</body>
</html>
