<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>灵月仙途 - 后台管理</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="admin-header">
    <h1 class="admin-title">灵月仙途 - 后台管理系统</h1>
  </header>
  
  <div class="container">
    <!-- 侧边栏导航 -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>功能菜单</h2>
        <button class="collapse-btn" onclick="toggleSidebar()">
          <span class="collapse-icon">≡</span>
        </button>
      </div>
      <div class="menu-search">
        <input type="text" id="menuSearch" placeholder="搜索菜单..." onkeyup="searchMenu()">
      </div>
      <ul id="menuList">
        <li><a href="#dashboard" class="nav-link" data-module="dashboard">数据统计</a></li>
        <li><a href="#users" class="nav-link" data-module="users">玩家管理</a></li>
        <li><a href="#realmBreak" class="nav-link" data-module="realmBreak">境界突破</a></li>
        <!-- 资产管理下拉菜单 -->
        <li class="dropdown">
          <a href="#" onclick="toggleDropdown('assetDropdown')">资产管理 ▾</a>
          <ul id="assetDropdown" class="dropdown-menu">
            <li><a href="#assetTypeConfig" class="nav-link" data-module="assetTypeConfig" onclick="event.stopPropagation()">资产类型配置</a></li>
            <li><a href="#assetTypes" class="nav-link" data-module="assetTypes" onclick="event.stopPropagation()">资产管理</a></li>
            <li><a href="#roleAssets" class="nav-link" data-module="roleAssets" onclick="event.stopPropagation()">角色资产</a></li>
          </ul>
        </li>
        <li><a href="#sysUsers" class="nav-link" data-module="sysUsers">系统用户</a></li>
        <li><a href="#sysRoles" class="nav-link" data-module="sysRoles">系统角色</a></li>
        <li><a href="#clanManagement" class="nav-link" data-module="clanManagement">宗门管理</a></li>
        <li><a href="#sysMenus" class="nav-link" data-module="sysMenus">公共菜单</a></li>
        <li><a href="#permissions" class="nav-link" data-module="permissions">权限管理</a></li>
        <li class="dropdown">
          <a href="#" onclick="toggleDropdown('skillDropdown'); return false;">技能管理 ▾</a>
          <ul class="dropdown-menu" id="skillDropdown">
            <li><a href="#skills" class="nav-link" data-module="skills" onclick="event.stopPropagation()">技能列表</a></li>
            <li><a href="#roleSkills" class="nav-link" data-module="roleSkills" onclick="event.stopPropagation()">角色技能</a></li>
          </ul>
        </li>
        <li class="dropdown">
          <a href="#" onclick="toggleDropdown('mapDropdown'); return false;">地图管理 ▾</a>
          <ul class="dropdown-menu" id="mapDropdown">
            <li><a href="#maps" class="nav-link" data-module="maps" onclick="event.stopPropagation()">地图列表</a></li>
          </ul>
        </li>
        <li><a href="#leaderboard" class="nav-link" data-module="leaderboard">排行榜</a></li>
        <li><a href="#background" class="nav-link" data-module="background">背景设置</a></li>
        <li><a href="#settings" class="nav-link" data-module="settings">参数配置</a></li>
        <li><a href="#mail" class="nav-link" data-module="mail">邮件管理</a></li>
        <li><a href="#activities" class="nav-link" data-module="activities">活动管理</a></li>
        <li><a href="#achievements" class="nav-link" data-module="achievements">成就管理</a></li>
        <li><a href="#tasks" class="nav-link" data-module="tasks">任务管理</a></li>
        <li><a href="#checkin" class="nav-link" data-module="checkin">签到管理</a></li>
        <li><a href="#chat" class="nav-link" data-module="chat">聊天管理</a></li>
        <li><a href="#logs" class="nav-link" data-module="logs">系统日志</a></li>
      </ul>
    </div>
    
    <!-- 主内容区 -->
    <div class="main-content">
      <div class="header-bar">
        <h1 id="page-title">数据统计</h1>
        <div class="search-add">
          <input type="text" id="globalSearch" class="search-input" placeholder="搜索..." onkeyup="searchData()">
          <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
      </div>
      
      <!-- 内容区域 -->
      <div id="content-area">
        <!-- 模块内容将通过JS动态加载 -->
      </div>
    </div>
  </div>

  <!-- 模态框容器 -->
  <div id="modal-container">
    <!-- 模态框将通过JS动态加载 -->
  </div>

  <script src="js/admin-api.js"></script>
  <script src="js/confirm-dialog.js"></script>
  <script>
    // 登录验证检查
    (function() {
      if (!window.AdminAPI || !window.AdminAPI.isAuthenticated()) {
        window.location.href = 'login.html';
      }
    })();
  </script>
  <script src="../js/api-service.js"></script>
  <script src="js/routes.js?v=1.2"></script>
  <script>
    // 侧边栏折叠功能
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const collapseIcon = document.querySelector('.collapse-icon');
      sidebar.classList.toggle('collapsed');
      
      if (sidebar.classList.contains('collapsed')) {
        collapseIcon.textContent = '≡';
      } else {
        collapseIcon.textContent = '≡';
      }
    }
    
    // 菜单搜索功能
    function searchMenu() {
      const searchTerm = document.getElementById('menuSearch').value.toLowerCase();
      const menuItems = document.querySelectorAll('#menuList li');
      
      menuItems.forEach(item => {
        const text = item.textContent.toLowerCase();
        if (text.includes(searchTerm)) {
          item.style.display = 'block';
        } else {
          item.style.display = 'none';
        }
      });
    }
    
    // 常用菜单置顶功能
    function initMenuUsage() {
      // 从本地存储获取菜单使用次数
      let menuUsage = JSON.parse(localStorage.getItem('menuUsage') || '{}');
      
      // 为每个菜单项添加点击事件，记录使用次数
      document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', function() {
          const module = this.getAttribute('data-module');
          if (module) {
            menuUsage[module] = (menuUsage[module] || 0) + 1;
            localStorage.setItem('menuUsage', JSON.stringify(menuUsage));
            sortMenuByUsage();
          }
        });
      });
      
      // 初始化时按使用次数排序菜单
      sortMenuByUsage();
    }
    
    function sortMenuByUsage() {
      const menuUsage = JSON.parse(localStorage.getItem('menuUsage') || '{}');
      const menuList = document.getElementById('menuList');
      const menuItems = Array.from(menuList.children);
      
      // 排序菜单项目
      menuItems.sort((a, b) => {
        const aLink = a.querySelector('.nav-link');
        const bLink = b.querySelector('.nav-link');
        
        if (!aLink || !bLink) return 0;
        
        const aModule = aLink.getAttribute('data-module');
        const bModule = bLink.getAttribute('data-module');
        
        const aCount = menuUsage[aModule] || 0;
        const bCount = menuUsage[bModule] || 0;
        
        return bCount - aCount;
      });
      
      // 重新添加排序后的菜单项
      menuItems.forEach(item => {
        menuList.appendChild(item);
      });
    }
    
    // 点击波纹效果
    function addRippleEffect() {
      document.querySelectorAll('button, .nav-link').forEach(element => {
        element.addEventListener('click', function(e) {
          const ripple = document.createElement('span');
          const rect = this.getBoundingClientRect();
          const size = Math.max(rect.width, rect.height);
          const x = e.clientX - rect.left - size / 2;
          const y = e.clientY - rect.top - size / 2;
          
          ripple.style.width = ripple.style.height = size + 'px';
          ripple.style.left = x + 'px';
          ripple.style.top = y + 'px';
          ripple.classList.add('ripple');
          
          this.appendChild(ripple);
          
          setTimeout(() => {
            ripple.remove();
          }, 600);
        });
      });
    }
    
    // 初始化所有功能
    window.addEventListener('DOMContentLoaded', function() {
      initMenuUsage();
      addRippleEffect();
    });
  </script>
</body>
</html>
