<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背包管理</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="module-content">
        <h2>背包管理</h2>
        <div class="module-description">
            管理玩家的背包物品
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchKeyword" placeholder="搜索玩家...">
            <button onclick="searchPlayers()">搜索</button>
        </div>
        
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>玩家ID</th>
                        <th>玩家名称</th>
                        <th>物品数量</th>
                        <th>背包容量</th>
                        <th>上次更新时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody">
                    <!-- 数据将通过JS动态加载 -->
                </tbody>
            </table>
        </div>
        
        <div class="pagination" id="pagination">
            <!-- 分页将通过JS动态生成 -->
        </div>
    </div>
    
    <script>
        function initInventory() {
            console.log('初始化背包管理模块');
            loadInventoryData();
        }
        
        function loadInventoryData(page = 1) {
            const tableBody = document.getElementById('inventoryTableBody');
            tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 20px;">加载中...</td></tr>';
            
            // 模拟数据加载
            setTimeout(() => {
                tableBody.innerHTML = '';
                for (let i = 1; i <= 10; i++) {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${(page - 1) * 10 + i}</td>
                        <td>100${i}</td>
                        <td>玩家${i}</td>
                        <td>${Math.floor(Math.random() * 50) + 1}</td>
                        <td>100</td>
                        <td>2024-01-${i.toString().padStart(2, '0')} 10:00:00</td>
                        <td>
                            <button onclick="viewInventory(${i})">查看</button>
                            <button onclick="clearInventory(${i})">清空</button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                }
                
                // 生成分页
                generatePagination(page, 5);
            }, 1000);
        }
        
        function searchPlayers() {
            const keyword = document.getElementById('searchKeyword').value;
            console.log('搜索玩家:', keyword);
            loadInventoryData();
        }
        
        function viewInventory(id) {
            console.log('查看背包:', id);
            alert('查看背包功能开发中');
        }
        
        function clearInventory(id) {
            if (confirm('确定要清空背包吗？')) {
                console.log('清空背包:', id);
                alert('清空成功');
            }
        }
        
        function generatePagination(currentPage, totalPages) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            for (let i = 1; i <= totalPages; i++) {
                const button = document.createElement('button');
                button.textContent = i;
                button.className = i === currentPage ? 'active' : '';
                button.onclick = () => loadInventoryData(i);
                pagination.appendChild(button);
            }
        }
    </script>
</body>
</html>
