<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="module-content">
        <h2>任务管理</h2>
        <div class="module-description">
            管理游戏中的任务配置
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchKeyword" placeholder="搜索任务...">
            <button onclick="searchTasks()">搜索</button>
        </div>
        
        <div class="filter-bar">
            <select id="taskType">
                <option value="">所有类型</option>
                <option value="daily">日常任务</option>
                <option value="main">主线任务</option>
                <option value="achievement">成就任务</option>
            </select>
            <select id="taskStatus">
                <option value="">所有状态</option>
                <option value="active">激活</option>
                <option value="inactive">未激活</option>
            </select>
            <button onclick="filterTasks()">筛选</button>
        </div>
        
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>任务名称</th>
                        <th>类型</th>
                        <th>条件类型</th>
                        <th>条件值</th>
                        <th>奖励</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tasksTableBody">
                    <!-- 数据将通过JS动态加载 -->
                </tbody>
            </table>
        </div>
        
        <div class="pagination" id="pagination">
            <!-- 分页将通过JS动态生成 -->
        </div>
    </div>
    
    <script>
        function initTasks() {
            console.log('初始化任务管理模块');
            loadTaskData();
        }
        
        function loadTaskData(page = 1) {
            const tableBody = document.getElementById('tasksTableBody');
            tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px;">加载中...</td></tr>';
            
            // 模拟数据加载
            setTimeout(() => {
                tableBody.innerHTML = '';
                for (let i = 1; i <= 10; i++) {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${(page - 1) * 10 + i}</td>
                        <td>任务${i}</td>
                        <td>${['日常任务', '主线任务', '成就任务'][Math.floor(Math.random() * 3)]}</td>
                        <td>${['kill', 'collect', 'talk'][Math.floor(Math.random() * 3)]}</td>
                        <td>${Math.floor(Math.random() * 10) + 1}</td>
                        <td>灵石 x ${Math.floor(Math.random() * 100) + 50}</td>
                        <td>${Math.random() > 0.5 ? '激活' : '未激活'}</td>
                        <td>
                            <button onclick="editTask(${i})">编辑</button>
                            <button onclick="deleteTask(${i})">删除</button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                }
                
                // 生成分页
                generatePagination(page, 5);
            }, 1000);
        }
        
        function searchTasks() {
            const keyword = document.getElementById('searchKeyword').value;
            console.log('搜索任务:', keyword);
            loadTaskData();
        }
        
        function filterTasks() {
            const type = document.getElementById('taskType').value;
            const status = document.getElementById('taskStatus').value;
            console.log('筛选任务:', type, status);
            loadTaskData();
        }
        
        function editTask(id) {
            console.log('编辑任务:', id);
            alert('编辑任务功能开发中');
        }
        
        function deleteTask(id) {
            if (confirm('确定要删除任务吗？')) {
                console.log('删除任务:', id);
                alert('删除成功');
            }
        }
        
        function generatePagination(currentPage, totalPages) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            for (let i = 1; i <= totalPages; i++) {
                const button = document.createElement('button');
                button.textContent = i;
                button.className = i === currentPage ? 'active' : '';
                button.onclick = () => loadTaskData(i);
                pagination.appendChild(button);
            }
        }
    </script>
</body>
</html>
