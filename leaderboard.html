<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="css/mobile-adapt.css">
  <title>灵月仙途 - 排行榜</title>
  <script src="js/config.js"></script>
  <script src="../js/auth-service.js"></script>
  <script src="js/common.js"></script>
  <script src="js/api-service.js"></script>
  <style>
    :root {
      --gold-primary: #e6c749;
      --gold-light: #f4d03f;
      --gold-dim: #8a7525;
      --text-main: #fdfbf7;
      --text-dim: #d4c5a9;
      --bg-dark: rgba(15, 20, 35, 0.95);
      --bg-panel: rgba(40, 30, 20, 0.9);
      --scroll-bg: linear-gradient(135deg, #2c1e12 0%, #1a120a 100%);
      --border-glow: 0 0 10px rgba(230, 199, 73, 0.3);
      --success: #4CAF50;
      --danger: #ff4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Microsoft YaHei', 'SimSun', '楷体', serif;
      background: linear-gradient(to bottom, #0f1420, #1a202c), 
                  url('https://images.unsplash.com/photo-1518063319789-7217e6706b04?q=80&w=2070&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      width: 100vw;
      overflow-x: hidden;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      position: relative;
      padding-bottom: 80px;
    }

    .particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(var(--gold-primary) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: particleFloat 30s linear infinite;
      opacity: 0.15;
    }

    @keyframes particleFloat {
      from { background-position: 0 0; }
      to { background-position: 0 1000px; }
    }

    .main-container {
      position: relative;
      z-index: 10;
      flex: 1;
      padding: 20px;
      padding-bottom: 20px;
    }

    .page-title {
      font-size: 32px;
      font-weight: bold;
      color: var(--gold-primary);
      text-align: center;
      margin-bottom: 25px;
      padding: 20px 40px;
      background: linear-gradient(135deg, #2c1e12, #1a120a);
      border: 3px solid var(--gold-primary);
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(230, 199, 73, 0.4),
                  inset 0 0 20px rgba(230, 199, 73, 0.1);
      text-shadow: 0 0 10px rgba(230, 199, 73, 0.5);
      position: relative;
    }

    .page-title::before,
    .page-title::after {
      content: '🐉';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
    }

    .page-title::before { left: 15px; }
    .page-title::after { right: 15px; }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      background: var(--scroll-bg);
      padding: 15px;
      border-radius: 8px;
      border: 2px solid rgba(230, 199, 73, 0.4);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
    }

    .tab-btn:hover {
      background: rgba(230, 199, 73, 0.1);
      border-color: var(--gold-primary);
      color: var(--gold-primary);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-dim));
      border-color: var(--gold-primary);
      color: #1a120a;
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.5);
    }

    .leaderboard-list {
      background: var(--scroll-bg);
      border: 2px solid rgba(230, 199, 73, 0.3);
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .leaderboard-list::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
    }

    .rank-item {
      display: flex;
      align-items: center;
      padding: 15px;
      margin-bottom: 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(230, 199, 73, 0.2);
      border-radius: 6px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .rank-item:hover {
      background: rgba(230, 199, 73, 0.05);
      border-color: rgba(230, 199, 73, 0.4);
      transform: translateX(5px);
    }

    .rank-item.rank-1 {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(230, 199, 73, 0.1));
      border: 2px solid rgba(255, 215, 0, 0.5);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .rank-item.rank-2 {
      background: linear-gradient(135deg, rgba(192, 192, 192, 0.2), rgba(167, 167, 167, 0.1));
      border: 2px solid rgba(192, 192, 192, 0.5);
      box-shadow: 0 0 15px rgba(192, 192, 192, 0.3);
    }

    .rank-item.rank-3 {
      background: linear-gradient(135deg, rgba(205, 127, 50, 0.2), rgba(184, 115, 51, 0.1));
      border: 2px solid rgba(205, 127, 50, 0.5);
      box-shadow: 0 0 15px rgba(205, 127, 50, 0.3);
    }

    .rank-number {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      border-radius: 50%;
      margin-right: 15px;
      flex-shrink: 0;
    }

    .rank-1 .rank-number {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a120a;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
      font-size: 24px;
    }

    .rank-2 .rank-number {
      background: linear-gradient(135deg, #c0c0c0, #a8a8a8);
      color: #1a120a;
      box-shadow: 0 0 12px rgba(192, 192, 192, 0.6);
      font-size: 22px;
    }

    .rank-3 .rank-number {
      background: linear-gradient(135deg, #cd7f32, #b87333);
      color: #fff;
      box-shadow: 0 0 10px rgba(205, 127, 50, 0.6);
      font-size: 20px;
    }

    .rank-item:not(.rank-1):not(.rank-2):not(.rank-3) .rank-number {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-dim);
    }

    .player-info {
      flex: 1;
      min-width: 0;
    }

    .player-name {
      font-size: 16px;
      font-weight: bold;
      color: var(--text-main);
      margin-bottom: 5px;
    }

    .rank-1 .player-name {
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .player-realm {
      font-size: 14px;
      color: var(--gold-primary);
      display: inline-block;
      padding: 4px 12px;
      background: rgba(230, 199, 73, 0.1);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 4px;
      margin-top: 5px;
    }

    .xiuwei-progress {
      flex: 1;
      text-align: right;
      min-width: 120px;
    }

    .xiuwei-value {
      font-size: 18px;
      font-weight: bold;
      color: var(--gold-primary);
      margin-bottom: 5px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(230, 199, 73, 0.3);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold-primary));
      transition: width 0.5s;
      box-shadow: 0 0 10px rgba(230, 199, 73, 0.5);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 16px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(230, 199, 73, 0.3);
      border-top-color: var(--gold-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: linear-gradient(to top, rgba(15, 20, 35, 0.98), rgba(15, 20, 35, 0.8));
      border-top: 2px solid var(--gold-primary);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      box-shadow: 0 -5px 30px rgba(230, 199, 73, 0.4);
      backdrop-filter: blur(15px);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      color: var(--text-dim);
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 12px;
      transition: all 0.3s ease;
      position: relative;
      min-width: 70px;
    }

    .nav-item:hover {
      color: var(--gold-primary);
      background: rgba(230, 199, 73, 0.2);
      transform: translateY(-3px);
    }

    .nav-item.active {
      color: var(--gold-primary);
      background: rgba(230, 199, 73, 0.3);
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.5);
    }

    .nav-icon { font-size: 1.6rem; text-shadow: 0 0 10px rgba(230, 199, 73, 0.3); }
    .nav-text { font-size: 0.8rem; font-weight: 600; text-shadow: 0 0 5px rgba(230, 199, 73, 0.3); }

    @media (max-width: 480px) {
      .page-title {
        font-size: 24px;
        padding: 15px 30px;
      }

      .rank-item {
        flex-wrap: wrap;
      }

      .xiuwei-progress {
        width: 100%;
        text-align: left;
        margin-top: 10px;
      }
    }
  </style>

  </head>
<body>
  <div class="particles"></div>

  <div class="main-container">
    <h1 class="page-title">🏆 排行榜</h1>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('realm')">境界榜</button>
      <button class="tab-btn" onclick="switchTab('combat')">战力榜</button>
      <button class="tab-btn" onclick="switchTab('wealth')">财富榜</button>
    </div>

    <div id="leaderboardList" class="leaderboard-list">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>正在加载排行榜...</div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">🧘</div>
      <div class="nav-text">修炼</div>
    </a>
    <a href="skills/skills.html" class="nav-item">
      <div class="nav-icon">📜</div>
      <div class="nav-text">功法</div>
    </a>
    <a href="assets/assets.html" class="nav-item">
      <div class="nav-icon">🎒</div>
      <div class="nav-text">资产</div>
    </a>
    <a href="javascript:void(0)" onclick="window.pageUtils.navigateToGuildPage()" class="nav-item">
      <div class="nav-icon">🏯</div>
      <div class="nav-text">宗门</div>
    </a>
    <a href="leaderboard.html" class="nav-item active">
      <div class="nav-icon">🏆</div>
      <div class="nav-text">榜单</div>
    </a>
  </div>

  <script>
    let currentTab = 'realm';

    function switchTab(tab) {
      currentTab = tab;
      
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      loadLeaderboard(tab);
    }

    async function loadLeaderboard(type) {
      const listElement = document.getElementById('leaderboardList');
      listElement.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>正在加载${getLeaderboardName(type)}...</div>
        </div>
      `;

      try {
        // 调用真实 API，使用 apiService
        let result;
        if (type === 'realm') {
          result = await apiService.getLeaderboard('realm');
        } else if (type === 'combat') {
          result = await apiService.getLeaderboard('level');
        } else {
          result = await apiService.getLeaderboard('wealth');
        }
        
        if (result && result.data) {
          renderLeaderboard(result.data, type);
        } else {
          showEmptyState();
        }
      } catch (error) {
        console.error('加载排行榜失败:', error);
        listElement.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <div>加载失败，请稍后重试</div>
          </div>
        `;
      }
    }

    function getLeaderboardName(type) {
      const names = {
        'realm': '境界榜',
        'combat': '战力榜',
        'wealth': '财富榜'
      };
      return names[type] || '排行榜';
    }

    function renderLeaderboard(list, type) {
      const listElement = document.getElementById('leaderboardList');
      
      if (!list || list.length === 0) {
        showEmptyState();
        return;
      }

      let html = '';
      list.forEach((item, index) => {
        const rank = item.rank || (index + 1);
        const rankClass = rank <= 3 ? `rank-${rank}` : '';
        const specialTitle = getSpecialTitle(rank);
        const progressPercent = calculateProgressPercent(rank);
        
        // 根据榜单类型显示不同的值
        let displayValue, displayLabel;
        if (type === 'realm') {
          // 境界榜显示境界
          displayValue = item.realm || '未入门';
          displayLabel = '';
        } else if (type === 'combat') {
          // 战力榜显示等级
          displayValue = item.level || 0;
          displayLabel = 'Lv.';
        } else {
          // 财富榜显示灵石数量
          displayValue = item.wealth || 0;
          displayLabel = '💎 ';
        }

        html += `
          <div class="rank-item ${rankClass}">
            <div class="rank-number">${rank}</div>
            <div class="player-info">
              <div class="player-name">${item.roleName || '未知'}</div>
              <div class="player-realm">🌟 ${item.realm || '未入门'}</div>
            </div>
            <div class="xiuwei-progress">
              <div class="xiuwei-value">${displayLabel}${displayValue}</div>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${progressPercent}%"></div>
              </div>
            </div>
          </div>
        `;
      });

      listElement.innerHTML = html;
    }

    function getSpecialTitle(rank) {
      const titles = { 1: '状元', 2: '榜眼', 3: '探花' };
      return titles[rank] || null;
    }

    function calculateProgressPercent(rank) {
      return Math.max(10, 100 - (rank / 100 * 90));
    }

    function formatNumber(num) {
      if (num >= 100000000) {
        return (num / 100000000).toFixed(2) + '亿';
      } else if (num >= 10000) {
        return (num / 10000).toFixed(2) + '万';
      }
      return num.toLocaleString();
    }

    function showEmptyState() {
      const listElement = document.getElementById('leaderboardList');
      listElement.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📜</div>
          <div>暂无排行数据</div>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadLeaderboard(currentTab);
    });
  </script>
</body>
</html>
