<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="../js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="../css/mobile-adapt.css">
  <title>灵月仙途 - 觉醒命格</title>
  <style>
    :root {
      --gold-primary: #e6c749;
      --gold-light: #f4d03f;
      --gold-dark: #b8860b;
      --text-main: #fdfbf7;
      --text-dim: #d4c5a9;
      --bg-glass: rgba(20, 25, 40, 0.85);
      --danger-color: #e74c3c;
      
      /* 命格专属颜色 */
      --color-metal: #ffd700; /* 金 */
      --color-wood: #4caf50;  /* 木 */
      --color-water: #2196f3; /* 水 */
      --color-fire: #f44336;  /* 火 */
      --color-earth: #795548; /* 土 */
      --color-void: #9c27b0;  /* 变异/空 */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Microsoft YaHei', 'SimSun', serif;
      background: linear-gradient(to bottom, #0f1219, #1a1f2e), url('../images/beijing.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* 动态背景粒子 */
    .particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(var(--gold-primary) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: particleFloat 30s linear infinite;
      opacity: 0.15;
    }

    @keyframes particleFloat {
      from { background-position: 0 0; }
      to { background-position: 0 1200px; }
    }

    /* 主容器 */
    .main-container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      max-width: 420px;
      max-height: 850px;
      display: flex;
      flex-direction: column;
      padding: 15px;
      overflow-y: auto;
    }

    @media (max-width: 480px) {
      .main-container {
        padding: 10px;
      }
    }

    @media (min-width: 480px) {
      .main-container {
        height: 90vh;
        background: var(--bg-glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(230, 199, 73, 0.2);
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        padding: 30px;
      }
    }

    /* 头部 */
    .header-section {
      text-align: center;
      margin-bottom: 12px;
      flex-shrink: 0;
      animation: fadeInDown 0.8s ease-out;
    }

    @media (max-width: 480px) {
      .header-section {
        margin-bottom: 10px;
      }
    }

    .game-title-vertical {
      font-family: 'SimSun', serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--gold-primary);
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 6px;
      margin: 0 auto 10px;
      height: 140px;
      text-shadow: 0 0 20px rgba(230, 199, 73, 0.6);
      position: relative;
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
    }

    @media (max-width: 480px) {
      .game-title-vertical {
        font-size: 2rem;
        height: 120px;
        letter-spacing: 4px;
      }
    }

    @media (max-width: 360px) {
      .game-title-vertical {
        font-size: 1.8rem;
        height: 100px;
        letter-spacing: 3px;
      }
    }

    .title-seal {
      position: absolute;
      bottom: 15px;
      right: -35px;
      width: 36px;
      height: 36px;
      background: #b22222;
      color: white;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-family: 'SimSun', serif;
      transform: rotate(-12deg);
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      border: 2px solid rgba(255,255,255,0.2);
    }

    @media (max-width: 480px) {
      .title-seal {
        width: 30px;
        height: 30px;
        font-size: 15px;
        bottom: 12px;
        right: -28px;
      }
    }

    @media (max-width: 360px) {
      .title-seal {
        width: 26px;
        height: 26px;
        font-size: 13px;
        bottom: 10px;
        right: -24px;
      }
    }

    /* 步骤条 */
    .step-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 15px;
    }

    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid var(--gold-primary);
      z-index: 2;
      transition: all 0.4s ease;
    }

    .step-dot.active {
      background: var(--gold-primary);
      box-shadow: 0 0 12px var(--gold-primary);
      transform: scale(1.4);
    }

    .step-dot.completed {
      background: #4CAF50;
      border-color: #4CAF50;
      box-shadow: 0 0 10px #4CAF50;
    }

    .step-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
      max-width: 30px;
      position: relative;
      overflow: hidden;
    }

    .step-line::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--gold-primary);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .step-line.filled::after {
      transform: translateX(0);
    }

    /* 内容区 */
    .content-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
      overflow-y: auto;
      padding: 10px 0;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    @media (max-width: 480px) {
      .content-section {
        gap: 15px;
      }
    }

    @media (max-width: 360px) {
      .content-section {
        gap: 10px;
      }
    }

    .instruction-text {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-dim);
      letter-spacing: 1px;
      background: rgba(0,0,0,0.3);
      padding: 8px 15px;
      border-radius: 20px;
      display: inline-block;
      align-self: center;
      border: 1px solid rgba(230, 199, 73, 0.2);
    }

    @media (max-width: 480px) {
      .instruction-text {
        font-size: 0.8rem;
        padding: 6px 12px;
      }
    }

    @media (max-width: 360px) {
      .instruction-text {
        font-size: 0.75rem;
        padding: 5px 10px;
      }
    }

    /* --- 核心转盘样式 --- */
    .wheel-container {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @media (max-width: 480px) {
      .wheel-container {
        width: 260px;
        height: 260px;
      }
    }

    @media (max-width: 360px) {
      .wheel-container {
        width: 240px;
        height: 240px;
      }
    }

    /* 外圈光晕 */
    .wheel-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0%, rgba(230, 199, 73, 0.15) 50%, transparent 100%);
      animation: rotateGlow 10s linear infinite;
      filter: blur(15px);
      z-index: 1;
      opacity: 0.6;
    }

    @media (max-width: 480px) {
      .wheel-glow {
        filter: blur(12px);
      }
    }

    @media (max-width: 360px) {
      .wheel-glow {
        filter: blur(10px);
      }
    }

    @keyframes rotateGlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 转盘主体 */
    .wheel-board {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      position: relative;
      z-index: 5;
      border: 4px solid var(--gold-primary);
      box-shadow: 
        0 0 0 4px rgba(230, 199, 73, 0.25),
        0 0 30px rgba(0,0,0,0.8),
        inset 0 0 20px rgba(0,0,0,0.9),
        0 0 15px rgba(230, 199, 73, 0.3);
      background: #1a202c;
      overflow: hidden;
      transition: transform 4s cubic-bezier(0.15, 0.85, 0.15, 1.0);
      background: conic-gradient(
        var(--color-metal) 0deg 60deg,
        var(--color-wood) 60deg 120deg,
        var(--color-water) 120deg 180deg,
        var(--color-fire) 180deg 240deg,
        var(--color-earth) 240deg 300deg,
        var(--color-void) 300deg 360deg
      );
    }

    @media (max-width: 480px) {
      .wheel-board {
        width: 240px;
        height: 240px;
        border-width: 3px;
      }
    }

    @media (max-width: 360px) {
      .wheel-board {
        width: 220px;
        height: 220px;
        border-width: 3px;
      }
    }

    /* 转盘内的分隔线和文字 */
    .wheel-inner {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      border-radius: 50%;
    }

    .wheel-item {
      position: absolute;
      top: 0;
      left: 50%;
      width: 50px;
      height: 50%;
      transform-origin: bottom center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10%;
    }

    @media (max-width: 480px) {
      .wheel-item {
        padding-top: 12%;
      }
      .wheel-icon {
        width: 36px;
        height: 36px;
        font-size: 22px;
      }
      .wheel-label {
        font-size: 11px;
        padding: 2px 6px;
      }
    }

    @media (max-width: 360px) {
      .wheel-item {
        padding-top: 14%;
      }
      .wheel-icon {
        width: 32px;
        height: 32px;
        font-size: 18px;
      }
      .wheel-label {
        font-size: 10px;
        padding: 2px 5px;
      }
    }

    .wheel-icon {
      font-size: 24px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.9));
      margin-bottom: 6px;
      background: rgba(0,0,0,0.7);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.4);
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      transition: transform 0.3s;
    }
    
    .wheel-item:hover .wheel-icon {
      transform: scale(1.12);
      box-shadow: 0 0 15px currentColor;
    }

    .wheel-label {
      font-size: 12px;
      color: #fff;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,1), 0 0 10px rgba(255,255,255,0.3);
      white-space: nowrap;
      background: rgba(0,0,0,0.5);
      padding: 2px 6px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
    }

    /* 指针 */
    .wheel-pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 40px;
      z-index: 20;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
    }

    @media (max-width: 480px) {
      .wheel-pointer {
        top: -12px;
        width: 25px;
        height: 35px;
      }
    }
    
    @media (max-width: 360px) {
      .wheel-pointer {
        top: -10px;
        width: 22px;
        height: 30px;
      }
    }
    
    .pointer-svg {
      width: 100%;
      height: 100%;
      fill: linear-gradient(180deg, var(--gold-light), var(--gold-dark));
      stroke: #b8860b;
      stroke-width: 2;
    }

    @media (max-width: 480px) {
      .pointer-svg {
        stroke-width: 1.5;
      }
    }

    @media (max-width: 360px) {
      .pointer-svg {
        stroke-width: 1;
      }
    }

    /* 中心装饰 */
    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold-dark));
      border-radius: 50%;
      z-index: 10;
      box-shadow: 
        0 0 15px rgba(230, 199, 73, 0.8),
        0 0 30px rgba(230, 199, 73, 0.4),
        inset 0 0 8px rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'SimSun', serif;
      font-size: 24px;
      font-weight: bold;
      color: #3e2723;
      border: 2px solid rgba(255,255,255,0.8);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-shadow: 0 2px 4px rgba(255,255,255,0.5);
      animation: centerPulse 2s ease-in-out infinite;
    }

    @media (max-width: 480px) {
      .wheel-center {
        width: 45px;
        height: 45px;
        font-size: 20px;
        border-width: 2px;
      }
    }

    @media (max-width: 360px) {
      .wheel-center {
        width: 40px;
        height: 40px;
        font-size: 18px;
        border-width: 2px;
      }
    }
    
    @keyframes centerPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.05); }
    }

    .wheel-center:hover {
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 
        0 0 30px rgba(230, 199, 73, 1),
        0 0 60px rgba(230, 199, 73, 0.6),
        inset 0 0 15px rgba(255,255,255,0.7);
    }

    .wheel-center:active {
      transform: translate(-50%, -50%) scale(0.95);
    }

    /* 结果面板 */
    .result-panel {
      background: linear-gradient(135deg, rgba(10, 15, 25, 0.95), rgba(20, 25, 40, 0.9));
      border: 2px solid rgba(230, 199, 73, 0.4);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    @media (max-width: 480px) {
      .result-panel {
        padding: 15px;
        min-height: 120px;
      }
      .result-title {
        font-size: 1.3rem;
      }
      .result-desc {
        font-size: 0.85rem;
      }
    }

    @media (max-width: 360px) {
      .result-panel {
        padding: 12px;
        min-height: 110px;
      }
      .result-title {
        font-size: 1.1rem;
      }
      .result-desc {
        font-size: 0.8rem;
      }
    }

    .result-panel.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      box-shadow: 
        0 0 40px rgba(230, 199, 73, 0.3),
        0 10px 30px rgba(0,0,0,0.5);
    }

    .result-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 5px;
      background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
      animation: shimmer 2s ease-in-out infinite;
    }
    
    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .result-title {
      font-size: 1.5rem;
      color: var(--gold-primary);
      font-weight: bold;
      margin-bottom: 8px;
      font-family: 'SimSun', serif;
      display: flex;
      align-items: center;
      gap: 12px;
      text-shadow: 0 0 15px rgba(230, 199, 73, 0.6), 0 2px 4px rgba(0,0,0,0.8);
    }

    @media (max-width: 480px) {
      .result-title {
        margin-bottom: 6px;
        gap: 8px;
      }
    }

    @media (max-width: 360px) {
      .result-title {
        margin-bottom: 5px;
        gap: 6px;
      }
    }

    .result-desc {
      font-size: 0.95rem;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 12px;
      max-width: 95%;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }

    @media (max-width: 480px) {
      .result-desc {
        margin-bottom: 10px;
        line-height: 1.5;
      }
    }

    @media (max-width: 360px) {
      .result-desc {
        margin-bottom: 8px;
        line-height: 1.5;
      }
    }

    .result-bonus {
      font-size: 0.9rem;
      padding: 8px 18px;
      border-radius: 24px;
      background: rgba(230, 199, 73, 0.15);
      color: var(--gold-light);
      border: 2px solid rgba(230, 199, 73, 0.5);
      display: inline-block;
      font-weight: bold;
      letter-spacing: 1.5px;
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.2);
      transition: all 0.3s;
    }

    @media (max-width: 480px) {
      .result-bonus {
        font-size: 0.85rem;
        padding: 6px 14px;
        letter-spacing: 1px;
      }
    }

    @media (max-width: 360px) {
      .result-bonus {
        font-size: 0.8rem;
        padding: 6px 12px;
        letter-spacing: 0.8px;
      }
    }
    
    .result-bonus:hover {
      box-shadow: 0 0 25px rgba(230, 199, 73, 0.4);
      transform: translateY(-2px);
    }

    .retry-btn {
      margin-top: 15px;
      font-size: 0.9rem;
      color: var(--text-dim);
      background: rgba(230, 199, 73, 0.05);
      border: 1px dashed var(--gold-primary);
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      display: none;
      font-weight: bold;
      letter-spacing: 1px;
    }

    @media (max-width: 480px) {
      .retry-btn {
        margin-top: 12px;
        font-size: 0.85rem;
        padding: 6px 16px;
      }
    }

    @media (max-width: 360px) {
      .retry-btn {
        margin-top: 10px;
        font-size: 0.8rem;
        padding: 6px 14px;
      }
    }
    
    .retry-btn:hover {
      color: var(--gold-primary);
      border-color: var(--gold-primary);
      background: rgba(230, 199, 73, 0.1);
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.2);
      transform: translateY(-2px);
    }

    /* 底部按钮 */
    .footer-section {
      margin-top: 18px;
      flex-shrink: 0;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    @media (max-width: 480px) {
      .footer-section {
        margin-top: 15px;
      }
    }

    @media (max-width: 360px) {
      .footer-section {
        margin-top: 12px;
      }
    }

    .action-btn {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      font-family: 'SimSun', serif;
      letter-spacing: 3px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    @media (max-width: 480px) {
      .action-btn {
        padding: 12px;
        font-size: 0.95rem;
        letter-spacing: 2px;
      }
    }

    @media (max-width: 360px) {
      .action-btn {
        padding: 10px;
        font-size: 0.9rem;
        letter-spacing: 1px;
      }
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(230, 199, 73, 0.1), rgba(230, 199, 73, 0.05));
      border: 1px solid var(--gold-primary);
      color: var(--gold-primary);
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.1);
    }

    .btn-primary:not(:disabled):hover {
      background: linear-gradient(135deg, rgba(230, 199, 73, 0.3), rgba(230, 199, 73, 0.1));
      box-shadow: 0 0 25px rgba(230, 199, 73, 0.4);
      color: #fff;
      text-shadow: 0 0 8px var(--gold-primary);
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(0.8);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
      margin-top: 10px;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }

    @media (max-width: 480px) {
      .btn-secondary {
        margin-top: 8px;
        font-size: 0.85rem;
      }
    }

    @media (max-width: 360px) {
      .btn-secondary {
        margin-top: 6px;
        font-size: 0.8rem;
      }
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.4);
      color: #fff;
      background: rgba(255,255,255,0.05);
    }

    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(230, 199, 73, 0.3); border-radius: 2px; }

  </style>

  </head>
<body>

  <div class="particles"></div>

  <div class="main-container">
    <!-- 头部 -->
    <div class="header-section">
      <h1 class="game-title-vertical">
        觉醒命格
        <div class="title-seal">道</div>
      </h1>
      
      <div class="step-bar">
        <div class="step-dot completed"></div>
        <div class="step-line filled"></div>
        <div class="step-dot completed"></div>
        <div class="step-line filled"></div>
        <div class="step-dot active"></div>
        <div class="step-line"></div>
        <div class="step-dot"></div>
      </div>
      <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: 8px; letter-spacing: 2px;">第三步：天命所归</div>
    </div>

    <!-- 内容区 -->
    <div class="content-section">
      <div class="instruction-text">点击法阵中心或转盘，引动天地灵气</div>
      
      <div class="wheel-container">
        <div class="wheel-glow"></div>
        
        <!-- 指针 (SVG) -->
        <div class="wheel-pointer">
          <svg class="pointer-svg" viewBox="0 0 40 60">
            <path d="M20 0 L40 60 L20 50 L0 60 Z" />
            <circle cx="20" cy="10" r="6" fill="#fff" opacity="0.8"/>
          </svg>
        </div>

        <!-- 转盘主体 -->
        <div class="wheel-board" id="wheelBoard">
          <div class="wheel-inner" id="wheelInner">
            <!-- JS 动态生成扇区内容 -->
          </div>
          
          <!-- 中心按钮 -->
          <div class="wheel-center" onclick="startSpin()">
            道
          </div>
        </div>
      </div>

      <!-- 结果面板 -->
      <div class="result-panel" id="resultPanel">
        <div class="result-title" id="resTitle">
          <span>✨</span> 未觉醒
        </div>
        <div class="result-desc" id="resDesc">请点击法阵开始觉醒先天命格</div>
        <div class="result-bonus" id="resBonus"></div>
        <button class="retry-btn" id="retryBtn" onclick="resetWheel()">再试一次 (消耗 100 灵石)</button>
      </div>
    </div>

    <!-- 底部操作 -->
    <div class="footer-section">
      <button class="action-btn btn-primary" id="nextBtn" onclick="nextStep(event)" disabled>
        <span>确认命格</span>
        <span>➜</span>
      </button>
      <button class="action-btn btn-secondary" onclick="window.location.href='character-create-step2.html'">
        返回上一步
      </button>
    </div>
  </div>

  <script>
    // 命格配置：顺序必须与 CSS conic-gradient 的角度顺序一致 (顺时针)
    // 0-60: 金，60-120: 木，120-180: 水，180-240: 火，240-300: 土，300-360: 变异
    const traits = [
      { id: 'metal', name: '金灵圣体', icon: '⚔️', color: 'var(--color-metal)', desc: '天生剑骨，攻击犀利，金系功法修炼速度 +30%', bonus: '金系修炼 +30%' },
      { id: 'wood', name: '木灵长生', icon: '🌿', color: 'var(--color-wood)', desc: '生机盎然，气血深厚，恢复速度 +25%', bonus: '气血恢复 +25%' },
      { id: 'water', name: '水灵慧根', icon: '💧', color: 'var(--color-water)', desc: '智慧超群，悟性极高，法术消耗 -15%', bonus: '灵力消耗 -15%' },
      { id: 'fire', name: '火灵狂战', icon: '🔥', color: 'var(--color-fire)', desc: '性格刚烈，爆发力强，暴击率 +10%', bonus: '暴击率 +10%' },
      { id: 'earth', name: '土灵厚载', icon: '🛡️', color: 'var(--color-earth)', desc: '防御稳固，根基扎实，受到的伤害 -10%', bonus: '受到伤害 -10%' },
      { id: 'void', name: '变异雷灵', icon: '⚡', color: 'var(--color-void)', desc: '万里挑一，雷法精通，渡劫成功率 +20%', bonus: '渡劫成功 +20%' }
    ];

    let selectedTrait = null;
    let isSpinning = false;
    let currentRotation = 0;

    // 初始化转盘内容
    function initWheel() {
      const wheelInner = document.getElementById('wheelInner');
      const segmentAngle = 360 / traits.length; // 60 度

      traits.forEach((trait, index) => {
        const item = document.createElement('div');
        item.className = 'wheel-item';
        // 计算旋转角度：每个扇区的中心线
        // 第一个扇区 (0-60) 中心在 30 度
        // 第二个扇区 (60-120) 中心在 90 度
        const rotateAngle = (index * segmentAngle) + (segmentAngle / 2);
        
        item.style.transform = `rotate(${rotateAngle}deg)`;
        
        item.innerHTML = `
          <div class="wheel-icon" style="color: ${trait.color}; border-color: ${trait.color}">${trait.icon}</div>
          <div class="wheel-label">${trait.name}</div>
        `;
        
        wheelInner.appendChild(item);
      });
    }

    // 开始抽奖
    function startSpin() {
      if (isSpinning || selectedTrait) return;
      
      isSpinning = true;
      const wheelBoard = document.getElementById('wheelBoard');
      const nextBtn = document.getElementById('nextBtn');
      const retryBtn = document.getElementById('retryBtn');
      
      // 重置 UI
      document.getElementById('resultPanel').classList.remove('show');
      nextBtn.disabled = true;
      nextBtn.innerHTML = "<span>天机推演中...</span>";
      retryBtn.style.display = 'none';

      // 1. 随机选择一个索引 (0-5)
      const winningIndex = Math.floor(Math.random() * traits.length);
      selectedTrait = traits[winningIndex];

      // 2. 计算目标角度
      // 扇区中心角度 = index * 60 + 30
      // 指针在顶部 (0 度位置)，要让扇区转到顶部，需要旋转：360 - 扇区中心角度
      const segmentAngle = 360 / traits.length;
      const targetSegmentCenter = (winningIndex * segmentAngle) + (segmentAngle / 2);
      
      // 基础旋转圈数 (至少 5 圈) + 修正角度
      // 注意：CSS 旋转是顺时针，所以要减去目标角度才能让它停在指针下
      const extraSpins = 360 * 8; 
      const stopAngle = 360 - targetSegmentCenter;
      
      // 累加之前的旋转角度，防止反转
      // 我们需要找到一个比当前角度大，且末尾角度符合 stopAngle 的值
      const currentMod = currentRotation % 360;
      let distance = stopAngle - currentMod;
      if (distance < 0) distance += 360;
      
      const totalRotate = currentRotation + extraSpins + distance;
      currentRotation = totalRotate;

      // 3. 执行动画
      wheelBoard.style.transform = `rotate(${totalRotate}deg)`;

      // 4. 动画结束处理
      setTimeout(() => {
        isSpinning = false;
        showResult(selectedTrait);
        nextBtn.disabled = false;
        nextBtn.innerHTML = "<span>确认命格</span><span>➜</span>";
        retryBtn.style.display = 'inline-block';
        
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      }, 4000); // 必须与 CSS transition 时间一致
    }

    // 显示结果
    function showResult(trait) {
      const panel = document.getElementById('resultPanel');
      const title = document.getElementById('resTitle');
      const desc = document.getElementById('resDesc');
      const bonus = document.getElementById('resBonus');
      
      title.innerHTML = `<span style="color:${trait.color}; text-shadow: 0 0 10px ${trait.color}">${trait.icon}</span> ${trait.name}`;
      title.style.color = trait.color;
      
      desc.textContent = trait.desc;
      bonus.textContent = trait.bonus;
      bonus.style.borderColor = trait.color;
      bonus.style.color = trait.color;
      bonus.style.background = `${trait.color}15`; // 15% 透明度
      
      panel.style.borderColor = trait.color;
      panel.style.boxShadow = `0 0 40px ${trait.color}20`;
      
      panel.classList.add('show');
    }

    // 重置/再试一次
    function resetWheel() {
      if (isSpinning) return;
      selectedTrait = null;
      document.getElementById('resultPanel').classList.remove('show');
      document.getElementById('nextBtn').disabled = true;
      document.getElementById('nextBtn').innerHTML = "<span>请先觉醒命格</span>";
      
      // 可选：这里可以添加消耗灵石的逻辑
      console.log("消耗 100 灵石重新觉醒...");
    }

    // 下一步
    function nextStep(event) {
      if (!selectedTrait) {
        showToast("道友需先引动天机，觉醒命格！");
        return;
      }
      
      let tempCharacter = JSON.parse(localStorage.getItem('tempCharacter') || '{}');
      tempCharacter.step = 3;
      tempCharacter.traits = [selectedTrait.id];
      tempCharacter.traitName = selectedTrait.name;
      tempCharacter.traitBonus = selectedTrait.bonus;
      
      localStorage.setItem('tempCharacter', JSON.stringify(tempCharacter));
      
      const btn = event.currentTarget;
      btn.innerHTML = "<span>命格融合中...</span>";
      btn.style.pointerEvents = 'none';
      
      // 模拟加载
      setTimeout(() => {
        window.location.href = 'character-create-step4.html';
      }, 800);
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 检查用户是否登录
      const userId = localStorage.getItem('userId');
      console.log('角色创建步骤3 - 检查用户登录状态:', userId);
      if (!userId) {
        console.log('用户未登录，重定向到登录页面');
        window.location.href = '../login.html';
        return;
      }
      
      initWheel();
    });

  </script>
  <script src="js/ui-components.js"></script>
</body>
</html>
