<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="../js/viewport-adapt.js"></script>
  <script src="../js/config.js"></script>
  <link rel="stylesheet" href="../css/mobile-adapt.css">
  <title>灵月仙途 - 大道初成</title>
  <style>
    :root {
      --gold-primary: #e6c749;
      --gold-light: #f4d03f;
      --gold-dim: #8a7525;
      --text-main: #fdfbf7;
      --text-dim: #d4c5a9;
      --bg-glass: rgba(20, 25, 40, 0.9);
      --stat-base: #6b7280;
      --stat-buff: #4CAF50;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Microsoft YaHei', 'SimSun', serif;
      background-image: 
                        url('../images/beijing2.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* 动态背景粒子 */
    .particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(var(--gold-primary) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: particleFloat 20s linear infinite;
      opacity: 0.1;
    }

    @keyframes particleFloat {
      from { background-position: 0 0; }
      to { background-position: 0 1000px; }
    }

    /* 主容器 */
    .main-container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      max-width: 420px;
      max-height: 850px;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
    }

    @media (min-width: 480px) {
      .main-container {
        height: 90vh;
        background: var(--bg-glass);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(230, 199, 73, 0.3);
        border-radius: 20px;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(230, 199, 73, 0.1);
        padding: 30px;
      }
    }

    /* 头部：标题与步骤 */
    .header-section {
      text-align: center;
      margin-bottom: 15px;
      flex-shrink: 0;
      animation: fadeInDown 0.8s ease-out;
    }

    .game-title-vertical {
      font-family: 'SimSun', serif;
      font-size: 3rem;
      font-weight: 900;
      color: var(--gold-primary);
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 10px;
      margin: 0 auto 10px;
      height: 180px;
      text-shadow: 0 0 15px rgba(230, 199, 73, 0.6);
      position: relative;
    }

    .title-seal {
      position: absolute;
      bottom: 10px;
      right: -40px;
      width: 40px;
      height: 40px;
      background: #b22222;
      color: white;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-family: 'SimSun', serif;
      transform: rotate(-10deg);
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    /* 星辰步骤条 */
    .step-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-top: 10px;
    }

    .step-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 1px solid var(--gold-primary);
      z-index: 2;
      transition: all 0.4s ease;
    }

    .step-dot.active {
      background: var(--gold-primary);
      box-shadow: 0 0 15px var(--gold-primary);
      transform: scale(1.4);
      animation: pulseActive 1.5s infinite;
    }

    .step-dot.completed {
      background: #4CAF50;
      border-color: #4CAF50;
      box-shadow: 0 0 10px #4CAF50;
    }

    .step-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
      max-width: 40px;
      position: relative;
      overflow: hidden;
    }

    .step-line.filled::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--gold-primary);
      transform: translateX(0);
    }
    
    .step-line::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--gold-primary);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    @keyframes pulseActive {
      0%, 100% { box-shadow: 0 0 10px var(--gold-primary); }
      50% { box-shadow: 0 0 20px var(--gold-light); }
    }

    /* 中部：内容区 */
    .content-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      padding: 5px;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    /* 本命牌 (角色概览) */
    .identity-card {
      background: linear-gradient(135deg, rgba(30,35,50,0.9), rgba(20,25,40,0.95));
      border: 1px solid var(--gold-primary);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .identity-card::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(230,199,73,0.1) 0%, transparent 60%);
      animation: rotateBg 10s linear infinite;
    }

    @keyframes rotateBg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .avatar-display {
      font-size: 3.5rem;
      z-index: 1;
      filter: drop-shadow(0 0 10px rgba(230,199,73,0.5));
      animation: floatAvatar 3s ease-in-out infinite;
    }

    @keyframes floatAvatar {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .identity-info {
      flex: 1;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .char-name {
      font-size: 1.5rem;
      color: var(--gold-primary);
      font-weight: bold;
      font-family: 'SimSun', serif;
      text-shadow: 0 0 5px rgba(230,199,73,0.4);
    }

    .char-meta {
      font-size: 0.9rem;
      color: var(--text-dim);
      display: flex;
      gap: 10px;
    }

    .meta-tag {
      background: rgba(230,199,73,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(230,199,73,0.3);
      font-size: 0.8rem;
    }

    /* 属性面板 */
    .stats-panel {
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .panel-title {
      font-size: 1rem;
      color: var(--gold-primary);
      margin-bottom: 15px;
      padding-left: 10px;
      border-left: 3px solid var(--gold-primary);
      font-weight: bold;
      display: flex;
      justify-content: space-between;
    }

    .stat-row {
      margin-bottom: 12px;
    }

    .stat-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: var(--text-dim);
    }

    .stat-value-final {
      color: var(--gold-light);
      font-weight: bold;
      font-size: 0.9rem;
    }

    .progress-bg {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold-primary));
      width: 0%;
      border-radius: 3px;
      transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }
    
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; width: 2px;
      background: #fff;
      box-shadow: 0 0 10px #fff;
    }

    /* 特质徽章 */
    .traits-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 10px 0;
    }

    .trait-badge {
      background: rgba(230,199,73,0.1);
      border: 1px solid var(--gold-primary);
      color: var(--gold-primary);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 0 10px rgba(230,199,73,0.1);
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      opacity: 0;
      transform: scale(0.8);
    }

    @keyframes popIn {
      to { opacity: 1; transform: scale(1); }
    }

    /* 底部按钮 */
    .footer-section {
      margin-top: 20px;
      flex-shrink: 0;
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    .create-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: bold;
      font-family: 'SimSun', serif;
      letter-spacing: 6px;
      color: #1a2530;
      background: linear-gradient(90deg, transparent, rgba(230,199,73,0.8), transparent);
      border: 2px solid var(--gold-primary);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(230,199,73,0.3);
      text-shadow: 0 1px 2px rgba(255,255,255,0.5);
    }

    .create-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
      transition: 0.5s;
    }

    .create-btn:hover {
      letter-spacing: 8px;
      box-shadow: 0 0 40px rgba(230,199,73,0.6);
      background: linear-gradient(90deg, transparent, rgba(244,208,63,1), transparent);
    }

    .create-btn:hover::before {
      left: 100%;
    }

    .back-btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .back-btn:hover {
      border-color: rgba(255,255,255,0.5);
      color: #fff;
      background: rgba(255,255,255,0.05);
    }

    /* 创建成功特效层 */
    .success-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white;
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    
    .success-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .success-text {
      font-size: 3rem;
      color: var(--gold-primary);
      font-family: 'SimSun', serif;
      font-weight: bold;
      text-shadow: 0 0 20px var(--gold-primary);
      transform: scale(0.5);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .success-overlay.active .success-text {
      transform: scale(1);
    }

    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(230, 199, 73, 0.3); border-radius: 2px; }

  </style>

  </head>
<body>

  <!-- 背景粒子 -->
  <div class="particles"></div>

  <div class="main-container">
    <!-- 头部 -->
    <div class="header-section">
      <h1 class="game-title-vertical">
        大道初成
        <div class="title-seal">道</div>
      </h1>
      
      <div class="step-bar">
        <div class="step-dot completed"></div>
        <div class="step-line filled"></div>
        <div class="step-dot completed"></div>
        <div class="step-line filled"></div>
        <div class="step-dot completed"></div>
        <div class="step-line filled"></div>
        <div class="step-dot active"></div>
      </div>
      <div style="font-size: 0.8rem; color: var(--text-dim); margin-top: 8px;">第四步：确认命格</div>
    </div>

    <!-- 内容区 -->
    <div class="content-section">
      
      <!-- 本命牌 -->
      <div class="identity-card">
        <div class="avatar-display" id="displayAvatar">👤</div>
        <div class="identity-info">
          <div class="char-name" id="displayName">未命名</div>
          <div class="char-meta">
            <span class="meta-tag" id="displayGender">男</span>
            <span class="meta-tag" id="displayRoot">金灵根</span>
          </div>
          <div style="font-size: 0.75rem; color: var(--gold-dim); margin-top: 4px;">
            境界：炼气期一层
          </div>
        </div>
      </div>

      <!-- 特质展示 -->
      <div class="stats-panel">
        <div class="panel-title">
          <span>先天特质</span>
          <span style="font-size: 0.8rem; opacity: 0.7;">天命所归</span>
        </div>
        <div class="traits-container" id="traitsList">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 属性面板 -->
      <div class="stats-panel">
        <div class="panel-title">
          <span>根基属性</span>
          <span style="font-size: 0.8rem; opacity: 0.7;">灵气充沛</span>
        </div>
        
        <div id="statsContainer">
          <!-- 动态生成属性条 -->
        </div>
      </div>

    </div>

    <!-- 底部操作 -->
    <div class="footer-section">
      <button class="create-btn" onclick="finalizeCreation()">
        正式踏入仙途
      </button>
      <button class="back-btn" onclick="window.location.href='character-create-step3.html'">
        返回修改
      </button>
    </div>
  </div>

  <!-- 成功特效层 -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-text">仙途已启</div>
  </div>

  <script>
    // 映射字典
    const maps = {
      gender: { 'male': '纯阳', 'female': '玄阴' },
      root: { 
        '金灵根': '金灵根', '木灵根': '木灵根', '水灵根': '水灵根', 
        '火灵根': '火灵根', '土灵根': '土灵根', '五行灵根': '五行灵根',
        '雷灵根': '雷灵根', '五灵根': '五灵根'
      },
      trait: {
        'talent': '天资聪颖', 'luck': '福缘深厚', 'strength': '力大无穷',
        'agility': '身轻如燕', 'calm': '心如止水', 'alchemy': '丹道圣体'
      },
      traitIcon: {
        'talent': '📜', 'luck': '🍀', 'strength': '💪',
        'agility': '🌬️', 'calm': '🧘', 'alchemy': '⚗️'
      }
    };

    // 初始化页面
    window.addEventListener('DOMContentLoaded', () => {
      // 检查用户是否已登录
      const userId = localStorage.getItem('userId');
      if (!userId) {
        console.error('用户未登录，无法创建角色');
        showToast('请先登录后再创建角色');
        window.location.href = '../login.html';
        return;
      }
      
      const data = JSON.parse(localStorage.getItem('tempCharacter') || '{}');
      
      if (!data.name) {
        showToast("道友尚未凝聚神魂，请从头开始！");
        window.location.href = 'character-create-step1.html';
        return;
      }

      renderIdentity(data);
      renderTraits(data);
      renderStats(data);
    });

    // 渲染身份牌
    function renderIdentity(data) {
      document.getElementById('displayAvatar').textContent = data.avatar || '👤';
      document.getElementById('displayName').textContent = data.name;
      document.getElementById('displayGender').textContent = maps.gender[data.gender] || '未知';
      document.getElementById('displayRoot').textContent = maps.root[data.spiritRoot] || '未知';
    }

    // 渲染特质
    function renderTraits(data) {
      const container = document.getElementById('traitsList');
      container.innerHTML = '';
      
      if (!data.traits || data.traits.length === 0) {
        container.innerHTML = '<span style="color:var(--text-dim); font-size:0.9rem;">无先天特质</span>';
        return;
      }

      data.traits.forEach((key, index) => {
        const badge = document.createElement('div');
        badge.className = 'trait-badge';
        badge.style.animationDelay = `${index * 0.1}s`;
        badge.innerHTML = `
          <span>${maps.traitIcon[key] || '✨'}</span>
          <span>${maps.trait[key] || key}</span>
        `;
        container.appendChild(badge);
      });
    }

    // 渲染属性条
    function renderStats(data) {
      const base = { health: 100, mana: 80, attack: 15, defense: 10, speed: 8 };
      let stats = { ...base };
      const root = data.spiritRoot;

      // 计算灵根加成
      if (root === '金灵根') stats.attack = Math.round(stats.attack * 1.1);
      else if (root === '木灵根') stats.health = Math.round(stats.health * 1.15);
      else if (root === '水灵根') stats.mana = Math.round(stats.mana * 1.15);
      else if (root === '火灵根') stats.speed = Math.round(stats.speed * 1.1);
      else if (root === '土灵根') stats.defense = Math.round(stats.defense * 1.15);
      else if (root === '五行灵根' || root === '五灵根') {
        Object.keys(stats).forEach(k => stats[k] = Math.round(stats[k] * 1.05));
      }

      const labels = { health: '气血', mana: '法力', attack: '攻击', defense: '防御', speed: '速度' };
      const maxValues = { health: 150, mana: 120, attack: 30, defense: 25, speed: 15 }; // 用于进度条百分比

      const container = document.getElementById('statsContainer');
      container.innerHTML = '';

      Object.keys(stats).forEach((key, index) => {
        const current = stats[key];
        const baseVal = base[key];
        const isBuffed = current > baseVal;
        const percent = Math.min((current / maxValues[key]) * 100, 100);

        const row = document.createElement('div');
        row.className = 'stat-row';
        row.style.opacity = '0';
        row.style.animation = `fadeInUp 0.5s ease-out ${0.8 + index * 0.1}s forwards`;

        row.innerHTML = `
          <div class="stat-header">
            <span>${labels[key]}</span>
            <span class="stat-value-final">
              ${current} 
              ${isBuffed ? `<span style="font-size:0.7rem; color:var(--stat-buff); margin-left:4px;">(+${current-baseVal})</span>` : ''}
            </span>
          </div>
          <div class="progress-bg">
            <div class="progress-fill" style="width: 0%" data-width="${percent}%"></div>
          </div>
        `;
        container.appendChild(row);

        // 触发动画
        setTimeout(() => {
          const fill = row.querySelector('.progress-fill');
          fill.style.width = fill.getAttribute('data-width');
        }, 900 + index * 100);
      });
    }

    // 最终创建
    function finalizeCreation() {
      const tempData = JSON.parse(localStorage.getItem('tempCharacter') || '{}');
      
      if (!tempData.name) return;

      // 重新计算一次最终数据
      const base = { health: 100, mana: 80, attack: 15, defense: 10, speed: 8 };
      let stats = { ...base };
      const root = tempData.spiritRoot;

      if (root === '金灵根') stats.attack = Math.round(stats.attack * 1.1);
      else if (root === '木灵根') stats.health = Math.round(stats.health * 1.15);
      else if (root === '水灵根') stats.mana = Math.round(stats.mana * 1.15);
      else if (root === '火灵根') stats.speed = Math.round(stats.speed * 1.1);
      else if (root === '土灵根') stats.defense = Math.round(stats.defense * 1.15);
      else if (root === '五行灵根' || root === '五灵根') {
        Object.keys(stats).forEach(k => stats[k] = Math.round(stats[k] * 1.05));
      }

      const finalCharacter = {
        ...tempData,
        level: 1,
        cultivation: '炼气期一层',
        stats: stats,
        createTime: Date.now()
      };

      // 向后端 API 发送请求创建角色
      const btn = document.querySelector('.create-btn');
      const originalText = btn.innerHTML;
      btn.innerHTML = "正在连接仙途...";
      btn.style.pointerEvents = 'none';

      // 准备后端需要的数据
      const userId = localStorage.getItem('userId');
      console.log('当前登录用户ID:', userId);
      
      // 验证userId是否存在
      if (!userId) {
        console.error('用户未登录，无法创建角色');
        showToast('请先登录后再创建角色');
        window.location.href = '../login.html';
        return;
      }
      
      const roleData = {
        name: tempData.name,
        gender: tempData.gender === 'male' ? '1' : '0',
        spiritRoot: tempData.spiritRoot || '五行灵根',
        origin: tempData.origin || '山野村夫',
        avatar: tempData.avatar || null,
        background: tempData.origin || '山野村夫'
      };
      console.log('角色创建数据:', roleData);

      fetch(`${window.getApiBaseUrl()}/role/create`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + (localStorage.getItem('token') || '')
        },
        body: JSON.stringify(roleData)
      })
      .then(response => {
        if (!response.ok) {
          throw new Error('创建角色失败');
        }
        return response.json();
      })
      .then(data => {
        console.log('角色创建响应:', data);
        
        if (data.code !== 200 || !data.data) {
          throw new Error(data.message || '创建角色失败');
        }
        
        const roleInfo = data.data;
        
        if (roleInfo && roleInfo.id) {
          localStorage.setItem('currentRoleId', roleInfo.id);
          localStorage.setItem('character', JSON.stringify(roleInfo));
        }
        localStorage.removeItem('tempCharacter');

        // 播放特效
        const overlay = document.getElementById('successOverlay');
        overlay.classList.add('active');
        
        // 震动反馈
        if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);

        // 跳转到加载页面，会自动刷新角色列表
        setTimeout(() => {
          window.location.href = '../start/start.html';
        }, 1500);
      })
      .catch(error => {
        console.error('创建角色失败:', error);
        btn.innerHTML = originalText;
        btn.style.pointerEvents = 'auto';
        
        // 显示详细错误信息
        let errorMsg = '创建角色失败';
        if (error.message) {
          errorMsg += ': ' + error.message;
        }
        showToast(errorMsg, 'error');
        
        // 记录错误日志
        console.error('错误详情:', {
          userId: userId,
          roleName: tempData.name,
          error: error.toString(),
          timestamp: new Date().toISOString()
        });
      });
    }
  </script>
  <script src="js/ui-components.js"></script>
</body>
</html>
