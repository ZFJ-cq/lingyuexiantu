<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="../js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="../css/mobile-adapt.css">
  <title>灵月仙途 - 觉醒灵根</title>
  <style>
    :root {
      --gold-primary: #e6c749;
      --gold-light: #f4d03f;
      --text-main: #fdfbf7;
      --text-dim: #d4c5a9;
      --bg-glass: rgba(20, 25, 40, 0.85);
      
      /* 灵根专属颜色 - 严格匹配参考图 */
      --root-gold: #ffd700;   /* 金 - 黄色 */
      --root-wood: #4caf50;   /* 木 - 绿色 */
      --root-water: #2196f3;  /* 水 - 蓝色 */
      --root-fire: #f44336;   /* 火 - 红色 */
      --root-earth: #795548;  /* 土 - 棕色 */
      --root-five: #9c27b0;   /* 五行 - 紫色 */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Microsoft YaHei', 'SimSun', serif;
      background-image: url('../images/beijing.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(var(--gold-primary) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: particleFloat 20s linear infinite;
      opacity: 0.1;
    }

    @keyframes particleFloat {
      from { background-position: 0 0; }
      to { background-position: 0 1000px; }
    }

    .main-container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      max-width: 450px;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
    }

    @media (min-width: 480px) {
      .main-container {
        height: 90vh;
        background: var(--bg-glass);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(230, 199, 73, 0.2);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        padding: 30px;
      }
    }

    .header-section {
      text-align: center;
      margin-bottom: 15px;
      flex-shrink: 0;
      animation: fadeInDown 0.8s ease-out;
    }

    .game-title-vertical {
      font-family: 'SimSun', serif;
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--gold-primary);
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 8px;
      margin: 0 auto;
      height: 160px;
      text-shadow: 0 0 15px rgba(230, 199, 73, 0.5);
      position: relative;
    }

    .title-seal {
      position: absolute;
      bottom: 10px;
      right: -35px;
      width: 35px;
      height: 35px;
      background: #b22222;
      color: white;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-family: 'SimSun', serif;
      transform: rotate(-10deg);
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .step-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 15px;
    }

    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 1px solid var(--gold-primary);
      z-index: 2;
      transition: all 0.4s ease;
    }

    .step-dot.active {
      background: var(--gold-primary);
      box-shadow: 0 0 10px var(--gold-primary);
      transform: scale(1.3);
    }

    .step-dot.completed {
      background: #4CAF50;
      border-color: #4CAF50;
      box-shadow: 0 0 10px #4CAF50;
    }

    .step-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
      max-width: 35px;
      position: relative;
      overflow: hidden;
    }

    .step-line::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--gold-primary);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .step-line.filled::after {
      transform: translateX(0);
    }

    .content-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
      overflow-y: auto;
      padding: 10px 0;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .instruction-text {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    /* --- 修正后的转盘样式 --- */
    .wheel-wrapper {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto;
      filter: drop-shadow(0 0 20px rgba(230, 199, 73, 0.2));
    }

    /* 指针 - 固定在顶部 */
    .wheel-pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 20px solid var(--gold-primary);
      z-index: 20;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    .wheel-circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid var(--gold-primary);
      position: relative;
      overflow: hidden;
      background: #1a202c;
      transition: transform 4s cubic-bezier(0.15, 0.80, 0.15, 0.99);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }

    .wheel-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      border-radius: 50%;
    }

    /* 文字标签容器 */
    .wheel-labels {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }

    .wheel-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: 0 0;
      width: 0;
      height: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wheel-label span {
      display: block;
      font-size: 0.85rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      white-space: nowrap;
      font-family: 'SimSun', serif;
      /* 关键：让文字垂直于半径方向 */
      transform: translate(-50%, -50%) rotate(90deg);
      transform-origin: center center;
      /* 响应式定位：使用百分比而非固定像素 */
      padding-left: 40%;
    }

    @media (max-width: 480px) {
      .wheel-label span {
        padding-left: 38%;
      }
    }

    .wheel-center-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      background: radial-gradient(circle, #fff 0%, var(--gold-primary) 100%);
      border-radius: 50%;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.6);
      border: 2px solid #fff;
      transition: transform 0.2s;
    }

    .wheel-center-btn:active {
      transform: translate(-50%, -50%) scale(0.9);
    }

    .wheel-center-btn i {
      font-size: 1.3rem;
      color: #1a202c;
      font-style: normal;
      font-weight: 900;
    }

    /* 结果面板 */
    .result-panel {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.5s ease;
      margin-top: 10px;
    }

    .result-panel.show {
      opacity: 1;
      transform: translateY(0);
    }

    .result-title {
      font-size: 1.2rem;
      color: var(--gold-primary);
      font-weight: bold;
      margin-bottom: 5px;
      font-family: 'SimSun', serif;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-desc {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .result-bonus {
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 15px;
      background: rgba(230, 199, 73, 0.1);
      color: var(--gold-light);
      border: 1px solid rgba(230, 199, 73, 0.3);
      display: inline-block;
    }

    .footer-section {
      margin-top: 20px;
      flex-shrink: 0;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .action-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: bold;
      font-family: 'SimSun', serif;
      letter-spacing: 4px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .btn-primary {
      background: linear-gradient(90deg, transparent, rgba(230, 199, 73, 0.2), transparent);
      border: 1px solid var(--gold-primary);
      color: var(--gold-primary);
      box-shadow: 0 0 15px rgba(230, 199, 73, 0.1);
    }

    .btn-primary:hover:not(:disabled) {
      background: rgba(230, 199, 73, 0.3);
      box-shadow: 0 0 25px rgba(230, 199, 73, 0.4);
      letter-spacing: 6px;
      color: #fff;
      text-shadow: 0 0 10px var(--gold-primary);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(1);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      margin-top: 10px;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.5);
      color: #fff;
      background: rgba(255,255,255,0.05);
    }

    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    ::-webkit-scrollbar { width: 0px; background: transparent; }

  </style>

  </head>
<body>

  <div class="particles"></div>

  <div class="main-container">
    <div class="header-section">
      <h1 class="game-title-vertical">
        觉醒灵根
        <div class="title-seal">道</div>
      </h1>
      
      <div class="step-bar">
        <div class="step-dot completed"></div>
        <div class="step-line filled"></div>
        <div class="step-dot active"></div>
        <div class="step-line"></div>
        <div class="step-dot"></div>
        <div class="step-line"></div>
        <div class="step-dot"></div>
      </div>
      <div style="font-size: 0.8rem; color: var(--text-dim); margin-top: 8px;">第二步：觉醒天赋</div>
    </div>

    <div class="content-section">
      <div class="instruction-text">点击中心法阵或下方按钮觉醒先天灵根</div>
      
      <div class="wheel-wrapper">
        <div class="wheel-pointer"></div>
        <div class="wheel-circle" id="wheelCircle">
          <div class="wheel-bg" id="wheelBg"></div>
          <div class="wheel-labels" id="wheelLabels"></div>
        </div>
        <div class="wheel-center-btn" onclick="spinWheel()">
          <i>觉</i>
        </div>
      </div>

      <div class="result-panel" id="resultPanel">
        <div class="result-title" id="resTitle">未觉醒</div>
        <div class="result-desc" id="resDesc">请点击法阵开始觉醒</div>
        <div class="result-bonus" id="resBonus"></div>
      </div>
    </div>

    <div class="footer-section">
      <button class="action-btn btn-primary" id="nextBtn" onclick="nextStep(event)" disabled>
        <span>确认灵根</span>
        <span>➜</span>
      </button>
      <button class="action-btn btn-secondary" onclick="window.location.href='character-create-step1.html'">
        返回上一步
      </button>
    </div>
  </div>

  <script>
    // 灵根配置数据 - 顺序很重要，决定了它们在转盘上的位置
    // 从顶部（12 点）开始，顺时针排列
    const roots = [
      { id: 'earth', name: '土灵根', icon: '🌍', color: '#795548', desc: '主厚重，坚若磐石，防御无双', bonus: '防御 +15%' },
      { id: 'five', name: '五行灵根', icon: '⭐', color: '#9c27b0', desc: '主平衡，包罗万象，潜力无限', bonus: '全属性 +5%' },
      { id: 'fire', name: '火灵根', icon: '🔥', color: '#f44336', desc: '主爆裂，瞬息千里，爆发极高', bonus: '速度 +10%' },
      { id: 'water', name: '水灵根', icon: '💧', color: '#2196f3', desc: '主柔顺，法力绵长，控制极强', bonus: '法力 +15%' },
      { id: 'wood', name: '木灵根', icon: '🌿', color: '#4caf50', desc: '主生机，生生不息，疗伤圣手', bonus: '气血 +15%' },
      { id: 'gold', name: '金灵根', icon: '⚜️', color: '#ffd700', desc: '主杀伐，锐利无匹，攻伐第一', bonus: '攻击 +10%' }
    ];

    let currentRotation = 0;
    let isSpinning = false;
    let selectedRoot = null;

    function initWheel() {
      const segmentAngle = 360 / roots.length;
      const wheelBg = document.getElementById('wheelBg');
      const wheelLabels = document.getElementById('wheelLabels');
      
      // 1. 生成背景渐变色
      let gradientStr = 'conic-gradient(';
      roots.forEach((root, index) => {
        const startDeg = index * segmentAngle;
        const endDeg = (index + 1) * segmentAngle;
        gradientStr += `${root.color} ${startDeg}deg ${endDeg}deg`;
        if (index < roots.length - 1) gradientStr += ', ';
        
        // 2. 生成文字标签
        const label = document.createElement('div');
        label.className = 'wheel-label';
        // 计算标签旋转角度：扇区起始角度 + 半个扇区角度
        const rotateAngle = startDeg + (segmentAngle / 2);
        label.style.transform = `rotate(${rotateAngle}deg)`;
        
        const span = document.createElement('span');
        span.textContent = root.name;
        
        label.appendChild(span);
        wheelLabels.appendChild(label);
      });
      gradientStr += ')';
      wheelBg.style.background = gradientStr;
    }

    function spinWheel() {
      if (isSpinning || selectedRoot) return;
      
      isSpinning = true;
      const wheel = document.getElementById('wheelCircle');
      const nextBtn = document.getElementById('nextBtn');
      const resultPanel = document.getElementById('resultPanel');
      
      resultPanel.classList.remove('show');
      nextBtn.disabled = true;
      nextBtn.innerHTML = "<span>觉醒中...</span>";

      const winningIndex = Math.floor(Math.random() * roots.length);
      selectedRoot = roots[winningIndex];
      
      const segmentAngle = 360 / roots.length;
      // 计算目标角度：要让选中的扇区转到顶部 (0 度)
      // 扇区中心角度 = index * segmentAngle + segmentAngle/2
      // 需要旋转的角度 = 360 - 扇区中心角度
      const targetAngleInCircle = (winningIndex * segmentAngle) + (segmentAngle / 2);
      const rotateToTop = 360 - targetAngleInCircle;
      
      const extraSpins = 360 * 5;
      const currentMod = currentRotation % 360;
      let adjust = rotateToTop - currentMod;
      if (adjust < 0) adjust += 360;
      
      const totalRotate = currentRotation + extraSpins + adjust;
      currentRotation = totalRotate;

      wheel.style.transform = `rotate(${totalRotate}deg)`;

      setTimeout(() => {
        isSpinning = false;
        showResult(selectedRoot);
        nextBtn.disabled = false;
        nextBtn.innerHTML = "<span>确认灵根</span><span>➜</span>";
        
        if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
      }, 4000);
    }

    function showResult(root) {
      const panel = document.getElementById('resultPanel');
      const title = document.getElementById('resTitle');
      const desc = document.getElementById('resDesc');
      const bonus = document.getElementById('resBonus');
      
      title.innerHTML = `<span>${root.icon}</span> ${root.name}`;
      title.style.color = root.color;
      title.style.textShadow = `0 0 10px ${root.color}`;
      
      desc.textContent = root.desc;
      bonus.textContent = root.bonus;
      bonus.style.borderColor = root.color;
      bonus.style.color = root.color;
      bonus.style.background = `${root.color}20`;
      
      panel.style.borderColor = root.color;
      panel.style.boxShadow = `0 0 20px ${root.color}30`;
      
      panel.classList.add('show');
    }

    function nextStep(event) {
      if (!selectedRoot) return;
      
      let tempCharacter = JSON.parse(localStorage.getItem('tempCharacter') || '{}');
      tempCharacter.step = 2;
      tempCharacter.spiritRoot = selectedRoot.name;
      tempCharacter.spiritRootName = selectedRoot.name;
      tempCharacter.spiritRootBonus = selectedRoot.bonus;
      localStorage.setItem('tempCharacter', JSON.stringify(tempCharacter));
      
      const btn = event.currentTarget;
      btn.innerHTML = "<span>灵力灌注中...</span>";
      btn.style.pointerEvents = 'none';
      
      setTimeout(() => {
        window.location.href = 'character-create-step3.html';
      }, 800);
    }

    document.addEventListener('DOMContentLoaded', () => {
      // 检查用户是否登录
      const userId = localStorage.getItem('userId');
      console.log('角色创建步骤2 - 检查用户登录状态:', userId);
      if (!userId) {
        console.log('用户未登录，重定向到登录页面');
        window.location.href = '../login.html';
        return;
      }
      
      initWheel();
    });

  </script>
  <script src="js/ui-components.js"></script>
</body>
</html>
