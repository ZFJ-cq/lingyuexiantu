<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="css/mobile-adapt.css">
  <title>登录 API 诊断工具</title>
  <style>
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      padding: 20px;
      color: #fff;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 30px;
    }
    h1 {
      color: #f4d03f;
      text-align: center;
    }
    .section {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .section-title {
      color: #f4d03f;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: #aaa;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 5px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #f4d03f, #f1c40f);
      border: none;
      border-radius: 8px;
      color: #333;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(244, 208, 63, 0.4);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .log-container {
      background: #000;
      border-radius: 8px;
      padding: 15px;
      max-height: 400px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .log-entry { margin-bottom: 5px; }
    .log-info { color: #0f0; }
    .log-warn { color: #ff0; }
    .log-error { color: #f44; }
    .log-response { color: #4FC3F7; }
    .result-section {
      background: rgba(76, 175, 80, 0.2);
      border: 1px solid #4CAF50;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
    }
    .result-section.error {
      background: rgba(244, 67, 54, 0.2);
      border-color: #f44336;
    }
    .result-key {
      color: #f4d03f;
      font-weight: bold;
    }
    .result-value {
      color: #fff;
      word-break: break-all;
    }
    .info-box {
      background: rgba(33, 150, 243, 0.2);
      border: 1px solid #2196F3;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
  </style>

  </head>
<body>
  <div class="container">
    <h1>🔍 登录 API 诊断工具</h1>
    
    <div class="info-box">
      <strong>使用方法：</strong>
      <ol style="margin: 10px 0 0 20px;">
        <li>输入用户名和密码</li>
        <li>点击"测试登录"按钮</li>
        <li>查看详细的 API 响应和日志</li>
        <li>重点关注 <code>token</code> 和 <code>currentRoleId</code> 字段</li>
      </ol>
    </div>
    
    <div class="section">
      <div class="section-title">📝 测试登录</div>
      <div class="form-group">
        <label>用户名或手机号：</label>
        <input type="text" id="username" placeholder="请输入用户名或手机号">
      </div>
      <div class="form-group">
        <label>密码：</label>
        <input type="password" id="password" placeholder="请输入密码">
      </div>
      <button class="btn" id="loginBtn" onclick="testLogin()">测试登录</button>
    </div>
    
    <div class="section">
      <div class="section-title">📊 API 响应详情</div>
      <div id="responseContainer" style="display: none;">
        <div id="responseData"></div>
      </div>
      <div class="log-container" id="logContainer">
        <div class="log-entry log-info">等待测试...</div>
      </div>
    </div>
  </div>
  
  <script>
    const logContainer = document.getElementById('logContainer');
    const loginBtn = document.getElementById('loginBtn');
    
    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = 'log-entry log-' + type;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
      console.log(message);
    }
    
    async function testLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        alert('请输入用户名和密码！');
        return;
      }
      
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';
      logContainer.innerHTML = '';
      
      try {
        log('=== 开始测试登录 API ===', 'info');
        log(`用户名: ${username}`, 'info');
        
        log('发送登录请求...', 'info');
        const startTime = Date.now();
        
        const response = await fetch('http://localhost:8088/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const duration = Date.now() - startTime;
        log(`响应状态: ${response.status} (${response.statusText}) - 耗时: ${duration}ms`, 'info');
        
        const result = await response.json();
        log('=== 原始响应数据 ===', 'response');
        log(JSON.stringify(result, null, 2), 'response');
        
        // 显示详细结果
        displayResponse(result);
        
        // 检查关键字段
        if (result.code === 200 && result.data) {
          log('✅ 登录成功！', 'info');
          
          const data = result.data;
          
          // 检查所有返回字段
          log('=== 返回字段检查 ===', 'info');
          log(`userId: ${data.userId ? '✓ 存在 (' + data.userId + ')' : '✗ 不存在'}`, data.userId ? 'info' : 'error');
          log(`username: ${data.username ? '✓ 存在 (' + data.username + ')' : '✗ 不存在'}`, data.username ? 'info' : 'error');
          log(`token: ${data.token ? '✓ 存在' : '✗ 不存在'}`, data.token ? 'info' : 'error');
          log(`currentRoleId: ${data.currentRoleId ? '✓ 存在 (' + data.currentRoleId + ')' : '✗ 不存在'}`, data.currentRoleId ? 'info' : 'error');
          
          if (data.roles) {
            log(`roles: ✓ 存在 (共 ${data.roles.length} 个角色)`, 'info');
            data.roles.forEach((role, index) => {
              log(`  角色 ${index + 1}: ${role.roleName} (ID: ${role.roleId})`, 'info');
            });
          } else {
            log('roles: ✗ 不存在或为空', 'warn');
          }
          
          // 验证 Token 格式
          if (data.token) {
            const parts = data.token.split('.');
            if (parts.length === 3) {
              log('Token 格式: ✓ JWT 格式正确', 'info');
              
              try {
                const payload = JSON.parse(atob(parts[1]));
                log('Token Payload:', 'info');
                log(`  userId: ${payload.userId}`, 'info');
                log(`  username: ${payload.username}`, 'info');
                if (payload.exp) {
                  const expDate = new Date(payload.exp * 1000);
                  log(`  过期时间: ${expDate.toLocaleString()}`, 'info');
                }
              } catch (e) {
                log('Token Payload 解析失败: ' + e.message, 'error');
              }
            } else {
              log('Token 格式: ✗ 不是有效的 JWT 格式', 'error');
            }
          }
          
          // 给出建议
          if (!data.token) {
            log('❌ 问题：后端没有返回 token！', 'error');
            log('   解决方案：检查后端 AuthUtils.login() 方法', 'error');
          }
          
          if (!data.currentRoleId) {
            log('⚠️ 问题：用户没有角色 (currentRoleId 为空)', 'warn');
            log('   说明：用户需要先创建角色才能进入游戏', 'warn');
            log('   解决方案：跳转到角色创建页面创建角色', 'warn');
          }
          
        } else {
          log(`❌ 登录失败: ${result.message || '未知错误'}`, 'error');
        }
        
      } catch (error) {
        log(`❌ 请求异常: ${error.message}`, 'error');
        log('Stack: ' + error.stack, 'error');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = '测试登录';
      }
    }
    
    function displayResponse(result) {
      const container = document.getElementById('responseContainer');
      const dataDiv = document.getElementById('responseData');
      
      container.style.display = 'block';
      
      if (result.code === 200 && result.data) {
        container.className = 'section result-section';
        const data = result.data;
        
        let html = '<div style="margin-bottom: 10px;"><strong>响应状态：</strong> <span style="color: #4CAF50;">成功</span></div>';
        html += '<div style="margin-bottom: 15px;"><strong>返回数据：</strong></div>';
        html += '<div style="margin-left: 20px;">';
        html += `<div><span class="result-key">code:</span> <span class="result-value">${result.code}</span></div>`;
        html += `<div><span class="result-key">userId:</span> <span class="result-value">${data.userId || 'undefined'}</span></div>`;
        html += `<div><span class="result-key">username:</span> <span class="result-value">${data.username || 'undefined'}</span></div>`;
        html += `<div><span class="result-key">nickname:</span> <span class="result-value">${data.nickname || 'undefined'}</span></div>`;
        html += `<div><span class="result-key">token:</span> <span class="result-value">${data.token ? data.token.substring(0, 50) + '...' : 'undefined'}</span></div>`;
        html += `<div><span class="result-key">currentRoleId:</span> <span class="result-value">${data.currentRoleId || 'undefined'}</span></div>`;
        html += `<div><span class="result-key">roles:</span> <span class="result-value">${data.roles ? JSON.stringify(data.roles) : 'undefined'}</span></div>`;
        html += '</div>';
        
        dataDiv.innerHTML = html;
      } else {
        container.className = 'section result-section error';
        dataDiv.innerHTML = `
          <div style="margin-bottom: 10px;"><strong>响应状态：</strong> <span style="color: #f44336;">失败</span></div>
          <div><strong>错误信息：</strong> <span class="result-value">${result.message || '未知错误'}</span></div>
        `;
      }
    }
    
    // 允许按 Enter 键提交
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && !loginBtn.disabled) {
        testLogin();
      }
    });
  </script>
</body>
</html>
