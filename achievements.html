<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <script src="js/viewport-adapt.js"></script>
  <link rel="stylesheet" href="css/mobile-adapt.css">
  <title>灵月仙途 - 成就系统</title>
  <style>
    :root {
      --gold-primary: #e6c749;
      --gold-light: #f4d03f;
      --gold-dark: #b8860b;
      --text-main: #fdfbf7;
      --text-dim: #8a7f6a;
      --bg-dark: #0f1219;
      --card-bg: rgba(30, 35, 50, 0.8);
      --locked-bg: rgba(20, 25, 40, 0.5);
      --success-color: #4caf50;
      --rare-color: #9b59b6;
      --epic-color: #e74c3c;
      --legendary-color: #f39c12;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', serif;
      background: linear-gradient(to bottom, #0f1219, #1a1f2e);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-effects {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particles {
      width: 100%;
      height: 100%;
      background-image: radial-gradient(var(--gold-primary) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: float 25s linear infinite;
      opacity: 0.15;
    }

    @keyframes float {
      from { background-position: 0 100%; }
      to { background-position: 0 0; }
    }

    .main-container {
      position: relative;
      z-index: 10;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .page-title {
      font-size: 2.2rem;
      font-weight: bold;
      color: var(--gold-primary);
      text-shadow: 0 0 25px rgba(230, 199, 73, 0.6);
      margin-bottom: 10px;
    }

    .stats-bar {
      display: flex;
      justify-content: space-around;
      background: rgba(0, 0, 0, 0.4);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(230, 199, 73, 0.2);
      margin-bottom: 25px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--gold-light);
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-top: 5px;
    }

    /* 勋章墙网格 */
    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .achievement-card {
      aspect-ratio: 1;
      background: var(--card-bg);
      border: 2px solid rgba(230, 199, 73, 0.3);
      border-radius: 16px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      position: relative;
      overflow: hidden;
    }

    .achievement-card.unlocked {
      border-color: var(--gold-primary);
      animation: unlockGlow 2s ease infinite;
    }

    @keyframes unlockGlow {
      0%, 100% { box-shadow: 0 0 15px rgba(230, 199, 73, 0.3); }
      50% { box-shadow: 0 0 25px rgba(230, 199, 73, 0.6); }
    }

    .achievement-card.locked {
      background: var(--locked-bg);
      border-color: rgba(100, 100, 100, 0.3);
      filter: grayscale(80%);
    }

    .achievement-card:hover {
      transform: translateY(-8px) scale(1.05);
    }

    .achievement-card.unlocked:hover {
      box-shadow: 0 10px 30px rgba(230, 199, 73, 0.5);
    }

    .achievement-icon {
      font-size: 3.5rem;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .achievement-card.locked .achievement-icon {
      filter: blur(2px);
      opacity: 0.3;
    }

    .achievement-name {
      font-size: 0.9rem;
      font-weight: bold;
      color: var(--gold-primary);
      text-align: center;
      margin-bottom: 5px;
    }

    .achievement-card.locked .achievement-name {
      color: var(--text-dim);
    }

    .achievement-rarity {
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 10px;
      background: rgba(230, 199, 73, 0.2);
      color: var(--gold-light);
    }

    .achievement-card.rare .achievement-rarity {
      background: rgba(155, 89, 182, 0.3);
      color: var(--rare-color);
    }

    .achievement-card.epic .achievement-rarity {
      background: rgba(231, 76, 60, 0.3);
      color: var(--epic-color);
    }

    .achievement-card.legendary .achievement-rarity {
      background: rgba(243, 156, 18, 0.3);
      color: var(--legendary-color);
    }

    /* 粒子特效 */
    .particle-effect {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .achievement-card.unlocked .particle-effect {
      opacity: 1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--gold-primary);
      border-radius: 50%;
      animation: particleFloat 2s ease-out infinite;
    }

    @keyframes particleFloat {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }

    /* 详情弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(30, 35, 50, 0.95), rgba(15, 18, 25, 0.95));
      border: 3px solid var(--gold-primary);
      border-radius: 24px;
      padding: 35px;
      max-width: 90%;
      width: 400px;
      position: relative;
      animation: modalSlide 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes modalSlide {
      from {
        transform: translateY(-50px) scale(0.8);
        opacity: 0;
      }
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    .modal-header {
      text-align: center;
      margin-bottom: 25px;
    }

    .modal-icon {
      font-size: 5rem;
      margin-bottom: 15px;
      animation: modalIconPulse 1.5s ease infinite;
    }

    @keyframes modalIconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--gold-primary);
      margin-bottom: 8px;
    }

    .modal-subtitle {
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    .modal-body {
      margin-bottom: 25px;
    }

    .modal-section {
      margin-bottom: 20px;
    }

    .modal-section-title {
      font-size: 0.9rem;
      font-weight: bold;
      color: var(--gold-dark);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal-description {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-primary));
      transition: width 0.5s ease;
    }

    .reward-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .reward-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      background: rgba(230, 199, 73, 0.1);
      border: 1px solid rgba(230, 199, 73, 0.3);
      border-radius: 10px;
    }

    .reward-icon {
      font-size: 1.5rem;
    }

    .reward-text {
      flex: 1;
      font-size: 0.9rem;
      color: var(--gold-primary);
    }

    .modal-footer {
      text-align: center;
    }

    .modal-close-btn {
      padding: 12px 40px;
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
      border: none;
      border-radius: 12px;
      color: #000;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .modal-close-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(230, 199, 73, 0.5);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    .empty-icon {
      font-size: 5rem;
      margin-bottom: 20px;
      opacity: 0.4;
    }

    .empty-text {
      font-size: 1.1rem;
      line-height: 1.8;
    }

    /* 加载动画 */
    .loading {
      text-align: center;
      padding: 80px 20px;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(230, 199, 73, 0.2);
      border-top-color: var(--gold-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  </head>
<body>
  <!-- 背景特效 -->
  <div class="bg-effects">
    <div class="particles"></div>
  </div>

  <!-- 主容器 -->
  <div class="main-container">
    <!-- 头部 -->
    <div class="header">
      <div class="page-title">🏆 成就殿堂</div>
    </div>

    <!-- 统计栏 -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="totalAchievements">0</div>
        <div class="stat-label">总成就数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="unlockedAchievements">0</div>
        <div class="stat-label">已完成</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="completionRate">0%</div>
        <div class="stat-label">完成率</div>
      </div>
    </div>

    <!-- 成就网格 -->
    <div class="achievement-grid" id="achievementGrid">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>加载成就中...</div>
      </div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal-overlay" id="achievementModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-icon" id="modalIcon">🏅</div>
        <div class="modal-title" id="modalTitle">成就名称</div>
        <div class="modal-subtitle" id="modalRarity">普通成就</div>
      </div>
      
      <div class="modal-body">
        <div class="modal-section">
          <div class="modal-section-title">📖 成就描述</div>
          <div class="modal-description" id="modalDescription">
            成就详细描述...
          </div>
        </div>

        <div class="modal-section">
          <div class="modal-section-title">📊 达成条件</div>
          <div style="font-size: 0.9rem; color: var(--text-secondary);">
            <span id="modalCondition">完成 100 次修炼</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="modalProgress" style="width: 0%"></div>
          </div>
          <div style="font-size: 0.8rem; color: var(--text-dim); margin-top: 5px; text-align: right;">
            <span id="modalProgressText">0/100</span>
          </div>
        </div>

        <div class="modal-section">
          <div class="modal-section-title">🎁 成就奖励</div>
          <div class="reward-list" id="modalRewards">
            <!-- 奖励将通过 JS 动态插入 -->
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="modal-close-btn" id="claimRewardBtn" style="display: none;" onclick="claimAchievementReward()">领取奖励</button>
        <button class="modal-close-btn" onclick="closeModal()">关闭</button>
      </div>
    </div>
  </div>

  <script src="js/api-service.js"></script>
  <script src="js/auth-service.js"></script>
  <script>
    let achievements = [];
    let roleAchievements = [];

    // 页面加载
    window.addEventListener('DOMContentLoaded', async function() {
      await loadAchievements();
    });

    // 加载成就
    async function loadAchievements() {
      try {
        const roleId = localStorage.getItem('roleId') || localStorage.getItem('currentRoleId');
        if (!roleId) {
          showToast('请先选择角色', 'error');
          return;
        }

        const data = await apiService.getAchievements(roleId);
        if (data) {
          achievements = data.achievements || data || [];
          roleAchievements = data.roleAchievements || [];
          if (roleAchievements.length === 0 && achievements.length > 0 && achievements[0].progress !== undefined) {
            roleAchievements = achievements.map(a => ({
              achievementId: a.id,
              progress: a.progress || 0,
              status: a.status || 'in_progress'
            }));
          }
        }

        renderAchievements();
        updateStats();
      } catch (error) {
        console.error('加载成就失败:', error);
        document.getElementById('achievementGrid').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-text">加载失败，请稍后重试</div>
          </div>
        `;
      }
    }

    // 渲染成就
    function renderAchievements() {
      const grid = document.getElementById('achievementGrid');
      
      let html = '';
      achievements.forEach(achievement => {
        const roleAch = roleAchievements.find(ra => ra.achievementId === achievement.id);
        const isUnlocked = roleAch && (roleAch.status === 'completed' || roleAch.status === 'claimed');
        const progress = roleAch ? (roleAch.progress || 0) : 0;
        const isHidden = achievement.hidden === true && !isUnlocked;

        html += `
          <div class="achievement-card ${isUnlocked ? 'unlocked' : 'locked'} ${achievement.rarity}"
               onclick="showDetail(${achievement.id})">
            <div class="particle-effect">
              ${generateParticles()}
            </div>
            <div class="achievement-icon">${isHidden ? '❓' : achievement.icon}</div>
            <div class="achievement-name">${isHidden ? '??? ???' : achievement.name}</div>
            <div class="achievement-rarity">${getRarityText(achievement.rarity)}</div>
          </div>
        `;
      });

      grid.innerHTML = html;
    }

    // 生成粒子
    function generateParticles() {
      let html = '';
      for (let i = 0; i < 8; i++) {
        const tx = (Math.random() - 0.5) * 200;
        const ty = (Math.random() - 0.5) * 200;
        html += `<div class="particle" style="--tx: ${tx}px; --ty: ${ty}px; animation-delay: ${Math.random() * 2}s"></div>`;
      }
      return html;
    }

    // 获取稀有度文本
    function getRarityText(rarity) {
      const map = {
        common: '普通',
        rare: '稀有',
        epic: '史诗',
        legendary: '传说'
      };
      return map[rarity] || rarity;
    }

    // 更新统计
    function updateStats() {
      const total = achievements.length;
      const unlocked = roleAchievements.filter(ra => ra.status === 'completed' || ra.status === 'claimed').length;
      const rate = total > 0 ? Math.round((unlocked / total) * 100) : 0;

      document.getElementById('totalAchievements').textContent = total;
      document.getElementById('unlockedAchievements').textContent = unlocked;
      document.getElementById('completionRate').textContent = rate + '%';
    }

    let currentAchievementId = null;

    // 显示详情
    function showDetail(achievementId) {
      currentAchievementId = achievementId;
      const achievement = achievements.find(a => a.id === achievementId);
      const roleAch = roleAchievements.find(ra => ra.achievementId === achievementId);
      
      if (!achievement) return;

      const isUnlocked = roleAch && (roleAch.status === 'completed' || roleAch.status === 'claimed');
      const isClaimed = roleAch && roleAch.status === 'claimed';
      const isHidden = achievement.hidden === true && !isUnlocked;

      document.getElementById('modalIcon').textContent = isHidden ? '❓' : (achievement.icon || '🏅');
      document.getElementById('modalTitle').textContent = isHidden ? '??? ???' : achievement.name;
      document.getElementById('modalRarity').textContent = getRarityText(achievement.rarity);
      document.getElementById('modalDescription').textContent = isHidden ? '成就详情尚未解锁...' : (achievement.description || '');
      
      const claimBtn = document.getElementById('claimRewardBtn');
      
      if (isHidden) {
        document.getElementById('modalCondition').textContent = '???';
        document.getElementById('modalProgress').style.width = '0%';
        document.getElementById('modalProgressText').textContent = '???/???';
        document.getElementById('modalRewards').innerHTML = '<div style="color: var(--text-dim);">奖励详情尚未解锁</div>';
        claimBtn.style.display = 'none';
      } else {
        document.getElementById('modalCondition').textContent = achievement.condition || `完成 ${achievement.threshold || 1} 次 ${getConditionName(achievement.conditionType)}`;
        const progress = roleAch ? (roleAch.progress || 0) : 0;
        const target = achievement.threshold || 1;
        const percent = Math.min((progress / target) * 100, 100);
        document.getElementById('modalProgress').style.width = percent + '%';
        document.getElementById('modalProgressText').textContent = `${progress}/${target}`;
        
        // 显示奖励
        let rewardsHtml = '';
        if (achievement.title) {
          rewardsHtml += `
            <div class="reward-item">
              <div class="reward-icon">🏷️</div>
              <div class="reward-text">称号：${achievement.title}</div>
            </div>
          `;
        }
        if (achievement.rewardAttributes) {
          try {
            const stats = typeof achievement.rewardAttributes === 'string' ? JSON.parse(achievement.rewardAttributes) : achievement.rewardAttributes;
            if (stats && typeof stats === 'object') {
              Object.entries(stats).forEach(([stat, value]) => {
                rewardsHtml += `
                  <div class="reward-item">
                    <div class="reward-icon">✨</div>
                    <div class="reward-text">${getStatName(stat)} +${value}</div>
                  </div>
                `;
              });
            }
          } catch (e) {
            console.error('解析奖励统计失败:', e);
          }
        }
        if (achievement.rewardItems) {
          achievement.rewardItems.forEach(item => {
            rewardsHtml += `
              <div class="reward-item">
                <div class="reward-icon">📦</div>
                <div class="reward-text">${item.name || '物品'} x${item.quantity || 1}</div>
              </div>
            `;
          });
        }
        document.getElementById('modalRewards').innerHTML = rewardsHtml || '<div style="color: var(--text-dim);">暂无奖励</div>';
        
        // 显示/隐藏领取奖励按钮
        if (isUnlocked && !isClaimed) {
          claimBtn.style.display = 'inline-block';
        } else {
          claimBtn.style.display = 'none';
        }
      }

      document.getElementById('achievementModal').classList.add('active');
    }

    // 领取成就奖励
    async function claimAchievementReward() {
      try {
        const roleId = localStorage.getItem('roleId') || localStorage.getItem('currentRoleId');
        if (!roleId) {
          showToast('请先选择角色', 'error');
          return;
        }

        const result = await apiService.claimAchievementReward(currentAchievementId, roleId);
        
        showToast('奖励领取成功！', 'success');
        closeModal();
        await loadAchievements();
      } catch (error) {
        console.error('领取奖励失败:', error);
        showToast(error.message || '领取奖励失败', 'error');
      }
    }

    // 获取条件名称
    function getConditionName(type) {
      const map = {
        login: '登录',
        cultivate: '修炼',
        kill_monster: '击败妖兽',
        craft_pill: '炼制丹药',
        secret: '神秘条件'
      };
      return map[type] || type;
    }

    // 获取属性名称
    function getStatName(stat) {
      const map = {
        attack: '攻击',
        defense: '防御',
        health: '生命',
        critical: '暴击'
      };
      return map[stat] || stat;
    }

    // 关闭弹窗
    function closeModal() {
      document.getElementById('achievementModal').classList.remove('active');
    }

    // 提示消息
    function showToast(message, type = 'info') {
      const colors = { success: '#4caf50', error: '#e74c3c', info: '#e6c749' };
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: ${colors[type]};
        color: #fff;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: bold;
        z-index: 2000;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // 点击遮罩关闭
    document.getElementById('achievementModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
